<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Loopie v32 - Ultra Connect</title>
    <!-- v202605112127 -->
    <style>
        :root {
            --bg: #0e0e12; --card: #16161e; --border: #2a2a38; --blue: #3b82f6;
            --blue-dim: #1d3a6e; --green: #10b981; --red: #f43f5e; --amber: #f59e0b;
            --text: #e8e8f0; --muted: #6b6b80; --mono: 'Courier New', monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 32px; width: 100%; max-width: 440px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .logo-icon { width: 36px; height: 36px; background: var(--blue); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        input { width: 100%; padding: 12px; background: #0a0a10; border: 1px solid var(--border); color: var(--text); border-radius: 10px; font-size: 14px; outline: none; margin-bottom: 16px; transition: 0.2s; }
        input:focus { border-color: var(--blue); }
        .omnibox { border: 1px solid var(--blue); color: var(--green); font-family: var(--mono); }
        .btn { width: 100%; padding: 12px; background: var(--blue); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; margin-top: 4px; }
        .status { font-size: 13px; padding: 10px; border-radius: 8px; margin-bottom: 16px; display: none; }
        .status.show { display: block; }
        .status.error { background: rgba(244,63,94,0.1); color: var(--red); border: 1px solid var(--red); }
        .bg-display { text-align: center; padding: 20px 0; border: 1px solid var(--border); border-radius: 14px; background: #0a0a10; margin-bottom: 16px; }
        .bg-value { font-size: 64px; font-weight: 800; color: var(--green); }
        .bg-value.low { color: var(--red); }
        .bg-value.high { color: var(--amber); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
        .stat-box { background: #0a0a10; border: 1px solid var(--border); border-radius: 12px; padding: 12px; text-align: center; }
        .stat-val { font-weight: 700; font-size: 16px; display: block; }
        .stat-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; }
        .hidden { display: none !important; }
        .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid transparent; border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        /* Omnibox row */
        .omni-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .omni-row input { margin-bottom: 0; flex: 1; }
        .omni-send { width: auto; padding: 12px 18px; flex-shrink: 0; margin-top: 0; border-radius: 10px; }
        /* Popup overlay */
        .popup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
        .popup-overlay.show { opacity: 1; pointer-events: all; }
        .popup-box { background: #1a1a26; border: 1px solid var(--blue); border-radius: 16px; padding: 24px; max-width: 420px; width: 100%; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.7); transform: translateY(20px); transition: transform 0.2s; }
        .popup-overlay.show .popup-box { transform: translateY(0); }
        .popup-title { font-size: 13px; color: var(--muted); margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.5px; }
        .popup-body { font-size: 14px; line-height: 1.7; color: var(--text); }
        .popup-footer { margin-top: 20px; text-align: center; }
        .popup-close { background: var(--blue); color: white; border: none; border-radius: 10px; padding: 10px 32px; cursor: pointer; font-weight: 600; font-size: 14px; }
        .popup-close:hover { opacity: 0.85; }
        /* Refresh feedback */
        .refresh-flash { animation: flashGreen 0.6s ease; }
        @keyframes flashGreen { 0%,100%{border-color:var(--border)} 50%{border-color:var(--green)} }
        .report-btn { background: var(--blue-dim) !important; color: var(--blue) !important; border: 1px solid var(--blue-dim) !important; }
        .report-btn:hover { background: var(--blue) !important; color: white !important; }
        /* Activity screen */
        .nav-tabs { display:flex; gap:6px; margin-bottom:16px; }
        .nav-tab  { flex:1; padding:8px; background:#0a0a10; border:1px solid var(--border); border-radius:8px; color:var(--muted); font-size:12px; cursor:pointer; text-align:center; font-weight:600; }
        .nav-tab.active { background:var(--blue); color:white; border-color:var(--blue); }
        .activity-item { background:#0a0a10; border:1px solid var(--border); border-radius:10px; padding:10px 12px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; }
        .activity-item .act-info { font-size:13px; }
        .activity-item .act-name { font-weight:700; color:var(--text); }
        .activity-item .act-time { font-size:11px; color:var(--muted); margin-top:2px; }
        .activity-item .act-del  { background:none; border:none; color:var(--red); font-size:18px; cursor:pointer; padding:0 4px; }
        .act-active-banner { background:rgba(245,158,11,0.12); border:1px solid #f59e0b; border-radius:10px; padding:10px 14px; margin-bottom:12px; font-size:13px; }
        select { width:100%; padding:10px; background:#0a0a10; border:1px solid var(--border); color:var(--text); border-radius:8px; font-size:14px; outline:none; margin-bottom:10px; }
    </style>
</head>
<body>

<div id="login-screen" class="card">
    <div class="logo"><div class="logo-icon">💉</div><h1>Loopie Ultra</h1></div>
    <div id="login-status" class="status"></div>
    <label>כתובת Nightscout</label>
    <input type="text" id="nsUrl" placeholder="https://herokuapp.com">
    <label>API Secret</label>
    <input type="password" id="apiSecret" placeholder="••••••••">
    <button class="btn" id="loginBtn" onclick="connect()">התחבר למערכת</button>
</div>

<div id="main-screen" class="card hidden">
    <div class="logo" style="margin-bottom:12px">
        <div class="logo-icon" style="width:28px;height:28px;font-size:14px">♾️</div>
        <span id="badge-name" style="font-weight:700">Loopie Active</span>
    </div>

    <!-- Tabs -->
    <div class="nav-tabs">
        <div class="nav-tab active" onclick="switchTab('tab-home',this)">🏠 בית</div>
        <div class="nav-tab" onclick="switchTab('tab-activity',this)">🏃 פעילות</div>
        <div class="nav-tab" onclick="switchTab('tab-reports',this)">📊 דוחות</div>
    </div>

    <!-- TAB: בית -->
    <div id="tab-home">
        <div class="bg-display">
            <div class="bg-value" id="current-bg">--</div>
            <div id="trend-label" style="font-size:14px;color:var(--muted)">טוען...</div>
        </div>
        <div class="stats-grid">
            <div class="stat-box"><span class="stat-lbl">IOB</span><span id="stat-iob" class="stat-val">0.0</span></div>
            <div class="stat-box"><span class="stat-lbl">בזאלי</span><span id="stat-basal" class="stat-val">0.0</span></div>
        </div>
        <div id="activity-banner"></div>
        <div class="omni-row">
            <input type="text" id="omnibox" class="omnibox" placeholder="שאל: מה המצב? / כמה להזריק על פיתה?" onkeydown="if(event.key==='Enter') askOmnibox()">
            <button class="btn omni-send" onclick="askOmnibox()">שלח</button>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:0">
        <button class="btn" id="refreshBtn" onclick="doRefresh()" style="flex:1">🔄 רענן</button>
        <button class="btn" onclick="showMemoryHistory()" style="flex:1;background:var(--blue-dim);color:var(--blue);border:1px solid var(--blue-dim)">🧠 זיכרון</button>
    </div>
        <button class="btn" style="background:transparent;border:1px solid var(--border);color:var(--muted);margin-top:8px" onclick="location.reload()">התנתקות</button>
    </div>

    <!-- TAB: פעילות -->
    <div id="tab-activity" class="hidden">
        <div id="gcal-banner" style="background:rgba(59,130,246,0.08);border:1px solid var(--blue-dim);border-radius:10px;padding:10px;margin-bottom:12px;font-size:13px;display:none">
            📅 <b>גוגל קלנדר מחובר</b> — <span id="gcal-next"></span>
        </div>

        <button class="btn" onclick="connectGoogleCalendar()" style="background:var(--blue-dim);color:var(--blue);border:1px solid var(--blue-dim);margin-bottom:12px;font-size:13px">
            📅 התחבר לגוגל קלנדר
        </button>

        <div style="font-size:12px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">הוסף חוג/פעילות קבועה</div>

        <input type="text" id="act-name" placeholder="שם פעילות (למשל: MMA, ריצה, שחייה)" style="margin-bottom:8px">

        <select id="act-day">
            <option value="0">ראשון</option>
            <option value="1">שני</option>
            <option value="2">שלישי</option>
            <option value="3">רביעי</option>
            <option value="4">חמישי</option>
            <option value="5">שישי</option>
            <option value="6">שבת</option>
        </select>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
            <div>
                <label>משעה</label>
                <input type="time" id="act-from" style="margin-bottom:0">
            </div>
            <div>
                <label>עד שעה</label>
                <input type="time" id="act-to" style="margin-bottom:0">
            </div>
        </div>

        <select id="act-intensity">
            <option value="low">עצימות נמוכה (יוגה, הליכה)</option>
            <option value="medium" selected>עצימות בינונית (שחייה, אופניים)</option>
            <option value="high">עצימות גבוהה (MMA, ריצה, HIIT)</option>
        </select>

        <button class="btn" onclick="addActivity()" style="margin-bottom:16px">➕ הוסף פעילות</button>

        <div style="font-size:12px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">פעילויות שמורות</div>
        <div id="activity-list"><div style="color:var(--muted);font-size:13px">אין פעילויות שמורות</div></div>
    </div>

    <!-- TAB: דוחות -->
    <div id="tab-reports" class="hidden">
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">
            <button class="btn report-btn" onclick="generateReport(7)"  style="font-size:12px;padding:10px 4px">📊 7 ימים</button>
            <button class="btn report-btn" onclick="generateReport(14)" style="font-size:12px;padding:10px 4px">📊 14 ימים</button>
            <button class="btn report-btn" onclick="generateReport(30)" style="font-size:12px;padding:9px 4px">📊 30 ימים</button>
        </div>
        <div style="color:var(--muted);font-size:13px;text-align:center;padding:8px">בחר טווח לייצור דוח</div>
    </div>
</div>

<!-- Popup -->
<div class="popup-overlay" id="popup-overlay" onclick="closePopup(event)">
    <div class="popup-box">
        <div class="popup-title" id="popup-title">Loopie</div>
        <div class="popup-body" id="popup-body"></div>
        <div class="popup-footer">
            <button class="popup-close" onclick="closePopup()">אישור</button>
        </div>
    </div>
</div>

<script>
let nsData = { iob: "0.00", cob: 0, basal: "0.0", currentSgv: 0, delta: 0 };
let PENDING_DOSE = null; // הזרקה ממתינה לחלקה השני

// === הגדרות אינסולין — ניתן לשנות ===
// מערכת Loopie מותאמת לסוכרת סוג 1 (T1D) בגיל הנעורים.
// ההמלצות מבוססות על עקרונות רפואיים של ניהול T1D:
// • יחס פחמימה/אינסולין (CR) — כמה גרם פחמימה לכל יחידת אינסולין
// • ISF — כמה mg/dL יורד הסוכר לכל יחידת אינסולין
// • בזאלי — קצב הרקע לשמירה על יציבות בין ארוחות
// ההמלצות הן כלי עזר בלבד ואינן תחליף לייעוץ אנדוקרינולוג.
var INSULIN_CONFIG = {
    type:       "lyumjev",   // "lyumjev" | "novorapid" | "humalog" | "fiasp" | "apidra"
    splitNow:   70,          // % מהמינון הכולל בהתחלה
    splitLater: 30,          // % מהמינון הכולל בהמשך
    splitDelay: 60,          // דקות עד החלק השני
    alertThreshold: 130,     // התרעה כשסוכר מעל + מגמת עלייה
    alertDelta:  2           // delta מינימלי להתרעה (mg/dL ב-5 דק')
};

// פרמטרי אינסולין לפי סוג (DIA=משך, onset=התחלה, peak=שיא, preMeal=כמה דקות לפני ארוחה)
var INSULIN_PROFILES = {
    lyumjev:   { name: "ליומגב",   dia: 300, onset: 5,  peak: 30,  iaDuration: 3.5, preMeal: 2  },
    novorapid: { name: "נובורפיד", dia: 360, onset: 15, peak: 75,  iaDuration: 4.0, preMeal: 15 },
    humalog:   { name: "הומלוג",   dia: 360, onset: 15, peak: 75,  iaDuration: 4.0, preMeal: 15 },
    fiasp:     { name: "פיאסף",    dia: 300, onset: 5,  peak: 25,  iaDuration: 3.5, preMeal: 2  },
    apidra:    { name: "אפידרה",   dia: 300, onset: 10, peak: 55,  iaDuration: 3.5, preMeal: 10 }
};

// === מאגר מאכלים ברירת מחדל ===
var FOOD_DB = {
    "פיתה":         { carbs: 50,  durationH: 3, notes: "פחמימות מהירות-בינוניות" },
    "פיצה ביתית":   { carbs: 25,  durationH: 5, notes: "שומן גבוה — ספיגה איטית", perUnit: "חתיכה" },
    "פיצה מסעדה":   { carbs: 35,  durationH: 5, notes: "שומן גבוה — ספיגה איטית", perUnit: "חתיכה" },
    "המבורגר":      { carbs: 50,  durationH: 5, notes: "שומן+חלבון — ספיגה איטית" },
    "ציפס":         { carbs: 15,  durationH: 3, notes: "10 יחידות", perUnit: "10 יח'" },
    "פסטה":         { carbs: 15,  durationH: 5, notes: "כוס — ספיגה איטית", perUnit: "כוס" },
    "אורז":         { carbs: 5,   durationH: 3, notes: "כף", perUnit: "כף" }
};

// === פחמימות חילוץ (rescue carbs) ===
var RESCUE_DB = {
    "פתיבר":        { carbs: 7.5,  unit: "חתיכה",  fast: false },
    "חצי פתיבר":   { carbs: 4,    unit: "חצי",    fast: false },
    "גלוקוז":       { carbs: 15,   unit: "טבלייה", fast: true  },
    "חצי גלוקוז":  { carbs: 7.5,  unit: "חצי",    fast: true  },
    "מיץ 2 שלוקים":{ carbs: 7.5,  unit: "2 שלוקים",fast: true  },
    "מיץ 4 שלוקים":{ carbs: 15,   unit: "4 שלוקים",fast: true  },
    "מיץ":          { carbs: 15,   unit: "כוס",    fast: true  }
};

// כלל: מיץ/גלוקוז תמיד מלווה בפתיבר
// בנה תוכנית חילוץ לפי כמות פחמימות הנדרשת
function buildRescuePlan(carbsNeeded, sgv, iob) {
    carbsNeeded = Math.round(carbsNeeded);
    var plans = [];

    // אפשרות א — מהיר + איטי (מיץ/גלוקוז + פתיבר)
    if (carbsNeeded >= 15) {
        var fastC  = Math.min(15, carbsNeeded);
        var slowC  = carbsNeeded - fastC;
        var fastItem = fastC >= 15 ? "גלוקוז (15g)" : "חצי גלוקוז (7.5g)";
        var slowItem = slowC >= 7.5 ? "פתיבר (7.5g)" : slowC >= 4 ? "חצי פתיבר (4g)" : "";
        plans.push({
            label: "מהיר + מייצב",
            items: [
                { name: fastItem, carbs: fastC, fast: true },
                slowItem ? { name: slowItem, carbs: slowC > 7.5 ? 7.5 : slowC, fast: false } : null
            ].filter(Boolean),
            totalCarbs: fastC + (slowItem ? Math.min(7.5, slowC) : 0),
            color: "#ef4444"
        });
    }

    // אפשרות ב — מיץ + פתיבר
    if (carbsNeeded >= 7.5) {
        var juiceC = carbsNeeded >= 15 ? 15 : 7.5;
        var barC   = carbsNeeded >= 15 ? 7.5 : 4;
        plans.push({
            label: "מיץ + פתיבר",
            items: [
                { name: (juiceC>=15 ? "4 שלוקים מיץ (15g)" : "2 שלוקים מיץ (7.5g)"), carbs: juiceC, fast: true },
                { name: (barC>=7.5 ? "פתיבר שלם (7.5g)" : "חצי פתיבר (4g)"),          carbs: barC,   fast: false }
            ],
            totalCarbs: juiceC + barC,
            color: "#f59e0b"
        });
    }

    // אפשרות ג — פתיבר בלבד (אם נמוך קל)
    if (carbsNeeded <= 10) {
        var bars = carbsNeeded >= 7.5 ? [{ name: "פתיבר שלם (7.5g)", carbs: 7.5, fast: false }]
                                      : [{ name: "חצי פתיבר (4g)",   carbs: 4,   fast: false }];
        plans.push({
            label: "פתיבר בלבד",
            items: bars,
            totalCarbs: bars[0].carbs,
            color: "#10b981"
        });
    }

    // האם לרשום ב-Loop?
    // עקרון רפואי: Loop משתמש בנתוני פחמימות לחיזוי וכיול עתידי.
    // IOB גבוה = אינסולין פעיל שעלול להמשיך להוריד סוכר — חובה לרשום.
    var loopNote = "";
    if (iob > 1.5 && sgv < 90) {
        loopNote = "⚠️ רשום ב-Loop: פחמימות " + carbsNeeded + "g | אינסולין: 0U (חילוץ)";
    } else if (iob > 0.5) {
        loopNote = "📱 רשום ב-Loop: פחמימות " + carbsNeeded + "g | אינסולין: 0U";
    } else {
        loopNote = "ℹ️ לא חייב לרשום ב-Loop — IOB נמוך";
    }

    return { plans: plans, loopNote: loopNote };
}

// חישוב כמות חילוץ נדרשת
function calcRescueCarbs(sgv, targetBG, iob, isf) {
    targetBG = targetBG || 120;
    var fromSGV  = Math.max(0, Math.ceil((targetBG - sgv) * 0.04 * 10)); // כ-4g לכל 10 נקודות
    var fromIOB  = Math.round(iob * (isf || 50) / 10);                   // IOB עלול להוריד עוד
    return Math.max(fromSGV, fromIOB, 0);
}

// חיפוש מאכל במאגר — עם תמיכה בחיפוש חלקי ועברית חסרה
function findFood(name) {
    if (!name || !name.trim()) return null;
    var n = name.trim().toLowerCase();
    var keys = Object.keys(FOOD_DB);
    // התאמה מדויקת
    for (var i = 0; i < keys.length; i++) {
        if (n === keys[i].toLowerCase()) return { key: keys[i], data: FOOD_DB[keys[i]] };
    }
    // חיפוש חלקי — הקלט מוכל במפתח
    for (var i = 0; i < keys.length; i++) {
        if (keys[i].toLowerCase().includes(n) && n.length >= 2) return { key: keys[i], data: FOOD_DB[keys[i]] };
    }
    // חיפוש חלקי — המפתח מוכל בקלט
    for (var i = 0; i < keys.length; i++) {
        if (n.includes(keys[i].toLowerCase()) && keys[i].length >= 2) return { key: keys[i], data: FOOD_DB[keys[i]] };
    }
    return null;
}

function getInsulinProfile() {
    return INSULIN_PROFILES[INSULIN_CONFIG.type] || INSULIN_PROFILES.novorapid;
}

function showPopup(title, html) {
    document.getElementById('popup-title').innerText = title;
    document.getElementById('popup-body').innerHTML = html;
    document.getElementById('popup-overlay').classList.add('show');
}

function closePopup(e) {
    if (e && e.target !== document.getElementById('popup-overlay')) return;
    document.getElementById('popup-overlay').classList.remove('show');
}

async function doRefresh() {
    var btn = document.getElementById('refreshBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> מרענן...';
    try {
        await fetchData();

let fullHistory = { entries: [], treatments: [], devStatus: {}, profile: null };
let refreshTimer = null;

function nsUrl()    { return document.getElementById('nsUrl').value.trim().replace(/\/$/, ""); }
function nsSecret() { return document.getElementById('apiSecret').value.trim(); }
function nsGet(path) {
    const sep = path.includes('?') ? '&' : '?';
    return fetch(nsUrl() + path + sep + 'api_secret=' + nsSecret(), { mode: 'cors' });
}

// שליפה בטוחה ממבנה JSON עמוק
function dig(obj, path, fallback) {
    if (fallback === undefined) fallback = null;
    var v = path.split('.').reduce(function(a, k) { return a != null ? a[k] : null; }, obj);
    return (v !== null && v !== undefined) ? v : fallback;
}

function profileValueAt(arr, hour) {
    if (!arr || !arr.length) return null;
    var sorted = arr.slice().sort(function(a,b){ return a.time > b.time ? 1 : -1; });
    var val = sorted[0].value;
    for (var i = 0; i < sorted.length; i++) {
        if (parseInt((sorted[i].time||"0").split(':')[0]) <= hour) val = sorted[i].value;
    }
    return val;
}

function buildSchedule(arr, unit) {
    if (!arr || !arr.length) return "אין נתונים.";
    return arr.slice().sort(function(a,b){ return a.time > b.time ? 1:-1; })
        .map(function(e){ return "• " + (e.time||"00:00") + " — <b>" + e.value + "</b> " + unit; })
        .join("<br>");
}

function predictBG(h) {
    var sgv = nsData.currentSgv;
    if (!sgv) return null;
    var iob = parseFloat(nsData.iob) || 0;
    return Math.max(40, Math.min(400, Math.round(sgv + (nsData.delta * 12 * h) - (iob * 40 * h))));
}

function bgStatus(sgv) {
    if (sgv < 70)  return " ⚠️ נמוך!";
    if (sgv > 250) return " ⚠️ גבוה מאוד!";
    if (sgv > 180) return " ↑ גבוה";
    return " ✅ בטווח";
}

function timeAgo(d) {
    var h = (Date.now() - new Date(d)) / 3600000;
    return h < 24 ? h.toFixed(1) + " שעות" : (h/24).toFixed(1) + " ימים";
}

async function generateReport(days) {
    showPopup("📊 מייצר דוח ל-" + days + " ימים...", '<div style="text-align:center;padding:20px"><span class="spinner" style="width:24px;height:24px;border-width:3px"></span></div>');

    var url    = nsUrl();
    var secret = nsSecret();
    if (!url || !secret) { showPopup("שגיאה", "אנא התחבר תחילה."); return; }

    var from = new Date(Date.now() - days * 86400000).toISOString();

    try {
        var [entRes, treatRes, profRes] = await Promise.all([
            nsGet('/api/v1/entries.json?find[dateString][$gte]=' + from + '&count=5000'),
            nsGet('/api/v1/treatments.json?find[created_at][$gte]=' + from + '&count=2000'),
            nsGet('/api/v1/profile.json')
        ]);

        var entries = entRes.ok    ? await entRes.json()    : [];
        var treats  = treatRes.ok  ? await treatRes.json()  : [];
        var profRaw = profRes.ok   ? await profRes.json()   : [];
        var profD   = Array.isArray(profRaw) ? profRaw[0] : profRaw;
        var store   = (profD && profD.store) ? profD.store[profD.defaultProfile || Object.keys(profD.store)[0]] : null;

        if (!entries.length) { showPopup("אין נתונים", "לא נמצאו קריאות סוכר לתקופה זו."); return; }

        // === סטטיסטיקות בסיסיות ===
        var sgvs  = entries.map(function(e){ return e.sgv; }).filter(Boolean);
        var avg   = sgvs.reduce(function(a,b){return a+b;},0) / sgvs.length;
        // GMI (Glucose Management Indicator): מחשב HbA1c משוער מממוצע סוכר
        // נוסחה קלינית: GMI = 3.31 + (0.02392 × average glucose mg/dL)
        // CV (מקדם שונות): <36% = ניהול יציב, >36% = תנודתיות גבוהה (סיכון)
        var gmi   = (3.31 + 0.02392 * avg).toFixed(1); // GMI מ-avg
        var sd    = Math.sqrt(sgvs.reduce(function(a,b){return a+Math.pow(b-avg,2);},0)/sgvs.length).toFixed(0);
        var cv    = ((parseFloat(sd)/avg)*100).toFixed(0);
        var tir   = (sgvs.filter(function(v){return v>=70&&v<=180;}).length/sgvs.length*100).toFixed(1);
        var tirT  = (sgvs.filter(function(v){return v>180&&v<=250;}).length/sgvs.length*100).toFixed(1);
        var tirH  = (sgvs.filter(function(v){return v>250;}).length/sgvs.length*100).toFixed(1);
        var tirL  = (sgvs.filter(function(v){return v>=54&&v<70;}).length/sgvs.length*100).toFixed(1);
        var tirVL = (sgvs.filter(function(v){return v<54;}).length/sgvs.length*100).toFixed(1);

        // === ניתוח לפי שעות (24 buckets) ===
        var hourBuckets = Array.from({length:24}, function(){ return []; });
        entries.forEach(function(e){
            if (e.sgv) hourBuckets[new Date(e.dateString||e.date).getHours()].push(e.sgv);
        });
        var hourStats = hourBuckets.map(function(arr, h){
            if (!arr.length) return null;
            var m = arr.reduce(function(a,b){return a+b;},0)/arr.length;
            var low = arr.filter(function(v){return v<70;}).length/arr.length*100;
            var high= arr.filter(function(v){return v>180;}).length/arr.length*100;
            return { h:h, avg:Math.round(m), low:low.toFixed(0), high:high.toFixed(0) };
        });

        // מצא שעות בעייתיות
        var highHours = hourStats.filter(function(s){ return s && parseFloat(s.high) > 30; });
        var lowHours  = hourStats.filter(function(s){ return s && parseFloat(s.low) > 10; });

        // === ניתוח ארוחות vs. סוכר אחרי ===
        var meals = treats.filter(function(t){ return t.carbs > 0; });
        var postMealSpikes = [];
        meals.forEach(function(m){
            var mealTime = new Date(m.created_at).getTime();
            var post2h = entries.filter(function(e){
                var dt = new Date(e.dateString||e.date).getTime() - mealTime;
                return dt > 60*60000 && dt < 2.5*3600000;
            }).map(function(e){ return e.sgv; });
            if (post2h.length) {
                var peakPost = Math.max.apply(null, post2h);
                postMealSpikes.push({ carbs: m.carbs, peak: peakPost, ins: m.insulin||0 });
            }
        });
        var avgSpike = postMealSpikes.length
            ? (postMealSpikes.reduce(function(a,b){return a+b.peak;},0)/postMealSpikes.length).toFixed(0)
            : null;

        // === ניתוח בזאלי לפי שעות ===
        var basalRecs = [];
        if (store && store.basal) {
            store.basal.forEach(function(b, i){
                var nextB = store.basal[i+1];
                var startH = parseInt((b.time||'0:0').split(':')[0]);
                var endH   = nextB ? parseInt(nextB.time.split(':')[0]) : 24;
                var bucket = [];
                for (var h = startH; h < endH; h++) {
                    if (hourStats[h]) bucket.push(hourStats[h]);
                }
                if (!bucket.length) return;
                var avgBucketBG = bucket.reduce(function(a,s){return a+s.avg;},0)/bucket.length;
                var rec = null;
                if (avgBucketBG > 160) rec = "⬆️ שקול הגדלת בזאלי " + b.time + " (" + b.value + " → " + (parseFloat(b.value)+0.025).toFixed(3) + "U/hr)";
                if (avgBucketBG < 90)  rec = "⬇️ שקול הקטנת בזאלי " + b.time + " (" + b.value + " → " + Math.max(0, parseFloat(b.value)-0.025).toFixed(3) + "U/hr)";
                if (rec) basalRecs.push(rec);
            });
        }

        // === המלצות CR ===
        var crRecs = [];
        if (avgSpike && parseFloat(avgSpike) > 200) {
            crRecs.push("📈 ממוצע שיא אחרי ארוחה: " + avgSpike + " mg/dL — שקול הגדלת יחס פחמימה (CR קטן יותר = יותר אינסולין לגרם)");
        }
        if (avgSpike && parseFloat(avgSpike) < 120) {
            crRecs.push("📉 שיאים אחרי ארוחות נמוכים (" + avgSpike + ") — ייתכן CR גדול מדי (פחות אינסולין)");
        }

        // === המלצות ISF ===
        var isfRecs = [];
        if (parseFloat(tirH) > 20) isfRecs.push("🎯 " + tirH + "% מהזמן מעל 180 — שקול הגדלת ISF (ערך נמוך יותר = תיקון חזק יותר)");
        if (parseFloat(tirL) + parseFloat(tirVL) > 5) isfRecs.push("⚠️ " + (parseFloat(tirL)+parseFloat(tirVL)).toFixed(1) + "% מתחת ל-70 — שקול הקטנת ISF");

        // === בניית הדוח ===
        var r = "";
        r += "<div style='background:#0a0a14;border-radius:10px;padding:14px;margin-bottom:14px'>";
        r += "<b style='color:var(--blue)'>📊 סיכום " + days + " ימים</b><br><br>";
        r += "• ממוצע סוכר: <b>" + avg.toFixed(0) + " mg/dL</b><br>";
        r += "• GMI (HbA1c משוער): <b>" + gmi + "%</b><br>";
        r += "• סטיית תקן: <b>" + sd + "</b> | CV: <b>" + cv + "%</b>" + (parseFloat(cv)<36?" ✅":" ⚠️") + "<br>";
        r += "• מספר קריאות: " + sgvs.length + "</div>";

        r += "<div style='background:#0a0a14;border-radius:10px;padding:14px;margin-bottom:14px'>";
        r += "<b>🎯 TIR (Time In Range)</b><br><br>";
        // יעדי TIR לפי ADA/ISPAD לסוכרת נעורים T1D:
        // >70% בטווח 70-180, <4% מתחת ל-70, <25% מעל 180
        r += bar(tir,   "#10b981", "70–180 מטרה ADA: >70%") + tir  + "%<br>";
        r += bar(tirT,  "#f59e0b", "181–250 (גבוה)")  + tirT + "%<br>";
        r += bar(tirH,  "#ef4444", ">250 (גבוה מאוד)") + tirH + "%<br>";
        r += bar(tirL,  "#f97316", "54–69 (נמוך)")    + tirL + "%<br>";
        r += bar(tirVL, "#dc2626", "<54 (נמוך מאוד)") + tirVL + "%</div>";

        if (highHours.length || lowHours.length) {
            r += "<div style='background:#0a0a14;border-radius:10px;padding:14px;margin-bottom:14px'>";
            r += "<b>🕐 שעות בעייתיות</b><br><br>";
            if (highHours.length) r += "📈 גבוה: " + highHours.map(function(s){return s.h+":00 ("+s.high+"% מעל 180)";}).join(", ") + "<br>";
            if (lowHours.length)  r += "📉 נמוך: " + lowHours.map(function(s){return s.h+":00 ("+s.low+"% מתחת 70)";}).join(", ");
            r += "</div>";
        }

        var allRecs = basalRecs.concat(crRecs).concat(isfRecs);
        if (allRecs.length) {
            r += "<div style='background:rgba(59,130,246,0.08);border:1px solid var(--blue-dim);border-radius:10px;padding:14px;margin-bottom:14px'>";
            r += "<b>💡 המלצות לשיקול דעת</b><br><br>";
            r += allRecs.join("<br>") + "</div>";
        } else {
            r += "<div style='background:rgba(16,185,129,0.08);border:1px solid #10b981;border-radius:10px;padding:12px;margin-bottom:14px'>";
            r += "✅ <b>הגדרות נראות טובות</b> לתקופה זו.</div>";
        }

        r += "<small style='color:#555'>⚕️ ניתוח עזר בלבד — לא תחליף לשיקול רפואי.</small>";

        showPopup("📊 דוח " + days + " ימים", r);

    } catch(e) {
        showPopup("שגיאה", "לא ניתן להפיק דוח: " + e.message);
        console.error(e);
    }
}

function bar(pct, color, label) {
    var w = Math.min(100, Math.max(2, parseFloat(pct)));
    return "<div style='font-size:11px;color:#888;margin-bottom:2px'>" + label + "</div>" +
           "<div style='background:#1a1a28;border-radius:4px;height:8px;margin-bottom:8px'>" +
           "<div style='background:" + color + ";width:" + w + "%;height:100%;border-radius:4px'></div></div>";
}

// ========= ניתוח ארוחה ספציפית =========
async function analyzeMeal(mealName) {
    showPopup("🍽️ מנתח ארוחה...", '<div style="text-align:center;padding:20px"><span class="spinner" style="width:24px;height:24px;border-width:3px"></span></div>');

    var from90 = new Date(Date.now() - 90 * 86400000).toISOString();
    try {
        var tRes = await nsGet('/api/v1/treatments.json?find[created_at][$gte]=' + from90 + '&count=2000');
        var eRes = await nsGet('/api/v1/entries.json?find[dateString][$gte]=' + from90 + '&count=10000');
        var treats = tRes.ok ? await tRes.json() : [];
        var entries = eRes.ok ? await eRes.json() : [];

        // מסנן ארוחות לפי שם (חיפוש חופשי)
        var keyword = mealName.toLowerCase();
        var matched = treats.filter(function(t) {
            var n = (t.notes || t.foodType || '').toLowerCase();
            return n.includes(keyword) && (t.carbs > 0 || t.insulin > 0);
        });

        if (!matched.length) {
            showPopup("לא נמצא", "לא מצאתי רישומים עם השם <b>" + mealName + "</b> ב-90 הימים האחרונים.<br><br>וודא שהשם רשום ב-Notes בעת ההזרקה.");
            return;
        }

        // לכל ארוחה — מצא קריאות סוכר לפני ואחרי
        var results = matched.map(function(m) {
            var mt = new Date(m.created_at).getTime();
            // סוכר בזמן ההזרקה (±10 דק')
            var atTime = entries.filter(function(e){
                return Math.abs(new Date(e.dateString||e.date).getTime()-mt) < 10*60000;
            });
            var sgvAt = atTime.length ? Math.round(atTime.reduce(function(a,b){return a+b.sgv;},0)/atTime.length) : null;

            // שיא תוך 90 דק'
            var post90 = entries.filter(function(e){
                var dt = new Date(e.dateString||e.date).getTime()-mt;
                return dt > 0 && dt < 90*60000;
            }).map(function(e){return e.sgv;});
            var peak = post90.length ? Math.max.apply(null, post90) : null;

            // סוכר אחרי 2 שעות (±15 דק')
            var post2h = entries.filter(function(e){
                var dt = new Date(e.dateString||e.date).getTime()-mt;
                return dt > 105*60000 && dt < 135*60000;
            });
            var sgv2h = post2h.length ? Math.round(post2h.reduce(function(a,b){return a+b.sgv;},0)/post2h.length) : null;

            // סוכר אחרי 3 שעות (±15 דק')
            var post3h = entries.filter(function(e){
                var dt = new Date(e.dateString||e.date).getTime()-mt;
                return dt > 165*60000 && dt < 195*60000;
            });
            var sgv3h = post3h.length ? Math.round(post3h.reduce(function(a,b){return a+b.sgv;},0)/post3h.length) : null;

            var rise = (peak && sgvAt) ? peak - sgvAt : null;
            var outcome = "לא ידוע";
            var outcomeColor = "#888";
            if (sgv2h !== null) {
                if      (sgv2h >= 70 && sgv2h <= 140) { outcome = "✅ טוב";           outcomeColor = "#10b981"; }
                else if (sgv2h > 140 && sgv2h <= 180) { outcome = "🟡 גבוה קצת";     outcomeColor = "#f59e0b"; }
                else if (sgv2h > 180)                  { outcome = "🔴 גבוה מדי";     outcomeColor = "#ef4444"; }
                else if (sgv2h < 70)                   { outcome = "🔵 נמוך מדי";     outcomeColor = "#3b82f6"; }
            }

            return {
                date:     new Date(m.created_at).toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit'}),
                time:     new Date(m.created_at).toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'}),
                carbs:    m.carbs  || 0,
                insulin:  m.insulin ? parseFloat(m.insulin).toFixed(1) : 0,
                extended: m.extended ? parseFloat(m.extended).toFixed(1) : null,
                duration: m.duration || null,
                sgvAt:    sgvAt,
                peak:     peak,
                rise:     rise,
                sgv2h:    sgv2h,
                sgv3h:    sgv3h,
                outcome:  outcome,
                outcomeColor: outcomeColor
            };
        });

        // === סטטיסטיקות מצטברות ===
        var good    = results.filter(function(r){return r.outcome.includes("✅");}).length;
        var midRes  = results.filter(function(r){return r.outcome.includes("🟡");}).length;
        var highRes = results.filter(function(r){return r.outcome.includes("🔴");}).length;
        var low     = results.filter(function(r){return r.outcome.includes("🔵");}).length;
        var n       = results.length;

        var avgCarbs = (results.reduce(function(a,b){return a+(b.carbs||0);},0)/n).toFixed(0);
        var avgIns   = (results.reduce(function(a,b){return a+parseFloat(b.insulin||0);},0)/n).toFixed(2);
        var avgCR    = results.filter(function(r){return r.carbs>0&&parseFloat(r.insulin)>0;})
                              .reduce(function(a,r){return a+(r.carbs/parseFloat(r.insulin));},0);
        var crCount  = results.filter(function(r){return r.carbs>0&&parseFloat(r.insulin)>0;}).length;
        var avgCRval = crCount ? (avgCR/crCount).toFixed(1) : null;

        var withPeak  = results.filter(function(r){return r.peak;});
        var avgPeak   = withPeak.length ? Math.round(withPeak.reduce(function(a,b){return a+b.peak;},0)/withPeak.length) : null;
        var withRise  = results.filter(function(r){return r.rise;});
        var avgRise   = withRise.length ? Math.round(withRise.reduce(function(a,b){return a+b.rise;},0)/withRise.length) : null;
        var with2h    = results.filter(function(r){return r.sgv2h;});
        var avg2h     = with2h.length ? Math.round(with2h.reduce(function(a,b){return a+b.sgv2h;},0)/with2h.length) : null;

        // מידע על חלוקת הזרקה בהיסטוריה
        var extResults = results.filter(function(r){return r.extended;});
        var hasExt = extResults.length > 0;
        var avgExtPct = hasExt
            ? Math.round(extResults.reduce(function(a,r){
                var t=parseFloat(r.insulin)+parseFloat(r.extended||0);
                return t>0 ? a+(parseFloat(r.insulin)/t*100) : a;
              },0)/extResults.length)
            : INSULIN_CONFIG.splitNow;
        var avgExtDur = hasExt
            ? Math.round(extResults.reduce(function(a,r){return a+(r.duration||60);},0)/extResults.length)
            : INSULIN_CONFIG.splitDelay;

        // === ניתוח מעמיק ===
        // בדוק: האם ארוחות שהיה להן extended יצאו טוב יותר?
        var extGoodPct  = extResults.length
            ? extResults.filter(function(r){return r.outcome.includes("✅");}).length/extResults.length
            : null;
        var noExtResults = results.filter(function(r){return !r.extended;});
        var noExtGoodPct = noExtResults.length
            ? noExtResults.filter(function(r){return r.outcome.includes("✅");}).length/noExtResults.length
            : null;

        // בדוק: האם עלייה מהירה (sgv peak גבוה + rise גדול) → רמז ל-pre-bolus
        var fastRise = avgRise && avgRise > 70;
        var highPeak = avgPeak && avgPeak > 200;

        // === בניית המלצות ===
        var recs = [];
        var profRec = []; // המלצות לשינוי פרופיל

        // -- ניתוח לפי תוצאות --
        var highPct = (highRes+midRes)/n;
        var lowPct  = low/n;
        var goodPct = good/n;

        if (goodPct >= 0.65) {
            recs.push("✅ <b>ההזרקה על " + mealName + " עובדת טוב (" + Math.round(goodPct*100) + "% תוצאות טובות)</b>");
            recs.push("📌 המשך עם: " + avgIns + "U" + (hasExt ? " (" + avgExtPct + "/" + (100-avgExtPct) + " על " + avgExtDur + " דק')" : "") + " על ~" + avgCarbs + "g");
        }

        if (highPct > 0.4) {
            recs.push("📈 <b>גבוה אחרי ארוחה ב-" + Math.round(highPct*100) + "% מהפעמים</b> (2ש' ממוצע: " + (avg2h||'?') + ")");

            // המלצה ספציפית לכמות
            var suggestedIns = (parseFloat(avgIns) + (highPct > 0.6 ? 1.0 : 0.5)).toFixed(1);
            recs.push("💉 שקול הגדלת אינסולין: " + avgIns + "U → <b>" + suggestedIns + "U</b>");

            // המלצה לשינוי חלוקה
            if (hasExt && avgExtPct < 80) {
                var newNowPct = Math.min(85, avgExtPct + 10);
                recs.push("🔀 שקול שינוי חלוקה: " + avgExtPct + "/" + (100-avgExtPct) + " → <b>" + newNowPct + "/" + (100-newNowPct) + "</b>");
            } else if (!hasExt) {
                recs.push("⏱️ שקול הוספת הזרקה מורחבת: 70% עכשיו + 30% בעוד 60 דק'");
            }

            // האם לשנות CR?
            if (avgCRval) {
                var sugCR = (parseFloat(avgCRval) * 0.9).toFixed(1);
                profRec.push("📊 CR נוכחי בפועל: " + avgCRval + "g/U → שקול הקטנה ל-<b>" + sugCR + "g/U</b> (יותר אינסולין לגרם)");
            }
        }

        if (lowPct > 0.25) {
            recs.push("📉 <b>נמוך אחרי ארוחה ב-" + Math.round(lowPct*100) + "% מהפעמים</b>");
            var suggestedInsLow = (parseFloat(avgIns) - 0.5).toFixed(1);
            recs.push("💉 שקול הקטנת אינסולין: " + avgIns + "U → <b>" + suggestedInsLow + "U</b>");
            if (hasExt && avgExtPct > 65) {
                var newNowLow = Math.max(50, avgExtPct - 10);
                recs.push("🔀 שקול הקטנת החלק הראשון: " + avgExtPct + "% → <b>" + newNowLow + "%</b>");
            }
            if (avgCRval) {
                var sugCRup = (parseFloat(avgCRval) * 1.1).toFixed(1);
                profRec.push("📊 CR: שקול הגדלה ל-<b>" + sugCRup + "g/U</b> (פחות אינסולין לגרם)");
            }
        }

        if (fastRise && highPct > 0.3) {
            recs.push("⚡ עלייה מהירה ממוצעת +" + avgRise + " — שקול pre-bolus: הזרק <b>5–10 דק' מוקדם יותר</b>");
        }

        if (hasExt && extGoodPct !== null && noExtGoodPct !== null) {
            var extBetter = extGoodPct > noExtGoodPct + 0.15;
            var noBetter  = noExtGoodPct > extGoodPct + 0.15;
            if (extBetter) recs.push("📊 הזרקה מורחבת הצליחה ב-" + Math.round(extGoodPct*100) + "% לעומת " + Math.round(noExtGoodPct*100) + "% ללא — <b>המשך עם Extended</b>");
            if (noBetter)  recs.push("📊 ללא Extended הצלחה " + Math.round(noExtGoodPct*100) + "% לעומת " + Math.round(extGoodPct*100) + "% עם — שקול ביטול Extended");
        }

        if (!recs.length) {
            recs.push("🔍 אין מספיק נתונים להמלצה ברורה (" + n + " רישומים, נדרש 5+)");
        }

        // === בניית HTML ===
        var html = "";

        // סיכום סטטיסטי
        html += "<div style='background:#0a0a14;border-radius:10px;padding:12px;margin-bottom:10px;font-size:13px'>";
        html += "<b style='color:var(--blue)'>" + mealName + "</b> — " + n + " רישומים / 90 יום<br><br>";
        html += "• פחמימות ממוצע: <b>" + avgCarbs + "g</b><br>";
        html += "• אינסולין ממוצע: <b>" + avgIns + "U</b>";
        if (hasExt) html += " (" + avgExtPct + "/" + (100-avgExtPct) + " על " + avgExtDur + " דק')";
        html += "<br>";
        if (avgCRval) html += "• CR בפועל: <b>" + avgCRval + "g/U</b><br>";
        if (avg2h)    html += "• ממוצע 2ש': <b>" + avg2h + " mg/dL</b><br>";
        if (avgPeak)  html += "• שיא ממוצע: <b>" + avgPeak + " mg/dL</b>";
        if (avgRise)  html += " (עלייה +" + avgRise + ")";
        html += "<br>";
        // progress bar תוצאות
        var colBar = function(v,c,label){
            return "<span style='color:"+c+"'>"+label+" "+v+"</span> ";
        };
        html += "<br>תוצאות: " + colBar(good,"#10b981","✅") + colBar(midRes,"#f59e0b","🟡") + colBar(highRes,"#ef4444","🔴") + colBar(low,"#3b82f6","🔵");
        html += "</div>";

        // המלצות עיקריות
        html += "<div style='background:rgba(59,130,246,0.08);border:1px solid var(--blue-dim);border-radius:10px;padding:12px;margin-bottom:10px'>";
        html += "<b>💡 המלצות הזרקה:</b><br><br>";
        html += recs.join("<br>");
        html += "</div>";

        // המלצות פרופיל
        if (profRec.length) {
            html += "<div style='background:rgba(245,158,11,0.08);border:1px solid #f59e0b;border-radius:10px;padding:12px;margin-bottom:10px'>";
            html += "<b>⚙️ המלצות לשינוי פרופיל:</b><br><br>";
            html += profRec.join("<br>");
            html += "</div>";
        }

        // היסטוריה
        html += "<div style='font-size:12px;margin-bottom:10px'><b>היסטוריה:</b><br><br>";
        results.forEach(function(r){
            html += "<div style='background:#111120;border-radius:8px;padding:8px;margin-bottom:5px;border-right:3px solid " + r.outcomeColor + "'>";
            html += "<b>" + r.date + " " + r.time + "</b> — " + r.outcome + "<br>";
            html += "<small style='color:#aaa'>" + r.carbs + "g | " + r.insulin + "U";
            if (r.extended) html += "+" + r.extended + "U(" + (r.duration||"?") + "דק')";
            if (r.sgvAt) html += " | " + r.sgvAt + "→";
            if (r.peak)  html += r.peak + "(שיא)";
            if (r.sgv2h) html += "→2ש':" + r.sgv2h;
            if (r.sgv3h) html += "→3ש':" + r.sgv3h;
            html += "</small></div>";
        });
        html += "</div>";

        html += "<small style='color:#555'>⚕️ ניתוח עזר — ניהול T1D דורש ליווי אנדוקרינולוג.</small>";
        showPopup("🍽️ ניתוח: " + mealName, html);

    } catch(e) {
        showPopup("שגיאה", "שגיאה בניתוח: " + e.message);
        console.error(e);
    }
}

// ========= המלצת מינון =========
async function recommendDose(inputText) {
    showPopup("💉 מחשב מינון...", '<div style="text-align:center;padding:20px"><span class="spinner" style="width:24px;height:24px;border-width:3px"></span></div>');

    var nowH  = new Date().getHours();
    var prof  = fullHistory.profile;
    var sgv   = nsData.currentSgv;
    var iob   = parseFloat(nsData.iob)  || 0;
    var cob   = parseFloat(nsData.cob)  || 0;
    var delta = nsData.delta || 0;
    var ins   = getInsulinProfile();

    if (!sgv)  { showPopup("שגיאה", "אין נתוני סוכר נוכחיים. לחץ רענן."); return; }
    if (!prof) { showPopup("שגיאה", "אין פרופיל טעון. לחץ רענן."); return; }

    var cr      = parseFloat(profileValueAt(prof.carbratio || prof.carbRatio || prof.ic, nowH) || 10);
    var isf     = parseFloat(profileValueAt(prof.sens || prof.sensitivity, nowH) || 50);
    var targetBG = 100;

    // === פרסור חכם של קלט ===
    var cleanInput = inputText
        .replace(/כמה\s+להזריק/gi,'').replace(/כמה\s+אינסולין/gi,'')
        .replace(/מינון/gi,'').replace(/על/gi,'').trim();

    var foodName    = cleanInput || null;
    var foodDurH    = 3;
    var foodNote    = "";
    var foodMatches = [];
    var carbsInput  = null;
    var quantityInput = null;
    var partialFactor = null; // חלק מהמנה (0.5, 0.25, וכו')

    // --- זיהוי חלק מהמנה ---
    // "חצי", "חלק", "רבע", "שליש", "שני שליש", אחוז, X מתוך Y
    var partialMap = [
        { re: /חצי|מחצית|50%|1\/2/i,           val: 0.5  },
        { re: /רבע|25%|1\/4/i,                   val: 0.25 },
        { re: /שלושה\s*רבע|75%|3\/4/i,           val: 0.75 },
        { re: /שליש|33%|1\/3/i,                   val: 0.333},
        { re: /שני\s*שליש|שניים\s*שליש|66%|2\/3/,val: 0.667},
        { re: /רק\s+חלק|אכלתי\s+חלק|חלק\s+מ/i, val: 0.5  }
    ];
    partialMap.forEach(function(pm){
        if (pm.re.test(cleanInput)) { partialFactor = pm.val; }
    });
    // "X מתוך Y" / "X מ-Y יחידות"
    var mTovaMatch = cleanInput.match(/(\d+)\s*מתוך\s*(\d+)/i) ||
                     cleanInput.match(/(\d+)\s*מ-?(\d+)/i);
    if (mTovaMatch) partialFactor = parseInt(mTovaMatch[1]) / parseInt(mTovaMatch[2]);

    // הסר מילות חלק מהטקסט לפני חיפוש אוכל
    var cleanForFood = cleanInput
        .replace(/חצי|מחצית|רבע|שלושה\s*רבע|שליש|שני\s*שליש|רק\s+חלק|אכלתי\s+חלק|חלק\s+מ/gi,'')
        .replace(/\d+\s*מתוך\s*\d+/gi,'').replace(/\d+\s*מ-?\d+/gi,'')
        .replace(/\d+%/g,'').trim();

    // --- פרסור פחמימות ידניות עם שם אוכל ---
    // "פיתה 60" → פיתה עם 60g (עוקף ברירת מחדל)
    // "פיצה 3" → 3 חתיכות פיצה
    // "35 גרם פיתה" / "פיתה 35g"
    var carbsExplicit = null;
    var carbsGramMatch = cleanForFood.match(/(\d+)\s*(?:g|גרם|ג'|ג\b)/i);
    if (carbsGramMatch) carbsExplicit = parseInt(carbsGramMatch[1]);

    // --- פיצול מאכלים ---
    var foodParts = cleanForFood.split(/\s*[+]\s*|\s+ו(?=\s|[א-ת])|\s+עם\s+/i)
        .map(function(p){ return p.trim(); }).filter(Boolean);

    var totalCarbs = 0;
    var maxDur = 3;
    var names = [];
    var notes = [];

    foodParts.forEach(function(part, idx) {
        // חפש מספר בתחילת/סוף החלק = כמות
        var numFirst = part.match(/^(\d+(?:\.\d+)?)\s*(.+)/);
        var numLast  = part.match(/^(.+?)\s+(\d+(?:\.\d+)?)$/);

        var qty = 1;
        var partName = part;
        var partCarbs = null; // פחמימות מפורשות לחלק זה

        if (numFirst) {
            // "3 חתיכות פיצה" / "60 פיתה"
            var num = parseFloat(numFirst[1]);
            var rest = numFirst[2].replace(/(?:חתיכ\w*|יחידות|כוסות?|כפות?|פרוס\w*|יח\b|סלייס\w*)/i,'').trim();
            var fm2 = findFood(rest);
            if (fm2) { qty = num; partName = rest; }
            else if (num < 200 && !fm2) {
                // ייתכן שזה כמות גרם על אוכל שאחריו
                partCarbs = num; partName = rest;
            }
        } else if (numLast) {
            // "פיתה 60" / "פיצה 3"
            var rest2 = numLast[1].trim();
            var num2  = parseFloat(numLast[2]);
            var fm3   = findFood(rest2);
            if (fm3) {
                // האם המספר הגיוני כמות (1-10) או כגרמים (>15)?
                if (num2 <= 10 && fm3.data.perUnit) { qty = num2; partName = rest2; }
                else { partCarbs = num2; partName = rest2; } // "פיתה 60" → 60g
            } else {
                partName = rest2; partCarbs = num2;
            }
        }

        var fm = findFood(partName);
        if (fm) {
            var carbs = partCarbs !== null ? partCarbs : fm.data.carbs * qty;
            totalCarbs += carbs;
            if (fm.data.durationH > maxDur) maxDur = fm.data.durationH;
            names.push(fm.key + (qty > 1 ? " ×" + qty : "") + (partCarbs ? " (" + partCarbs + "g)" : ""));
            if (fm.data.notes) notes.push(fm.data.notes);
            foodMatches.push({ key: fm.key, data: fm.data, qty: qty, carbs: carbs, customCarbs: partCarbs !== null });
        } else {
            // לא נמצא — אם יש פחמימות מפורשות, השתמש בהן
            if (partCarbs) { totalCarbs += partCarbs; names.push(partName + " (" + partCarbs + "g)"); }
            else if (carbsExplicit && idx === 0) { totalCarbs += carbsExplicit; names.push(partName + " (" + carbsExplicit + "g)"); }
            else names.push(partName);
        }
    });

    if (totalCarbs > 0) {
        carbsInput = Math.round(totalCarbs);
        foodDurH   = maxDur;
        foodName   = names.join(" + ");
        foodNote   = notes.join(", ");
    }

    // --- החלת חלק מהמנה ---
    var fullCarbs    = carbsInput;  // שמור לחישוב יתרה
    var plannedIns   = null;        // כמה תוכנן להזריק על המנה המלאה
    if (partialFactor !== null && carbsInput) {
        carbsInput = Math.round(carbsInput * partialFactor);
        foodName   = (foodName||'') + " (" + Math.round(partialFactor*100) + "% מהמנה)";
    }

    var foodMatch = foodMatches.length === 1 ? { key: foodMatches[0].key, data: foodMatches[0].data } : null;

    // === היסטוריה על האוכל ===
    var histData  = null;
    var learnedCR = null;
    var learnedExt = false;
    var learnedPre = false;
    var learnedExtPct  = INSULIN_CONFIG.splitNow;
    var learnedExtDur  = INSULIN_CONFIG.splitDelay;

    if (foodName) {
        try {
            var tr90 = fullHistory.treatments || [];
            if (tr90.length < 50) {
                var from90 = new Date(Date.now() - 90*86400000).toISOString();
                var tRes = await nsGet('/api/v1/treatments.json?find[created_at][$gte]=' + from90 + '&count=2000');
                var eRes = await nsGet('/api/v1/entries.json?find[dateString][$gte]=' + from90 + '&count=10000');
                if (tRes.ok) tr90 = await tRes.json();
                var allE = eRes.ok ? await eRes.json() : fullHistory.entries;
            } else { var allE = fullHistory.entries; }

            var keyword = foodName.toLowerCase();
            var matched = tr90.filter(function(t){
                return (t.notes||t.foodType||'').toLowerCase().includes(keyword) && t.carbs > 0;
            });

            if (matched.length >= 2) {
                var valid = matched.filter(function(m){ return m.insulin > 0 && m.carbs > 0; });
                if (valid.length) learnedCR = valid.reduce(function(a,m){ return a+m.carbs/m.insulin; },0)/valid.length;

                var outcomes = matched.map(function(m){
                    var mt = new Date(m.created_at).getTime();
                    var post2 = allE.filter(function(e){
                        var dt = new Date(e.dateString||e.date).getTime()-mt;
                        return dt>90*60000 && dt<150*60000;
                    }).map(function(e){return e.sgv;});
                    return post2.length ? Math.round(post2.reduce(function(a,b){return a+b;},0)/post2.length) : null;
                }).filter(Boolean);

                var highC = outcomes.filter(function(v){return v>180;}).length;
                var lowC  = outcomes.filter(function(v){return v<70;}).length;
                var avgO  = outcomes.length ? Math.round(outcomes.reduce(function(a,b){return a+b;},0)/outcomes.length) : null;

                // Extended bolus stats
                var extMatched = matched.filter(function(m){ return m.extended > 0 || m.duration > 0; });
                learnedExt = extMatched.length / matched.length > 0.3;
                if (extMatched.length) {
                    var avgExtPct = extMatched.reduce(function(a,m){
                        var total = parseFloat(m.insulin||0)+parseFloat(m.extended||0);
                        return total ? a+(parseFloat(m.insulin||0)/total*100) : a;
                    },0)/extMatched.length;
                    learnedExtPct = Math.round(avgExtPct);
                    learnedExtDur = Math.round(extMatched.reduce(function(a,m){return a+(m.duration||60);},0)/extMatched.length);
                }

                // pre-bolus detection
                var peaks30 = matched.map(function(m){
                    var mt = new Date(m.created_at).getTime();
                    var at = allE.filter(function(e){ return Math.abs(new Date(e.dateString||e.date).getTime()-mt)<10*60000; });
                    var p  = allE.filter(function(e){ var dt=new Date(e.dateString||e.date).getTime()-mt; return dt>0&&dt<45*60000; });
                    var base = at.length?at[0].sgv:null, peak=p.length?Math.max.apply(null,p.map(function(e){return e.sgv;})):null;
                    return (base&&peak)?peak-base:null;
                }).filter(Boolean);
                learnedPre = peaks30.length && peaks30.reduce(function(a,b){return a+b;},0)/peaks30.length > 60;

                histData = { count:matched.length, avgOut:avgO, highCount:highC, lowCount:lowC, total:outcomes.length };
            }
        } catch(e) { console.error("hist error",e); }
    }

    // === חישוב CR אפקטיבי לפי היסטוריה ===
    var effectiveCR = cr;
    var crNote = "";
    if (learnedCR && histData && histData.total >= 3) {
        if (histData.highCount / histData.total > 0.4) {
            effectiveCR = learnedCR * 0.9;
            crNote = " (הותאם: ב-" + Math.round(histData.highCount/histData.total*100) + "% מהפעמים היה גבוה)";
        } else if (histData.lowCount / histData.total > 0.3) {
            effectiveCR = learnedCR * 1.1;
            crNote = " (הותאם: ב-" + Math.round(histData.lowCount/histData.total*100) + "% מהפעמים היה נמוך)";
        }

    // === חישוב מינון ===
    var carbsToCalc  = carbsInput || 0;
    var carbInsulin  = carbsToCalc > 0 ? carbsToCalc / effectiveCR : 0;

    // תיקון סוכר: (סוכר נוכחי - מטרה) ÷ ISF
    // מחושב גם אם אין פחמימות — לתיקון עצמאי
    var corrInsulinRaw = (sgv - targetBG) / isf;
    var corrInsulin    = Math.max(0, corrInsulinRaw);

    // התחשבות בפעילות גופנית
    var actAdj    = getActivityReduction();
    var actFactor = 1 - actAdj.reduction;

    var totalRaw = (carbInsulin + corrInsulin) * actFactor - iob;
    var total    = Math.max(0, totalRaw);
    var totalR   = (Math.round(total * 2) / 2).toFixed(1);

    // === Loop מציע (Correction Bolus בלבד לפי devicestatus) ===
    // שולף ה-recommendedBolus האחרון מה-Loop אם קיים
    var loopActual = null;
    try {
        var loopEnacted   = dig(fullHistory.devStatus, 'loop.enacted');
        var loopSuggested = dig(fullHistory.devStatus, 'loop.recommendedBolus');
        if (loopSuggested !== null) loopActual = parseFloat(loopSuggested);
        else if (loopEnacted && loopEnacted.bolusVolume) loopActual = parseFloat(loopEnacted.bolusVolume);
    } catch(e) {}
    var loopSuggestion = loopActual !== null ? loopActual : Math.max(0, carbInsulin + corrInsulin - iob);
    var loopR = (Math.round(loopSuggestion * 2) / 2).toFixed(1);

    // חלוקת מינון — תמיד לפי הגדרות (70/30)
    // לתיקון בלבד (ללא פחמימות) — אין split, הכל עכשיו
    var useExt     = carbsToCalc > 0 && INSULIN_CONFIG.splitNow < 100;
    var nowPct     = useExt ? (learnedExt ? learnedExtPct : INSULIN_CONFIG.splitNow) : 100;
    var laterPct   = 100 - nowPct;
    var extDur     = learnedExt ? learnedExtDur : INSULIN_CONFIG.splitDelay;
    var doseNow    = total * nowPct   / 100;
    var doseLater  = total * laterPct / 100;
    var doseNowR   = (Math.round(doseNow   * 2) / 2).toFixed(1);
    var doseLaterR = (Math.round(doseLater * 2) / 2).toFixed(1);
    var preBolusMin = carbsToCalc > 0 ? ins.preMeal : 0;

    // === תחזית סוכר אחרי הזרקה ===
    var sgvAtPeak = Math.round(Math.max(60, Math.min(400,
        sgv + (carbsToCalc > 0 ? carbsToCalc * 4 : 0) - (doseNow * isf))));
    var sgvAt2h   = Math.round(Math.max(60, Math.min(400,
        sgv + carbsToCalc*3 - total*isf*0.7 + (delta*12*1.5))));
    var sgvAt3h   = Math.round(Math.max(60, Math.min(400,
        sgv + carbsToCalc*2 - total*isf*0.9 + (delta*12*0.5))));

    // תיקון נוסף אחרי שיא אם עדיין גבוה

    var corrAfterR = "0.0";
    if (sgvAtPeak > 180) {
        corrAfter  = Math.max(0, (sgvAtPeak - targetBG) / isf - parseFloat(doseLaterR));
        corrAfterR = (Math.round(corrAfter * 2) / 2).toFixed(1);
    }

    // === מעקב אחרי המלצה קודמת ===
    // בדיקה: האם בוצעה הזרקה בפועל ב-NS תוך 15 דק' מהמלצה אחרונה?
    var lastRecKey  = 'last_recommendation';
    var followUpMsg = null;
    try {
        var memData = await loadMemory();
        var lastRec = memData[lastRecKey] ? memData[lastRecKey].value : null;
        if (lastRec && (Date.now() - new Date(lastRec.date).getTime()) < 30*60000) {
            // בדוק טיפולים ב-NS מאז ההמלצה
            var sinceRec = new Date(lastRec.date).toISOString();
            var checkRes = await nsGet('/api/v1/treatments.json?find[created_at][$gte]=' + sinceRec + '&count=10');
            if (checkRes.ok) {
                var recentTreats = await checkRes.json();
                var bolusGiven = recentTreats.filter(function(t){ return t.insulin > 0; });
                if (bolusGiven.length > 0) {
                    var actualIns = bolusGiven.reduce(function(a,t){ return a+(t.insulin||0); }, 0).toFixed(2);
                    var recIns    = lastRec.totalR;
                    var diff      = (parseFloat(actualIns) - parseFloat(recIns)).toFixed(1);
                    if (Math.abs(parseFloat(diff)) < 0.2) {
                        followUpMsg = { type:'match', text:'✅ ההזרקה בוצעה בהתאם להמלצה (' + actualIns + 'U)' };
                    } else if (parseFloat(actualIns) < parseFloat(recIns)) {

// הפחתת אינסולין לארוחות לפי עצימות (%)
var INTENSITY_REDUCTION = { low: 0, medium: 25, high: 40 };
var POST_ACTIVITY_REDUCTION = { low: 10, medium: 20, high: 30 };

function switchTab(id, el) {
    ['tab-home','tab-activity','tab-reports'].forEach(function(t){
        document.getElementById(t).classList.add('hidden');
    });
    document.getElementById(id).classList.remove('hidden');
    document.querySelectorAll('.nav-tab').forEach(function(t){ t.classList.remove('active'); });
    el.classList.add('active');
    if (id === 'tab-activity') renderActivities();
}

function saveActivities() {
    try { localStorage.setItem('loopie_activities', JSON.stringify(ACTIVITIES)); } catch(e) {}
}

function addActivity() {
    var name  = document.getElementById('act-name').value.trim();
    var day   = parseInt(document.getElementById('act-day').value);
    var from  = document.getElementById('act-from').value;
    var to    = document.getElementById('act-to').value;
    var intens= document.getElementById('act-intensity').value;
    if (!name || !from || !to) { alert('נא למלא שם, שעת התחלה וסיום'); return; }
    ACTIVITIES.push({ id: Date.now(), name: name, day: day, from: from, to: to, intensity: intens });
    saveActivities();
    renderActivities();
    document.getElementById('act-name').value = '';
    document.getElementById('act-from').value = '';
    document.getElementById('act-to').value   = '';
}

function deleteActivity(id) {
    ACTIVITIES = ACTIVITIES.filter(function(a){ return a.id !== id; });
    saveActivities();
    renderActivities();
    checkActiveActivity();
}

function renderActivities() {
    var list = document.getElementById('activity-list');
    if (!ACTIVITIES.length) {
        list.innerHTML = '<div style="color:var(--muted);font-size:13px">אין פעילויות שמורות</div>';
        return;
    }
    list.innerHTML = ACTIVITIES.map(function(a){
        return "<div class='activity-item'>" +
            "<div class='act-info'>" +
            "<div class='act-name'>" + a.name + " <small style='color:var(--muted)'>(" + INTENSITY_LABELS[a.intensity] + ")</small></div>" +
            "<div class='act-time'>יום " + DAYS_HE[a.day] + " | " + a.from + "–" + a.to + "</div>" +
            "</div>" +
            "<button class='act-del' onclick='deleteActivity(" + a.id + ")'>🗑</button>" +
            "</div>";
    }).join('');
}

// בדיקה האם יש פעילות פעילה עכשיו או בקרוב
function checkActiveActivity() {
    var now    = new Date();
    var dayN   = now.getDay();
    var nowMin = now.getHours()*60 + now.getMinutes();
    var banner = document.getElementById('activity-banner');
    if (!banner) return null;

    var active = null, upcoming = null;

    ACTIVITIES.forEach(function(a){
        if (a.day !== dayN) return;
        var sp = SPORT_PLANS[a.intensity] || SPORT_PLANS.medium;
        var fromMin = parseInt(a.from.split(':')[0])*60 + parseInt(a.from.split(':')[1]);
        var toMin   = parseInt(a.to.split(':')[0])*60   + parseInt(a.to.split(':')[1]);
        var preWin  = sp.basalPre;    // דק' לפני שמתחילים להתריע
        var postWin = sp.postDurationH * 60;

        if (nowMin >= fromMin && nowMin <= toMin) {
            active   = { act: a, sp: sp, type: 'during', fromMin: fromMin, toMin: toMin };
        } else if (nowMin < fromMin && (fromMin - nowMin) <= Math.max(preWin, 60)) {
            upcoming = { act: a, sp: sp, type: 'before', minsLeft: fromMin - nowMin };
        } else if (nowMin > toMin && (nowMin - toMin) <= postWin) {
            active   = { act: a, sp: sp, type: 'after', minsAgo: nowMin - toMin };
        }
    });

    var result = active || upcoming;
    if (result) {
        var a  = result.act;
        var sp = result.sp;
        var msg = "", color = "#f59e0b";

        if (result.type === 'before') {
            var minsLeft = result.minsLeft;
            msg = "<b>⏰ " + a.name + "</b> בעוד " + minsLeft + " דק'<br>";
            if (sp.basalReduction > 0 && minsLeft <= sp.basalPre) {
                msg += "• הפחת בזאלי <b>" + sp.basalReduction + "%</b> עכשיו<br>";
            }
            msg += "• יעד סוכר לאימון: <b>" + sp.targetBGRange + "</b><br>";
            if (sp.preCarbsG > 0 && nsData.currentSgv && nsData.currentSgv < 140) {
                msg += "• 🍬 אכול <b>" + sp.preCarbsG + "g</b> פחמימות מהירות לפני<br>";
            }
            msg += "• <span style='color:#f59e0b;cursor:pointer' onclick='showSportPlan(\"' + a.id + '\")'>📋 הצג תוכנית ספורט מלאה</span>";
        }
        else if (result.type === 'during') {
            color = "#10b981";
            var minsLeft2 = result.toMin - nowMin;
            msg = "<b>🏃 " + a.name + " פעיל עכשיו</b> (נגמר בעוד " + minsLeft2 + " דק')<br>";
            msg += "• יעד: <b>" + sp.targetBGRange + "</b>";
            if (sp.noBolusRule) msg += " | <b style='color:#ef4444'>אל תזריק אינסולין!</b>";
            msg += "<br>• <span style='color:#10b981;cursor:pointer' onclick='showSportPlan(\"' + a.id + '\")'>📋 תוכנית ספורט</span>";
        }
        else if (result.type === 'after') {
            color = "#3b82f6";
            var minsAgo = result.minsAgo;
            var hoursLeft = ((sp.postDurationH * 60 - minsAgo) / 60).toFixed(1);
            msg = "<b>✅ " + a.name + "</b> הסתיים לפני " + minsAgo + " דק'<br>";
            msg += "• ⚠️ <b>סכנת היפו!</b> הפחת אינסולין <b>" + sp.postReduction + "%</b> עוד " + hoursLeft + " שעות<br>";
            msg += "• אל תזריק בולוס מלא — בדוק סוכר תחילה";
        }

        banner.innerHTML = "<div class='act-active-banner' style='border-color:" + color + ";background:rgba(0,0,0,0.2)'>" + msg + "</div>";
    } else {
        banner.innerHTML = '';
    }
    return result;
}

// תוכנית ספורט מלאה
function showSportPlan(actId) {
    var act = ACTIVITIES.find(function(a){ return String(a.id) === String(actId); });
    if (!act) return;
    var sp  = SPORT_PLANS[act.intensity] || SPORT_PLANS.medium;
    var dur = act.to && act.from
        ? (parseInt(act.to.split(':')[0])*60+parseInt(act.to.split(':')[1])) -
          (parseInt(act.from.split(':')[0])*60+parseInt(act.from.split(':')[1]))
        : 60;
    var sgv = nsData.currentSgv || 0;
    var iob = parseFloat(nsData.iob) || 0;

    var html = "";

    // כותרת
    html += "<div style='background:#0a0a14;border-radius:10px;padding:12px;margin-bottom:12px;font-size:13px'>";
    html += "🏃 <b>" + act.name + "</b> | " + act.from + "–" + act.to + " (" + dur + " דק')<br>";
    html += sp.label + " — " + sp.description;
    html += "</div>";

    // ===== לפני האימון =====
    // מדעי: הפחתת בזאלי לפני אימון אינטנסיבי מונעת IOB גבוה בזמן פעילות.
    // ב-T1D, אינסולין בזאלי פעיל בזמן ספורט = סיכון מוגבר להיפוגליקמיה.
    html += "<div style='background:rgba(245,158,11,0.08);border:1px solid #f59e0b;border-radius:10px;padding:12px;margin-bottom:10px'>";
    html += "<b style='color:#f59e0b'>⏰ " + sp.basalPre + " דקות לפני האימון:</b><br><br>";

    if (sp.basalReduction > 0) {
        html += "1. 📉 <b>הפחת בזאלי ב-" + sp.basalReduction + "%</b><br>";
        html += "   הגדר תוכנית ספורט ב-Loop למשך <b>" + sp.sportModeMins + " דק'</b><br><br>";
    }

    html += "2. 🎯 <b>שנה יעד סוכר ל-" + sp.targetBGRange + "</b><br>";
    html += "   הגדר ב-Loop: Target BG = <b>" + sp.targetBGDuring + " mg/dL</b><br><br>";

    if (sp.preCarbsG > 0) {
        html += "3. 🍬 <b>אכול " + sp.preCarbsG + "g פחמימות מהירות</b> (ג'ל, סוכריות)<br>";
        if (sgv > 0) {
            if (sgv < 120) html += "   <span style='color:#ef4444'>⚠️ סוכר נמוך (" + sgv + ") — חובה לאכול לפני!</span><br>";
            else if (sgv > 180) html += "   <span style='color:#f59e0b'>סוכר גבוה (" + sgv + ") — דלג על הפחמימות המניעתיות</span><br>";
            else html += "   <span style='color:#10b981'>סוכר " + sgv + " — טוב, אכול כמנהג</span><br>";
        }
        html += "<br>";
    }

    if (iob > 0.5) {
        html += "4. ⚠️ <b>IOB = " + iob + "U</b> — שים לב! אינסולין פעיל עלול להוריד סוכר באימון<br>";
        html += "   המתן לפחות 90 דק' מהזרקה האחרונה לפני עצימות גבוהה<br>";
    }
    html += "</div>";

    // ===== במהלך האימון =====
    html += "<div style='background:rgba(16,185,129,0.08);border:1px solid #10b981;border-radius:10px;padding:12px;margin-bottom:10px'>";
    html += "<b style='color:#10b981'>🏃 במהלך האימון:</b><br><br>";
    html += "• יעד סוכר: <b>" + sp.targetBGRange + " mg/dL</b><br>";
    if (sp.noBolusRule) {
        html += "• ⛔ <b>אל תזריק בולוס!</b> רק Loop יכול לתת SMB קטנים<br>";
    }
    html += "• בדוק סוכר כל 30–45 דק'<br>";
    html += "• אם סוכר < 100: 🍬 אכול 15g פחמימות מהירות<br>";
    html += "• אם סוכר > 220: הפסק לרגע, בדוק קטונים<br>";
    html += "</div>";

    // ===== אחרי האימון =====
    html += "<div style='background:rgba(59,130,246,0.08);border:1px solid var(--blue);border-radius:10px;padding:12px;margin-bottom:10px'>";
    // ירידה מאוחרת (Delayed Hypoglycemia): אחרי פעילות עצימה,
    // השרירים ממשיכים לספוג גלוקוז לחידוש גליקוגן — גורם להיפו מאוחר.
    // בנוסף, רגישות לאינסולין מוגברת ל-12-24 שעות אחרי אימון.
    html += "<b style='color:var(--blue)'>✅ אחרי האימון (" + sp.postDurationH + " שעות):</b><br><br>";
    html += "• הפחת אינסולין <b>" + sp.postReduction + "%</b> לכל הזרקה<br>";
    html += "• השאר יעד <b>" + sp.targetBGRange + "</b> עוד שעה לפחות<br>";
    html += "• בדוק סוכר כל 30 דק' בשעה הראשונה<br>";
    html += "• ⚠️ <b>ירידת סוכר מאוחרת</b> — שכיח " + (act.intensity==='high'?'3–8':'1–4') + " שעות אחרי אימון " + sp.label + "<br>";
    html += "• אם ישן אחרי: שקול 15–20g פחמימות לפני שינה<br>";
    html += "</div>";

    // Loop הגדרות מומלצות
    html += "<div style='background:#111120;border-radius:10px;padding:12px;margin-bottom:10px;font-size:12px'>";
    html += "<b>⚙️ הגדרות Loop מומלצות:</b><br><br>";
    html += "• Exercise Mode / Activity: <b>הפעל</b><br>";
    html += "• Override Target: <b>" + sp.targetBGDuring + " mg/dL</b><br>";
    html += "• Basal: <b>-" + sp.basalReduction + "%</b> למשך <b>" + sp.sportModeMins + " דק'</b><br>";
    html += "• SMB: <b>כבה</b> בזמן אימון";
    if (sp.intensity === 'high') html += " (אם Loop תומך)";
    html += "</div>";

    html += "<small style='color:#555'>⚕️ המלצה לשיקול דעת. כל ספורטאי שונה — עקוב ותכייל.</small>";
    showPopup("📋 תוכנית ספורט — " + act.name, html);
}

// ========= Google Calendar =========
async function connectGoogleCalendar() {
    // Google Calendar API — OAuth2 implicit flow
    var CLIENT_ID = ''; // יש להזין Client ID מגוגל קלנדר API
    if (!CLIENT_ID) {
        showPopup("גוגל קלנדר", "כדי לחבר גוגל קלנדר:<br><br>" +
            "1. גש ל-<b>console.cloud.google.com</b><br>" +
            "2. צור פרויקט חדש<br>" +
            "3. הפעל Google Calendar API<br>" +
            "4. צור OAuth 2.0 Client ID (Web App)<br>" +
            "5. הכנס את ה-Client ID בקוד (שורת CLIENT_ID)<br><br>" +
            "<small style='color:#888'>לחלופין, הוסף פעילויות ידנית בלשונית פעילות</small>");
        return;
    }
    var authUrl = "https://accounts.google.com/o/oauth2/auth" +
        "?client_id=" + CLIENT_ID +

}

async function fetchGoogleCalendarEvents(token) {
    var now   = new Date().toISOString();
    var week  = new Date(Date.now() + 7*86400000).toISOString();
    var url   = "https://www.googleapis.com/calendar/v3/calendars/primary/events" +
                "?timeMin=" + encodeURIComponent(now) +
                "&timeMax=" + encodeURIComponent(week) +
                "&singleEvents=true&orderBy=startTime&maxResults=20";
    var res = await fetch(url, { headers: { Authorization: "Bearer " + token }});
    var data = await res.json();
    if (!data.items) return;

    // ייבוא אירועים כפעילויות
    var activityKeywords = ['gym','mma','ריצה','שחייה','אופניים','יוגה','פילאטיס','ספורט','כושר','אימון','חוג'];
    data.items.forEach(function(ev){
        var title = (ev.summary||'').toLowerCase();
        var isActivity = activityKeywords.some(function(k){ return title.includes(k); });
        if (!isActivity) return;

        var start = new Date(ev.start.dateTime || ev.start.date);
        var end   = new Date(ev.end.dateTime   || ev.end.date);
        var day   = start.getDay();
        var from  = start.getHours().toString().padStart(2,'0') + ':' + start.getMinutes().toString().padStart(2,'0');
        var to    = end.getHours().toString().padStart(2,'0')   + ':' + end.getMinutes().toString().padStart(2,'0');

        // הוסף רק אם לא קיים כבר
        var exists = ACTIVITIES.find(function(a){ return a.name===ev.summary && a.day===day && a.from===from; });
        if (!exists) {
            ACTIVITIES.push({ id: Date.now()+Math.random(), name: ev.summary, day: day, from: from, to: to, intensity: 'medium', source: 'gcal' });
        }
    });
    saveActivities();
    renderActivities();
    document.getElementById('gcal-banner').style.display = 'block';
    document.getElementById('gcal-next').innerText = data.items.length + " אירועים נמצאו השבוע";
}

// התחשבות בפעילות בחישוב מינון
function getActivityReduction() {
    var result = checkActiveActivity();
    if (!result) return { reduction: 0, note: null };
    var a = result.act;
    if (result.type === 'during' || result.type === 'before') {
        return {
            reduction: INTENSITY_REDUCTION[a.intensity] / 100,
            note: "🏃 " + a.name + " — הפחתה " + INTENSITY_REDUCTION[a.intensity] + "% לפעילות"
        };
    } else if (result.type === 'after') {
        return {
            reduction: POST_ACTIVITY_REDUCTION[a.intensity] / 100,
            note: "✅ אחרי " + a.name + " — הפחתה " + POST_ACTIVITY_REDUCTION[a.intensity] + "% (2ש' אחרי)"
        };
    }
    return { reduction: 0, note: null };
}

// ========= מערכת זיכרון — Nightscout כבסיס נתונים =========
// שומר: תוצאות הזרקות, שינויי פרמטרים (CR/ISF/בזאלי), היסטוריית ספורט, הערות
var MEMORY_TAG = 'loopie_memory';
var memCache = null; // cache מקומי

// שלוף זיכרון מ-NS
async function loadMemory() {
    if (memCache) return memCache;
    try {
        var res = await nsGet('/api/v1/treatments.json?find[notes][$regex]=loopie_memory&count=200');
        if (!res.ok) return {};
        var items = await res.json();
        var mem = {};
        items.forEach(function(t) {
            try {
                var data = JSON.parse(t.notes.replace('loopie_memory:', ''));
                if (data.key) mem[data.key] = { value: data.value, id: t._id, updated: t.created_at };
            } catch(e) {}
        });
        memCache = mem;
        return mem;
    } catch(e) { console.error('loadMemory error:', e); return {}; }
}

// שמור ערך בזיכרון
async function saveMemory(key, value) {
    var mem = await loadMemory();
    var existing = mem[key];
    var noteStr = 'loopie_memory:' + JSON.stringify({ key: key, value: value });

    try {
        if (existing && existing.id) {
            // עדכן treatment קיים
            await fetch(nsUrl() + '/api/v1/treatments/' + existing.id + '?api_secret=' + nsSecret(), {
                method: 'PUT', mode: 'cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ notes: noteStr, created_at: new Date().toISOString(), eventType: 'Note' })
            });
        } else {
            // צור treatment חדש
            await fetch(nsUrl() + '/api/v1/treatments/?api_secret=' + nsSecret(), {
                method: 'POST', mode: 'cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify([{ notes: noteStr, created_at: new Date().toISOString(), eventType: 'Note', enteredBy: 'Loopie' }])
            });
        }
        if (memCache) memCache[key] = { value: value, updated: new Date().toISOString() };
    } catch(e) { console.error('saveMemory error:', e); }
}

// רשום תוצאת הזרקה
async function recordInjectionOutcome(foodName, carbs, insulin, extended, duration, sgvBefore, sgvPeak, sgv2h, outcome) {
    var mem  = await loadMemory();
    var key  = 'food_' + foodName.replace(/\s+/g, '_').toLowerCase();
    var prev = (mem[key] && mem[key].value) ? mem[key].value : { outcomes: [], paramHistory: [] };
    prev.outcomes    = prev.outcomes    || [];
    prev.paramHistory= prev.paramHistory|| [];

    var prof   = fullHistory.profile;
    var nowH   = new Date().getHours();
    var crNow  = prof ? profileValueAt(prof.carbratio || prof.carbRatio || prof.ic, nowH) : null;
    var isfNow = prof ? profileValueAt(prof.sens || prof.sensitivity, nowH) : null;
    var basalNow = nsData.basal;

    prev.outcomes.unshift({
        date:      new Date().toISOString(),
        carbs:     carbs,
        insulin:   parseFloat(insulin),
        extended:  extended  || 0,
        duration:  duration  || 0,
        splitPct:  INSULIN_CONFIG.splitNow,
        insulinType: INSULIN_CONFIG.type,
        sgvBefore: sgvBefore || nsData.currentSgv,
        sgvPeak:   sgvPeak,
        sgv2h:     sgv2h,
        iob:       parseFloat(nsData.iob) || 0,
        cob:       parseFloat(nsData.cob) || 0,
        delta:     nsData.delta || 0,
        cr:        crNow,
        isf:       isfNow,
        basal:     basalNow,
        hour:      nowH,
        outcome:   outcome,
        activityNear: (function(){
            var r = checkActiveActivity();
            return r ? { name: r.act.name, type: r.type, intensity: r.act.intensity } : null;
        })()
    });
    if (prev.outcomes.length > 30) prev.outcomes = prev.outcomes.slice(0, 30);

    // שמור גם שינויי פרמטרים לאורך זמן
    var lastParam = prev.paramHistory[0];
    if (!lastParam || lastParam.cr !== crNow || lastParam.isf !== isfNow) {
        prev.paramHistory.unshift({ date: new Date().toISOString(), cr: crNow, isf: isfNow, basal: basalNow });
        if (prev.paramHistory.length > 10) prev.paramHistory = prev.paramHistory.slice(0, 10);
    }

    await saveMemory(key, prev);
    if (memCache) memCache[key] = { value: prev };
}

// שמור שינוי פרמטר גלובלי (CR/ISF/בזאלי)
async function recordParamChange(paramName, oldVal, newVal, reason) {
    var mem  = await loadMemory();
    var prev = (mem['param_history'] && mem['param_history'].value) ? mem['param_history'].value : [];
    prev.unshift({ date: new Date().toISOString(), param: paramName, oldVal: oldVal, newVal: newVal, reason: reason || '' });
    if (prev.length > 50) prev = prev.slice(0, 50);
    await saveMemory('param_history', prev);
}

// שמור תוצאת אימון ספורט
async function recordSportOutcome(actName, intensity, basalReduction, targetBG, sgvDuring, sgvAfter, outcome) {
