// ========= ניטור מגמת עלייה לפיצול הזרקה =========
function checkPendingDose() {
    if (!PENDING_DOSE || PENDING_DOSE.triggered) return;
    var sgv   = nsData.currentSgv;
    var delta = nsData.delta;
    var iob   = parseFloat(nsData.iob) || 0;
    var minsElapsed = (Date.now() - PENDING_DOSE.setAt) / 60000;

    // תנאי להתראה:
    // 1. עלייה בדלתא (סוכר עולה) OR
    // 2. עברו יותר מ-45 דק' ועדיין לא הוזרק
    var risingTrend = delta >= 2 && sgv > 130;
    var timeout     = minsElapsed > 45;

    if (!risingTrend && !timeout) return;

    PENDING_DOSE.triggered = true;
    clearInterval(window._pendingTimer);

    // חשב כמה להשלים — בהתחשב ב-IOB שנצבר
    var remainDose = parseFloat(PENDING_DOSE.insLater || PENDING_DOSE.doseLaterR || 0);
    var iobVal     = parseFloat(iob) || 0;
    var iobAdjust  = Math.max(0, remainDose - iobVal * 0.3).toFixed(1); // הפחת חלק מ-IOB

    // חשב מה Loop היה מציע עכשיו
    var loopNowSug = PENDING_DOSE.loopR;

    var reason = risingTrend
        ? "📈 מגמת עלייה! סוכר " + sgv + " ועולה +" + delta + "/5דק'"
        : "⏰ עברו " + Math.round(minsElapsed) + " דק' מהזרקה הראשונה";

    var html2 = "<div style='background:rgba(245,158,11,0.12);border:1px solid #f59e0b;border-radius:8px;padding:10px;margin-bottom:10px'>" + reason + "</div>";

    html2 += "<div style='background:#0a0a14;border-radius:10px;padding:14px;margin-bottom:10px'>";
    html2 += "<div style='font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px'>💉 השלמת הזרקה על " + PENDING_DOSE.foodName + "</div>";

    var iobAdjustSafe = isNaN(parseFloat(iobAdjust)) ? "0.0" : parseFloat(iobAdjust).toFixed(1);
    html2 += "<div style='display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1a1a28'>";
    html2 += "<span style='color:#aaa'>💉 השלמה מומלצת (Loopie)</span><b style='color:#10b981;font-size:24px'>" + iobAdjustSafe + "U</b></div>";

    html2 += "<div style='display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1a1a28'>";
    html2 += "<span style='color:#aaa'>🔄 Loop מציע כעת</span><b style='color:#6b6b80'>" + loopNowSug + "U</b></div>";

    html2 += "<div style='display:flex;justify-content:space-between;align-items:center;padding:8px 0'>";
    html2 += "<span style='color:#aaa'>⏱️ משך הזרקה</span><b style='color:#3b82f6'>" + PENDING_DOSE.foodDurH + " שעות (יתרה)</b></div>";

    html2 += "<div style='font-size:11px;color:#888;margin-top:8px'>";
    html2 += "מקורית: " + PENDING_DOSE.doseLaterR + "U | מותאם לפי IOB נוכחי (" + iob + "U): " + iobAdjust + "U";
    html2 += "</div></div>";

    if (Math.abs(parseFloat(iobAdjust) - parseFloat(loopNowSug)) < 0.3) {

// ========= מעקב אוטומטי אחרי ביצוע בNS =========
var _lastMonitorCheck = Date.now();
var _monitorTimer = null;
var _lastKnownTreatments = []; // treatments ידועים

async function startNSMonitor() {
    if (_monitorTimer) clearInterval(_monitorTimer);
    // טעינה ראשונית
    var initRes = await nsGet('/api/v1/treatments.json?count=5');
    if (initRes.ok) {
        _lastKnownTreatments = await initRes.json();
        _lastMonitorCheck = Date.now();
    }
    // בדיקה כל 90 שניות
    _monitorTimer = setInterval(checkNSActions, 90000);
}

async function checkNSActions() {
    try {
        var since = new Date(_lastMonitorCheck - 5000).toISOString();
        var res = await nsGet('/api/v1/treatments.json?find[created_at][$gte]=' + since + '&count=20');
        if (!res.ok) return;
        var newTreats = await res.json();
        _lastMonitorCheck = Date.now();

        // סנן treatments חדשים שלא ראינו
        var knownIds = _lastKnownTreatments.map(function(t){ return t._id; });
        // זיהוי החלפת פוד מ-NS treatments
        newTreats.forEach(function(t){
            if (knownIds.includes(t._id)) return;
            var ev = (t.eventType||'').toLowerCase();
            if (ev.includes('site') || ev.includes('pod') || ev.includes('cannula')) {
                console.log("Pod changed detected from NS:", t.eventType);
                INSULIN_CONFIG.primingActive = true;
                INSULIN_CONFIG.primingTime   = new Date(t.created_at).getTime();
                setTimeout(function(){ INSULIN_CONFIG.primingActive = false; }, 30*60000);
            }
        });

        var fresh = newTreats.filter(function(t){
            if (knownIds.includes(t._id)) return false;
            if (!t.insulin || t.insulin <= 0) return false;
            // סנן SMB/microbolus
            var ev2 = (t.eventType || '').toLowerCase();
            if (ev2.includes('smb') || ev2.includes('microbolus')) return false;
            // בולוס קטן בלי פחמימות = SMB של Loop
            if (parseFloat(t.insulin||0) < 0.5 && !t.carbs) return false;
            return true;
        });

        if (fresh.length === 0) return;
        _lastKnownTreatments = newTreats;

        // ניתוח כל treatment חדש
        fresh.forEach(function(t) {
            analyzeNewTreatment(t);
        });
    } catch(e) { console.error("NSMonitor error:", e); }
}

async function analyzeNewTreatment(t) {
    var ins   = parseFloat(t.insulin) || 0;
    var carbs = t.carbs || 0;
    var time  = new Date(t.created_at).toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit',hour12:false});
    var evType = t.eventType || 'Bolus';
    var notes  = t.notes || '';

    // למד אימוג'ים
    if (notes && LAST_FOOD_QUERY) {
        var noteEmojis = extractEmojis(notes);
        noteEmojis.forEach(function(em){
            if (!EMOJI_MAP[em]) learnEmoji(em, LAST_FOOD_QUERY);
        });
        LAST_FOOD_QUERY = null;
    }

    // === השוואה להמלצה האחרונה + Push Notification ===

}

// ========= זיהוי כשל פוד =========
// עקרון: פוד לא עובד = IOB גדל אבל סוכר לא יורד כצפוי
// או: הוזרק אינסולין אבל אין ירידת סוכר תוך 45 דק'

var POD_ALERT_SENT = false;
var POD_MONITOR_DATA = { lastInjTime: null, lastInjIns: 0, sgvAtInj: 0, checksPassed: 0 };

async function checkPodFailure() {
    if (POD_ALERT_SENT) return;
    var sgv  = nsData.currentSgv;
    var iob  = parseFloat(nsData.iob) || 0;
    var dlt  = nsData.delta || 0;
    if (!sgv) return;

    // בדיקת טיפולים ב-90 דק' האחרונות
    try {
        var since90 = new Date(Date.now() - 90*60000).toISOString();
        var res = await nsGet('/api/v1/treatments.json?find[created_at][$gte]=' + since90 + '&count=10');
        if (!res.ok) return;
        var treats = await res.json();
        var recentBolus = treats.filter(function(t){ return t.insulin > 0; });
        if (!recentBolus.length) return;

        // הזרקה אחרונה
        var lastBolus = recentBolus[0];
        var bolusIns  = parseFloat(lastBolus.insulin) || 0;
        var bolusAgo  = (Date.now() - new Date(lastBolus.created_at).getTime()) / 60000; // דקות

        // קבל סוכר בזמן ההזרקה
        var bolusTime = new Date(lastBolus.created_at).toISOString();
        var eRes = await nsGet('/api/v1/entries.json?find[dateString][$gte]=' + bolusTime + '&count=3');
        var entries = eRes.ok ? await eRes.json() : [];
        var sgvAtBolus = entries.length ? entries[entries.length-1].sgv : sgv;

        // === חוקי זיהוי כשל — סף מחמיר ===
        var failureScore = 0;
        var failureReasons = [];

        // 1. סוכר מעל 250 וממשיך לעלות למרות IOB גבוה (45+ דק')
        if (bolusAgo > 45 && iob > bolusIns * 0.5) {
            var actualChange = sgv - sgvAtBolus;
            if (sgv > 250 && actualChange > 30) {
                // סוכר גבוה מאוד וממשיך לעלות — חשד חזק
                failureScore += 3;
                failureReasons.push("הוזרק " + bolusIns + "U לפני " + Math.round(bolusAgo) + " דק' — סוכר " + sgv + " עלה +" + actualChange);
            } else if (sgv > 200 && actualChange > 50 && bolusIns > 2) {
                // עלייה משמעותית מאוד
                failureScore += 2;
                failureReasons.push("הוזרק " + bolusIns + "U — עלייה חדה של " + actualChange + " mg/dL");
            }
            // עלייה קטנה (כמו 84→98) = תקין, לא כשל
        }

        // 2. IOB גבוה מאוד + סוכר מעל 250 + עולה בקצב מהיר
        if (iob > 3 && sgv > 250 && dlt >= 3) {
            failureScore += 2;
            failureReasons.push("IOB=" + iob + "U אבל סוכר " + sgv + " ועולה +" + dlt + "/5דק'");
        }

        // 3. סוכר קיצוני (>320) אחרי הזרקה משמעותית
        if (sgv > 320 && iob > 2 && bolusAgo > 30) {
            failureScore += 3;
            failureReasons.push("סוכר " + sgv + " עם IOB " + iob + "U — אין ספיגה!");
        }

        // 4. עלייה חדה מאוד (+5 לפחות) למרות IOB גבוה (>3U)
        if (dlt >= 5 && iob > 3 && bolusAgo > 30 && sgv > 200) {
            failureScore += 2;
            failureReasons.push("עלייה חדה מאוד +" + dlt + "/5דק' למרות IOB " + iob + "U");
        }

        if (failureScore >= 3) {
            POD_ALERT_SENT = true;
            showPodFailureAlert(failureReasons, bolusIns, bolusAgo, sgvAtBolus, sgv);
        }

    } catch(e) { console.error("checkPodFailure:", e); }

    // אפס התראה אם סוכר חזר לטווח תקין
    if (POD_ALERT_SENT && sgv < 180 && sgv > 70) {
        POD_ALERT_SENT = false;
    }
}

    html += "• IOB כרגע: <b>" + iob + "U</b> (לא ספוג!)<br>";
    html += "</div>";

    // המלצות פעולה
    html += "<div style='background:#111120;border-radius:10px;padding:14px;margin-bottom:10px'>";
    html += "<b style='color:#f59e0b'>📋 המלצות בדיקה וטיפול:</b><br><br>";

    html += "<div style='background:#0a0a14;border-radius:8px;padding:10px;margin-bottom:8px;border-right:3px solid #f59e0b'>";
    html += "<b>שלב 1 — בדיקת החיישן ✓</b><br>";
    html += "<small style='color:#aaa'>• בדוק שהחיישן לא נפל<br>• לחץ על אתר ההזרקה — תחוש עמידות?<br>• בדוק שאין דם/הפרשה סביב הפוד</small>";
    html += "</div>";

    html += "<div style='background:#0a0a14;border-radius:8px;padding:10px;margin-bottom:8px;border-right:3px solid #ef4444'>";
    html += "<b>שלב 2 — הזרקה ידנית 💉</b><br>";
    html += "<div style='display:flex;justify-content:space-between;margin-top:6px'>";
    html += "<span style='color:#aaa'>מינון מומלץ</span><b style='color:#ef4444;font-size:20px'>" + corrManualR + "U</b></div>";
    html += "<small style='color:#888'>חישוב: (" + sgvNow + "-100) ÷ " + isf + " = " + corrManual.toFixed(2) + "U − IOB=" + iob + "U × 0.3 = " + corrManualR + "U<br>";
    html += "הזרק לאזור שונה (ירך/בטן) ולא דרך הפוד</small>";
    html += "</div>";

    html += "<div style='background:#0a0a14;border-radius:8px;padding:10px;border-right:3px solid #3b82f6'>";
    html += "<b>שלב 3 — החלפת פוד 🔄</b><br>";
    html += "<small style='color:#aaa'>• הסר את הפוד הנוכחי<br>• בחר אתר חדש (רחוק מהנוכחי)<br>• לאחר הרכבה — בדיקה בדקה הראשונה<br>• רשום Site Change ב-NS</small>";
    html += "</div></div>";

    // בדיקת מעקב
    html += "<div style='background:rgba(245,158,11,0.08);border:1px solid #f59e0b;border-radius:8px;padding:10px;margin-bottom:10px;font-size:13px'>";
    html += "⏱️ <b>מעקב:</b> לאחר ההזרקה הידנית — בדוק סוכר תוך 20 דק'.<br>";
    html += "אם יורד → הפוד היה תקול ✅<br>";
    html += "אם לא יורד → בדוק גם את האינסולין (איכות/תפוגה)";
    html += "</div>";

    // כפתור reset
    html += "<button onclick='POD_ALERT_SENT=false;closePopup()' style='width:100%;padding:10px;background:rgba(16,185,129,0.15);border:1px solid #10b981;border-radius:8px;cursor:pointer;color:#10b981;font-size:13px;font-weight:600'>✅ טופל — המשך מעקב</button>";

// ========= אתחול פוד (Priming) =========
function podChanged() {
    // מסמן שהפוד הוחלף — מפעיל מצב priming
    INSULIN_CONFIG.primingActive = true;
    INSULIN_CONFIG.primingTime   = Date.now();
    var p1 = INSULIN_CONFIG.primingDose1;
    var p2 = INSULIN_CONFIG.primingDose2;
    var totalPriming = (p1 + p2).toFixed(2);

    var html = "<div style='background:rgba(59,130,246,0.1);border:1px solid var(--blue);border-radius:10px;padding:14px;margin-bottom:12px'>";
    html += "<b style='color:var(--blue)'>🔄 מצב אתחול פוד פעיל</b><br><br>";
    html += "• הזרקה ראשונה: <b>" + p1 + "U</b> (fill cannula)<br>";
    html += "• הזרקה שנייה: <b>" + p2 + "U</b> (אחרי דקה)<br>";
    html += "• סה'כ priming: <b>" + totalPriming + "U</b> (לא יחשב ב-IOB)<br>";
    html += "</div>";
    html += "<div style='font-size:13px;color:#aaa'>";
    html += "⚠️ הזרקות הpriming <b>לא נספרות ב-IOB</b> — הן לאתחול הצינורית בלבד.<br><br>";
    html += "📌 אם תזריק על ארוחה בקרוב — המינון יחושב <b>עם תוספת " + p2 + "U</b> (הזרקה השנייה).";
    html += "</div>";
    html += "<br><button onclick='INSULIN_CONFIG.primingActive=false;closePopup()' style='width:100%;padding:10px;background:rgba(16,185,129,0.15);border:1px solid #10b981;border-radius:8px;cursor:pointer;color:#10b981;font-size:13px;font-weight:600'>✅ הפוד מוכן — המשך</button>";

    showPopup("🔄 פוד חדש הותקן", html);

    // אחרי 30 דק' — כבה מצב priming אוטומטית
    setTimeout(function(){ INSULIN_CONFIG.primingActive = false; }, 30*60000);
}

// חישוב תוספת priming להזרקה על ארוחה
function getPrimingAddon() {
    if (!INSULIN_CONFIG.primingActive) return 0;
    var minsElapsed = (Date.now() - (INSULIN_CONFIG.primingTime||0)) / 60000;
    // רק אם הפוד הוחלף בפחות מ-30 דק' וזו הזרקה ראשונה
    if (minsElapsed < 30) return INSULIN_CONFIG.primingDose2; // מוסיף את ה-priming השני
    return 0;
}

// ========= שמירת חילוץ + polling לבדיקת Loop =========
var _activeRescues = []; // מעקב חילוצים פעילים

async function saveRescue(totalCarbsG, fastCarbsG, userSaidLogged) {
    closePopup();
    var sgvNow     = nsData.currentSgv;
    var iobNow     = parseFloat(nsData.iob) || 0;
    var slowCarbsG = totalCarbsG - (fastCarbsG||0);
    var rescueKey  = 'rescue_' + Date.now();
    var rescueTime = Date.now();

    // שמור ב-DB — תמיד, ללא קשר לרישום ב-Loop
    var rescueData = {
        date:          new Date().toISOString(),
        totalCarbs:    totalCarbsG,
        fastCarbs:     fastCarbsG || 0,
        slowCarbs:     slowCarbsG,
        sgvAtRescue:   sgvNow,
        iob:           iobNow,
        userSaidLogged: userSaidLogged,  // מה המשתמש אמר שעשה
        nsVerified:    null,             // ייקבע אחרי בדיקה
        nsLoggedCarbs: null,
        source:        'rescue'
    };
    await saveMemory(rescueKey, rescueData);

    // הוסף למעקב פעיל
    _activeRescues.push({
        key: rescueKey, time: rescueTime,
        fastCarbs: fastCarbsG||0, totalCarbs: totalCarbsG,
        sgvBefore: sgvNow, userSaidLogged: userSaidLogged,
        checks: 0
    });

    // הפעל polling אם לא פועל כבר
    startRescuePolling();

    // אישור מיידי
    var h = "<div style='background:#0a0a14;border-radius:10px;padding:12px;font-size:13px'>";
    h += "• נשמר ב-DB: <b>" + totalCarbsG + "g</b>";
    if (slowCarbsG > 0) h += " (" + (fastCarbsG||0) + "g מהיר + " + slowCarbsG + "g פתיבר)";
    h += "<br>";
    if (userSaidLogged) {
        h += "• אמרת שעידכנת Loop: <b>" + (fastCarbsG||0) + "g</b><br>";
        h += "• המערכת תאמת מול NS תוך כמה דקות";
    } else {
        h += "• לא עודכן Loop — המערכת עוקבת<br>";
        h += "• אם תעדכן Loop בהמשך — תזוהה אוטומטית";
    }
    h += "<br><small style='color:#888'>בדיקת סוכר ב-15 דק'</small></div>";
    showPopup("✅ חילוץ נשמר", h);
}

var _rescuePollingTimer = null;
function startRescuePolling() {
    if (_rescuePollingTimer || !_activeRescues.length) return;
    _rescuePollingTimer = setInterval(async function() {
        if (!_activeRescues.length) {
            clearInterval(_rescuePollingTimer);
            _rescuePollingTimer = null;
            return;
        }
        for (var i = _activeRescues.length - 1; i >= 0; i--) {
            var r = _activeRescues[i];
            var minsElapsed = (Date.now() - r.time) / 60000;
            r.checks++;

            // === בדיקה 1-10 דק': האם נרשם ב-Loop? ===
            if (minsElapsed < 12 && !r.nsVerified) {
                try {
                    var since = new Date(r.time - 2*60000).toISOString();
                    var tr = await nsGet('/api/v1/treatments.json?find[created_at][$gte]=' + since + '&count=10');
                    if (tr.ok) {
                        var treats = await tr.json();
                        var carbEntry = treats.find(function(t){
                            return t.carbs > 0 && !t.insulin &&
                                   new Date(t.created_at).getTime() > r.time - 60000;
                        });
                        if (carbEntry) {
                            r.nsVerified   = true;
                            r.nsLoggedCarbs = carbEntry.carbs;
                            // עדכן DB
                            var mem3 = await loadMemory();
                            var d3   = (mem3[r.key] && mem3[r.key].value) || {};
                            d3.nsVerified    = true;
                            d3.nsLoggedCarbs = carbEntry.carbs;
                            await saveMemory(r.key, d3);

                            // האם מה שנרשם תואם למה שהמלצנו?
                            var diff = Math.abs(carbEntry.carbs - r.fastCarbs);
                            var matchOK = diff <= 3;
                            if (!r.userSaidLogged) {
                                // לא אמר שעידכן — הפתעה! נרשם בכל זאת
                                showPopup("📱 זוהה רישום ב-Loop", "זוהה רישום של <b>" + carbEntry.carbs + "g</b> ב-Loop ✅<br>" + (matchOK ? "תואם להמלצה" : "⚠️ מומלץ: " + r.fastCarbs + "g"));
                            } else if (!matchOK) {
                                // אמר שעידכן אבל כמות שגויה
                                showPopup("⚠️ אי-התאמה ב-Loop", "נרשם <b>" + carbEntry.carbs + "g</b> ב-Loop<br>מומלץ: <b>" + r.fastCarbs + "g</b><br><small style='color:#888'>הפרש: " + (carbEntry.carbs - r.fastCarbs) + "g</small>");
                            }
                        } else if (r.userSaidLogged && minsElapsed > 8) {
                            // אמר שעידכן Loop אבל לא נמצא ב-NS — תזכורת
                            showPopup("⏰ תזכורת", "לא נמצא רישום ב-Loop עדיין.<br>רשום <b>" + r.fastCarbs + "g</b> ב-Loop כעת.");
                            r.userSaidLogged = false; // לא לשלוח שוב
                        }
                    }
                } catch(e) {}
            }

            // === בדיקה 15 דק': האם הסוכר עלה? ===
            if (minsElapsed >= 15 && !r.sgvChecked) {
                r.sgvChecked = true;
                var sgvNow2 = nsData.currentSgv;
                var rise    = sgvNow2 - r.sgvBefore;
                var outcome = rise > 15 ? 'effective' : 'not_effective';

                // עדכן DB עם תוצאה
                var mem4 = await loadMemory();
                var d4   = (mem4[r.key] && mem4[r.key].value) || {};
                d4.sgvAfter = sgvNow2; d4.rise = rise; d4.outcome = outcome;
                await saveMemory(r.key, d4);
                await saveMemory(r.key + '_result', { sgvBefore: r.sgvBefore, sgvAfter: sgvNow2, rise: rise, outcome: outcome });

                // הצג תוצאה
                var rHtml = "<div style='font-size:13px'>";
                rHtml += "• סוכר: <b>" + r.sgvBefore + " → " + sgvNow2 + "</b> (" + (rise>=0?"+":"") + rise + ")<br>";
                rHtml += "• " + (outcome==='effective' ? "✅ החילוץ הצליח!" : "⚠️ סוכר לא עלה — שקול חזרה על הטיפול");
                if (!r.nsVerified && !r.userSaidLogged) {
                    rHtml += "<br><br>📱 לא זוהה רישום ב-Loop — הנתון נשמר ב-DB בלבד";
                }
                rHtml += "</div>";
                showPopup("📊 מעקב חילוץ", rHtml);
            }

            // הסר אחרי 20 דק'
            if (minsElapsed > 20) {
                _activeRescues.splice(i, 1);
            }
        }
    }, 3 * 60000); // בדיקה כל 3 דקות
}

// ========= לוגים ומעקב =========
var _allLogs = []; // cache

async function loadLogs(filter) {
    var listEl  = document.getElementById('logs-list');
    var statsEl = document.getElementById('logs-stats');
    if (!listEl) return;
    listEl.innerHTML = "<div style='text-align:center;padding:20px;color:#888'><span class='spinner' style='width:16px;height:16px;border-width:2px'></span> טוען...</div>";

    try {
        var mem = await loadMemory();
        var logs = [];

        Object.keys(mem).forEach(function(k) {
            var v = mem[k].value;
            if (!v) return;

            // ארוחות + תוצאות
            if (k.startsWith('food_') && v.outcomes && v.outcomes.length) {
                v.outcomes.forEach(function(o) {
                    logs.push({
                        type:    'food',
                        key:     k,
                        name:    k.replace('food_','').replace(/_/g,' '),
                        date:    o.date,
                        carbs:   o.carbs,
                        insulin: o.insulin,
                        sgv2h:   o.sgv2h,
                        outcome: o.outcome,
                        cr:      o.cr,
                        isf:     o.isf,
                        hour:    o.hour
                    });
                });
                // AI recommendations
                if (v.aiRecs) {
                    v.aiRecs.forEach(function(r) {
                        logs.push({
                            type:    'ai_rec',
                            key:     k,
                            name:    k.replace('food_','').replace(/_/g,' '),
                            date:    r.date,
                            carbs:   r.carbs,
                            insulin: r.totalIns,
                            durationH: r.durationH,
                            splitPct:  r.splitPct
                        });
                    });
                }
            }

            // חילוץ
            if (k.startsWith('rescue_') && !k.includes('_result')) {
                var result = mem[k + '_result'] ? mem[k + '_result'].value : null;
                logs.push({
                    type:      'rescue',
                    key:       k,
                    name:      'חילוץ',
                    date:      v.date,
                    carbs:     v.carbs,
                    sgvBefore: v.sgvAtRescue,
                    sgvAfter:  result ? result.sgvAfter : null,
                    rise:      result ? result.rise : null,
                    outcome:   result ? result.outcome : 'pending',
                    inLoop:    v.recordedInLoop
                });
            }

            // ספורט
            if (k.startsWith('sport_') && v.sessions) {
                v.sessions.forEach(function(s) {
                    logs.push({
                        type:      'sport',
                        key:       k,
                        name:      k.replace('sport_','').replace(/_/g,' '),
                        date:      s.date,
                        intensity: s.intensity,
                        outcome:   s.outcome
                    });
                });
            }

            // כשל פוד
            if (k.startsWith('pod_failure_')) {
                logs.push({
                    type:    'pod_failure',
                    key:     k,
                    name:    'כשל פוד',
                    date:    v.date,
                    reasons: v.reasons,
                    corr:    v.corrGiven
                });
            }

            // המלצות אחרונות
            if (k === 'last_recommendation') {
                // skip — מוצג כחלק מ-food
            }
        });

        // מיין לפי תאריך — חדש ראשון
        logs.sort(function(a,b){ return new Date(b.date) - new Date(a.date); });
        _allLogs = logs;

        // סינון
        var filtered = logs;
        if (filter !== 'all') {
            filtered = logs.filter(function(l){ return l.type === filter || (filter==='food' && l.type==='ai_rec'); });
        }

        // סטטיסטיקות
        var foods   = logs.filter(function(l){return l.type==='food';});
        var good    = foods.filter(function(l){return l.outcome==='good';}).length;
        var highL   = foods.filter(function(l){return l.outcome==='high';}).length;
        var lowL    = foods.filter(function(l){return l.outcome==='low';}).length;
        var rescues = logs.filter(function(l){return l.type==='rescue';}).length;
        if (statsEl) statsEl.innerHTML = foods.length + " הזרקות | ✅ " + good + " | 🔴 " + highL + " | 🔵 " + lowL + " | 🔵 חילוצים: " + rescues;

        renderLogs(filtered);
    } catch(e) {
        if (listEl) listEl.innerHTML = "<div style='color:#888;text-align:center;padding:16px'>שגיאה בטעינת לוגים: " + e.message + "</div>";
    }
}

function renderLogs(logs) {
    var listEl = document.getElementById('logs-list');
    if (!listEl) return;
    if (!logs.length) { listEl.innerHTML = "<div style='color:#888;text-align:center;padding:20px'>אין לוגים</div>"; return; }

    var html = logs.map(function(l) {
        var date = new Date(l.date).toLocaleString('he-IL',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false});
        var color = '#888';
        var icon  = '📋';
        var detail = '';

        if (l.type === 'food') {
            color = l.outcome==='good'?'#10b981':l.outcome==='high'?'#ef4444':'#3b82f6';
            icon  = l.outcome==='good'?'✅':l.outcome==='high'?'🔴':'🔵';
            detail = l.carbs+'g | '+parseFloat(l.insulin||0).toFixed(1)+'U';
            if (l.sgv2h) detail += ' | 2ש\': '+l.sgv2h;
            if (l.hour !== undefined) detail += ' | '+l.hour+':00';
        } else if (l.type === 'ai_rec') {
            color = '#6b6b80'; icon = '🤖';
            detail = 'AI: '+l.carbs+'g / '+parseFloat(l.insulin||0).toFixed(1)+'U / '+l.durationH+'ש\'';
        } else if (l.type === 'rescue') {
            color = l.outcome==='effective'?'#10b981':l.outcome==='not_effective'?'#ef4444':'#888';
            icon  = '🔵';
            detail = l.carbs+'g' + (l.rise ? ' | עלייה: +'+l.rise : '') + (l.inLoop?' | נרשם ב-Loop':'');
        } else if (l.type === 'sport') {
            color = '#f59e0b'; icon = '🏃';
            detail = l.intensity + ' | ' + (l.outcome||'');
        } else if (l.type === 'pod_failure') {
            color = '#ef4444'; icon = '⚠️';
            detail = 'תיקון: '+(l.corr||'?')+'U';
        }

        return "<div style='background:#0a0a14;border-radius:8px;padding:10px;margin-bottom:6px;border-right:3px solid "+color+";display:flex;justify-content:space-between;align-items:center'>" +
            "<div>" +
            "<div style='font-size:13px'>" + icon + " <b>" + l.name + "</b></div>" +
            "<div style='font-size:11px;color:#888;margin-top:2px'>" + detail + "</div>" +
            "</div>" +
            "<div style='font-size:11px;color:#666;text-align:left'>" + date + "</div>" +
            "</div>";
    }).join('');
    listEl.innerHTML = html;
}

function filterLogs() {
    var q = (document.getElementById('logs-search')||{}).value || '';
    var filtered = _allLogs.filter(function(l){
        return l.name.includes(q) || (l.outcome||'').includes(q);
    });
    renderLogs(filtered);
}

function exportLogs() {
    if (!_allLogs.length) { alert('אין לוגים לייצוא'); return; }
    var header = 'תאריך,סוג,שם,פחמימות,אינסולין,סוכר2ש,תוצאה,שעה\n';
    var rows = _allLogs.map(function(l){
        return [
            new Date(l.date).toLocaleString('he-IL'),
            l.type, l.name,
            l.carbs||'', parseFloat(l.insulin||0).toFixed(2),
            l.sgv2h||'', l.outcome||'', l.hour||''
        ].join(',');
    }).join('\n');
    var blob = new Blob(['\uFEFF'+header+rows], {type:'text/csv;charset=utf-8'});
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement('a');
    a.href   = url;
    a.download = 'loopie_logs_' + new Date().toISOString().substring(0,10) + '.csv';
    a.click();
    URL.revokeObjectURL(url);
}

async function importFromGmail(token) {
    if (!token) return;
    GMAIL_TOKEN = token;
    localStorage.setItem('loopie_gmail_token', token);

    var keywords = (localStorage.getItem('loopie_keywords') || 'חוג,mma,כדורגל').split(',').map(function(k){ return k.trim(); });
    var query = encodeURIComponent(keywords.join(' OR '));

    showPopup("📧 מחפש חוגים...", '<div style="text-align:center;padding:20px"><span class="spinner" style="width:20px;height:20px;border-width:3px"></span></div>');

    try {
        // שלוף מיילים רלוונטיים
        var listRes = await fetch(
            'https://gmail.googleapis.com/gmail/v1/users/me/messages?q=' + query + '&maxResults=20',
            { headers: { Authorization: 'Bearer ' + token } }
        );
        if (!listRes.ok) throw new Error('Gmail API error: ' + listRes.status);
        var listData = await listRes.json();
        var messages = listData.messages || [];

        if (!messages.length) {
            showPopup("📧 Gmail", "לא נמצאו מיילים עם מילות המפתח.<br>נסה לשנות את מילות החיפוש בהגדרות.");
            return;
        }

        // שלוף תוכן מיילים
        var found = [];
        for (var i = 0; i < Math.min(messages.length, 10); i++) {
            try {
                var msgRes = await fetch(
                    'https://gmail.googleapis.com/gmail/v1/users/me/messages/' + messages[i].id + '?format=metadata&metadataHeaders=Subject,From,Date',
                    { headers: { Authorization: 'Bearer ' + token } }
                );
                var msgData = await msgRes.json();
                var subject = '';
                var date    = '';
                (msgData.payload.headers || []).forEach(function(h){
                    if (h.name === 'Subject') subject = h.value;
                    if (h.name === 'Date')    date    = h.value;
                });
                found.push({ subject: subject, date: new Date(date).toLocaleDateString('he-IL') });
            } catch(e2) {}
        }

        // בקש מ-Claude AI לנתח את המיילים ולחלץ חוגים
        var prompt = 'אתה עוזר לניהול לוח זמנים. קיבלת רשימת כותרות מיילים.' +
            '\nחלץ מהם חוגים/אימונים עם יום, שעה ושם.' +
            '\nהחזר JSON בלבד: [{"name":"שם","day":0-6,"from":"HH:MM","to":"HH:MM","intensity":"low/medium/high"}]' +
            '\nיום 0=ראשון, 1=שני...' +
            '\nאם אין מידע על שעה — דלג על הפריט.' +
            '\n\nמיילים:\n' + found.map(function(f,i){ return (i+1) + '. ' + f.subject; }).join('\n');

        var aiRes = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + geminiKey(), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: { maxOutputTokens: 500, temperature: 0.1 }
            })
        });
        var aiData = await aiRes.json();
        var rawText = '';
        try { rawText = aiData.candidates[0].content.parts[0].text.trim(); } catch(e2) {}
        var jsonMatch = rawText.match(/\[[\s\S]*\]/);
        if (!jsonMatch) throw new Error('No JSON from AI');
        var activities = JSON.parse(jsonMatch[0]);

        if (!activities.length) {
            showPopup("📧 Gmail", "נמצאו " + found.length + " מיילים אבל לא זוהו חוגים עם שעות.<br>נסה להוסיף ידנית דרך האומניבוקס.");
            return;
        }

        // הוסף לרשימה
        var added = 0;
        activities.forEach(function(a){
            if (!a.name || a.day === undefined || !a.from || !a.to) return;
            var exists = ACTIVITIES.find(function(ex){ return ex.name === a.name && ex.day === a.day; });
            if (!exists) {
                ACTIVITIES.push({ id: Date.now()+added, name: a.name, day: a.day, from: a.from, to: a.to, intensity: a.intensity||'medium' });
                added++;
            }
        });
        saveActivities();
        renderActivities();
        checkActiveActivity();

        showPopup("✅ יובאו חוגים", "נמצאו " + found.length + " מיילים.<br>יובאו <b>" + added + " חוגים חדשים</b>:<br><br>" +
            activities.map(function(a){ return "• <b>" + a.name + "</b> | " + ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'][a.day] + " " + (a.from||'') + "–" + (a.to||''); }).join("<br>"));

    } catch(e) {
        console.error("Gmail import:", e);
        showPopup("שגיאה", "שגיאה בייבוא: " + e.message);
    }
}

// ========= Web Push Notifications =========
var _notifPermission = 'default';

async function requestNotificationPermission() {
    if (!('Notification' in window)) return;
    if (Notification.permission === 'granted') {
        _notifPermission = 'granted';
        return;
    }
    if (Notification.permission !== 'denied') {
        var perm = await Notification.requestPermission();
        _notifPermission = perm;
    }
}

function sendNotification(title, body, options) {
    if (_notifPermission !== 'granted') return;
    try {
        var opts = Object.assign({
            icon: 'https://raw.githubusercontent.com/barakkam/loopie/main/favicon.ico',
            badge: 'https://raw.githubusercontent.com/barakkam/loopie/main/favicon.ico',
            vibrate: [200, 100, 200],
            tag: 'loopie-alert',
            renotify: true,
            requireInteraction: false
        }, options || {});
        var n = new Notification(title, Object.assign({ body: body }, opts));
        n.onclick = function() { window.focus(); n.close(); };
        // גם הצג popup במסך
        setTimeout(function(){ showPopup(title, body); }, 100);
    } catch(e) {
        // fallback — רק popup
        showPopup(title, body);
    }
}

// ========= מעקב שינויי פרמטרים — כלל 3 ימים =========
async function analyzeParamChanges() {
    var mem = await loadMemory();
    var paramHist = mem['param_history'] ? (mem['param_history'].value || []) : [];
    if (!paramHist.length) return null;

    var last = paramHist[0];
    var daysSinceChange = (Date.now() - new Date(last.date).getTime()) / 86400000;
    var stabilized = daysSinceChange >= 3;

    return {
        lastChange: last,
        daysSince: daysSinceChange.toFixed(1),
        stabilized: stabilized,
        count: paramHist.length
    };
}

async function recordParamChange(paramName, oldVal, newVal, reason) {
    var mem = await loadMemory();
    var prev = (mem['param_history'] && mem['param_history'].value) ? mem['param_history'].value : [];
    prev.unshift({
        date: new Date().toISOString(),
        param: paramName, oldVal: oldVal, newVal: newVal,
        reason: reason || '',
        outcomes: [] // תוצאות שנאספות ב-3 ימים הבאים
    });
    if (prev.length > 30) prev = prev.slice(0,30);
    await saveMemory('param_history', prev);
}

// ========= ניתוח כשלי פוד/חיישן מהיסטוריה =========
async function analyzeFailureHistory() {
    var mem = await loadMemory();
    var html = "<div style='font-size:13px'>";

    // כשלי פוד
    var podFails = Object.keys(mem).filter(function(k){ return k.startsWith('pod_failure_'); });
    if (podFails.length) {
        html += "<div style='background:#0a0a14;border-radius:10px;padding:12px;margin-bottom:10px'>";
        html += "<b style='color:#ef4444'>⚠️ כשלי פוד בהיסטוריה: " + podFails.length + "</b><br><br>";
        podFails.slice(0,3).forEach(function(k){

async function drawMiniChart() {
    try {
        var canvas = document.getElementById('mini-chart');
        if (!canvas) return;
        var wrap = document.getElementById('mini-chart-wrap');

        // שלוף 3 שעות אחרונות
        var since3h = new Date(Date.now() - 3*3600000).toISOString();
        var res = await nsGet('/api/v1/entries.json?find[dateString][$gte]=' + since3h + '&count=50');
        if (!res.ok) return;
        var entries = await res.json();
        if (!entries.length) return;
        entries.reverse(); // מהישן לחדש

        // נתוני ניבוי מ-Loop
        var predicted = [];
        var dev3 = fullHistory.devStatus;
        if (dev3) {
            var predObj = dig(dev3, 'loop.predicted');
            if (predObj) {
                var predVals = predObj.values || (Array.isArray(predObj) ? predObj : null);
                var predStart = predObj.startDate ? new Date(predObj.startDate).getTime() : Date.now();
                if (predVals && Array.isArray(predVals)) {
                    predicted = predVals.slice(0, 12);
                    window._predStartTime = predStart; // שמור לגרף
                }
            } else {
                var predFlat = dig(dev3, 'loop.predicted.values');
                if (predFlat && Array.isArray(predFlat)) predicted = predFlat.slice(0, 12);
            }
        }

        wrap.style.display = 'block';
        var ctx = canvas.getContext('2d');
        var W = canvas.offsetWidth || 300;
        canvas.width = W * window.devicePixelRatio || W;
        canvas.height = 80 * (window.devicePixelRatio || 1);
        ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
        W = canvas.offsetWidth || 300;
        var H = 80;

        var allVals = entries.map(function(e){ return e.sgv; }).concat(predicted);
        var minV = Math.max(40,  Math.min.apply(null, allVals) - 20);
        var maxV = Math.min(400, Math.max.apply(null, allVals) + 20);
        // קבוע: 70-280
        minV = Math.min(minV, 60); maxV = Math.max(maxV, 290);

        document.getElementById('chart-low-lbl').innerText  = '70';
        document.getElementById('chart-high-lbl').innerText = '280';
        document.getElementById('chart-range-lbl').innerText = 'עכשיו';

        function yPos(v) { return H - ((v - minV) / (maxV - minV)) * H; }

        ctx.clearRect(0, 0, W, H);

        // אזורי טווח
        ctx.fillStyle = 'rgba(16,185,129,0.06)';
        ctx.fillRect(0, yPos(180), W, yPos(70) - yPos(180));

        // קווי 70 ו-180
        ctx.strokeStyle = '#1a2a1a'; ctx.lineWidth = 0.5; ctx.setLineDash([3,3]);
        ctx.beginPath(); ctx.moveTo(0, yPos(70));  ctx.lineTo(W, yPos(70));  ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, yPos(180)); ctx.lineTo(W, yPos(180)); ctx.stroke();
        ctx.setLineDash([]);

        // קו אנכי "עכשיו"
        var nowX = entries.length / (entries.length + predicted.length) * W;
        ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(nowX, 0); ctx.lineTo(nowX, H); ctx.stroke();

        // ציור נקודות היסטוריה
        var totalPts = entries.length + predicted.length;
        entries.forEach(function(e, i) {
            var x = (i / totalPts) * W;
            var y = yPos(e.sgv);
            var color = e.sgv > 180 ? '#f59e0b' : e.sgv < 70 ? '#3b82f6' : '#10b981';
            ctx.fillStyle = color;
            ctx.beginPath(); ctx.arc(x, y, 2.5, 0, Math.PI*2); ctx.fill();
        });

        // ציור קו צפי
        if (predicted.length > 0) {
            ctx.strokeStyle = 'rgba(107,107,128,0.7)';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([4,3]);
            ctx.beginPath();
            // חבר מנקודה האחרונה של היסטוריה
            var lastX = ((entries.length-1) / totalPts) * W;
            var lastY = yPos(entries[entries.length-1].sgv);
            ctx.moveTo(lastX, lastY);
            predicted.forEach(function(v, i) {
                var x = ((entries.length + i) / totalPts) * W;
                var y = yPos(v);
                ctx.lineTo(x, y);
            });
            ctx.stroke();
            ctx.setLineDash([]);

            // נקודת קצה הצפי
            var predColor = predicted[predicted.length-1] > 180 ? '#f59e0b' : predicted[predicted.length-1] < 70 ? '#3b82f6' : '#10b981';
            ctx.fillStyle = predColor;
            ctx.beginPath();
            ctx.arc(((entries.length + predicted.length - 1) / totalPts) * W, yPos(predicted[predicted.length-1]), 3, 0, Math.PI*2);
            ctx.fill();

            // ערך צפי
            ctx.fillStyle = '#888'; ctx.font = '10px sans-serif'; ctx.textAlign = 'right';
            ctx.fillText(Math.round(predicted[predicted.length-1]), W-2, yPos(predicted[predicted.length-1])-4);
        }

    } catch(e) { console.error('chart:', e); }
}

// זיהוי פוד/חיישן חדש מ-CAGE/SAGE
var _lastKnownCage = null;
var _lastKnownSage = null;

async function autoDetectNewDevices() {
    // שלוף CAGE/SAGE מ-DeviceStatus
    try {
        var dsRes = await nsGet('/api/v1/devicestatus.json?count=1');
        if (!dsRes.ok) return;
        var dsArr = await dsRes.json();
        var ds = Array.isArray(dsArr) ? dsArr[0] : dsArr;
        if (!ds) return;

        // CAGE — גיל פוד בשעות
        var cageVal = null;
        var dsStr = JSON.stringify(ds);
        var cMatch = dsStr.match(/"cage"\s*:\s*([\d.]+)/i);
        if (cMatch) cageVal = parseFloat(cMatch[1]);

        // SAGE — גיל חיישן בשעות  
        var sageVal = null;
        var sMatch = dsStr.match(/"sage"\s*:\s*([\d.]+)/i);
        if (sMatch) sageVal = parseFloat(sMatch[1]);

        // זיהוי פוד חדש — CAGE ירד (החלפה)
        if (cageVal !== null && _lastKnownCage !== null) {
            if (_lastKnownCage > 2 && cageVal < 2) {
                // פוד הוחלף!
                console.log("New pod detected! CAGE:", cageVal, "h");
                INSULIN_CONFIG.primingActive = true;
                INSULIN_CONFIG.primingTime   = Date.now() - cageVal * 3600000;
                setTimeout(function(){ INSULIN_CONFIG.primingActive = false; }, 30*60000);
                // הצג בנר
                var bannerEl = document.getElementById('activity-banner');
                if (bannerEl) {
                    bannerEl.innerHTML = '🔄 <b>פוד חדש זוהה!</b> — priming פעיל (0.2+0.2U יתוסף להזרקה הבאה)';
                    bannerEl.style.display = 'block';
                    setTimeout(function(){ if(bannerEl) bannerEl.style.display='none'; }, 10*60000);
                }
                sendNotification("🔄 פוד חדש זוהה!", "CAGE = " + cageVal.toFixed(1) + "h — priming פעיל", {tag:'loopie-pod-new'});
            }
        }

        // זיהוי חיישן חדש — SAGE ירד
        if (sageVal !== null && _lastKnownSage !== null) {
            if (_lastKnownSage > 24 && sageVal < 3) {
                console.log("New sensor detected! SAGE:", sageVal, "h");
                sendNotification("📡 חיישן חדש זוהה!", "SAGE = " + sageVal.toFixed(1) + "h — זכור: 24ש' ראשונות פחות מדויק", {tag:'loopie-sensor-new'});
            }
        }

        _lastKnownCage = cageVal;
        _lastKnownSage = sageVal;
    } catch(e) { console.error("autoDetect:", e); }
}

        btn.disabled = false;
        btn.innerText = "שגיאת חיבור (" + e.message + ")";
    }
