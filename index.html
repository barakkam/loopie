<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loopie v31.1 - Ultra Connect</title>
    <style>
        :root {
            --bg: #0e0e12; --card: #16161e; --border: #2a2a38; --blue: #3b82f6;
            --blue-dim: #1d3a6e; --green: #10b981; --red: #f43f5e; --amber: #f59e0b;
            --text: #e8e8f0; --muted: #6b6b80; --mono: 'Courier New', monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 32px; width: 100%; max-width: 440px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .logo-icon { width: 36px; height: 36px; background: var(--blue); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        input { width: 100%; padding: 12px; background: #0a0a10; border: 1px solid var(--border); color: var(--text); border-radius: 10px; font-size: 14px; outline: none; margin-bottom: 16px; transition: 0.2s; }
        input:focus { border-color: var(--blue); }
        .omnibox { border: 1px solid var(--blue); color: var(--green); font-family: var(--mono); }
        .btn { width: 100%; padding: 12px; background: var(--blue); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; margin-top: 4px; }
        .status { font-size: 13px; padding: 10px; border-radius: 8px; margin-bottom: 16px; display: none; }
        .status.show { display: block; }
        .status.error { background: rgba(244,63,94,0.1); color: var(--red); border: 1px solid var(--red); }
        .bg-display { text-align: center; padding: 20px 0; border: 1px solid var(--border); border-radius: 14px; background: #0a0a10; margin-bottom: 16px; }
        .bg-value { font-size: 64px; font-weight: 800; color: var(--green); }
        .bg-value.low { color: var(--red); }
        .bg-value.high { color: var(--amber); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
        .stat-box { background: #0a0a10; border: 1px solid var(--border); border-radius: 12px; padding: 12px; text-align: center; }
        .stat-val { font-weight: 700; font-size: 16px; display: block; }
        .stat-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; }
        .response-box { background: rgba(59,130,246,0.08); border-right: 3px solid var(--blue); border-radius: 8px; padding: 12px; font-size: 13px; margin-bottom: 12px; display: none; line-height: 1.6; }
        .hidden { display: none !important; }
        .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid transparent; border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="login-screen" class="card">
    <div class="logo"><div class="logo-icon">💉</div><h1>Loopie Ultra</h1></div>
    <div id="login-status" class="status"></div>
    <label>כתובת Nightscout</label>
    <input type="text" id="nsUrl" placeholder="https://herokuapp.com">
    <label>API Secret</label>
    <input type="password" id="apiSecret" placeholder="••••••••">
    <button class="btn" id="loginBtn" onclick="connect()">התחבר למערכת</button>
</div>

<div id="main-screen" class="card hidden">
    <div class="logo" style="margin-bottom:15px">
        <div class="logo-icon" style="width:28px;height:28px;font-size:14px">♾️</div>
        <span id="badge-name" style="font-weight:700">Loopie Active</span>
    </div>
    
    <div class="bg-display">
        <div class="bg-value" id="current-bg">--</div>
        <div id="trend-label" style="font-size:14px; color:var(--muted)">טוען...</div>
    </div>

    <div class="stats-grid">
        <div class="stat-box"><span class="stat-lbl">IOB</span><span id="stat-iob" class="stat-val">0.0</span></div>
        <div class="stat-box"><span class="stat-lbl">בזאלי</span><span id="stat-basal" class="stat-val">0.0</span></div>
    </div>

    <div id="omni-res" class="response-box"></div>
    <input type="text" id="omnibox" class="omnibox" placeholder="שאל: מה המצב? / מה אכלתי? / גיל ציוד" onkeydown="if(event.key==='Enter') askOmnibox()">
    
    <button class="btn" onclick="fetchData()">רענן הכל</button>
    <button class="btn" style="background:transparent; border:1px solid var(--border); color:var(--muted); margin-top:8px" onclick="location.reload()">התנתקות</button>
</div>

<script>
let nsData = { iob: 0, basal: "0.0", currentSgv: 0, delta: 0 };
let fullHistory = { entries: [], treatments: [], devStatus: {}, profile: null };
let refreshTimer = null;

function nsUrl() { return document.getElementById('nsUrl').value.trim().replace(/\/$/, ""); }
function nsSecret() { return document.getElementById('apiSecret').value.trim(); }
function nsGet(path) {
    const sep = path.includes('?') ? '&' : '?';
    return fetch(nsUrl() + path + sep + 'api_secret=' + nsSecret(), { mode: 'cors' });
}

const safeGet = function(obj, path, fallback) {
    if (fallback === undefined) fallback = "--";
    return path.split('.').reduce(function(acc, part) { return acc && acc[part]; }, obj) || fallback;
};

function isEventType(t, keywords) {
    const ev = (t.eventType || t.type || t.notes || '').toLowerCase();
    return keywords.some(function(k) { return ev.includes(k.toLowerCase()); });
}

function predictBG(hoursAhead) {
    const sgv = nsData.currentSgv;
    if (!sgv) return null;
    const delta      = nsData.delta || 0;
    const iob        = parseFloat(nsData.iob) || 0;
    const trendPerHr = delta * 12;
    const iobEffect  = iob * 40 * hoursAhead;
    return Math.max(40, Math.min(400, Math.round(sgv + (trendPerHr * hoursAhead) - iobEffect)));
}

function bgStatus(sgv) {
    if (!sgv) return "";
    if (sgv < 70)  return " ⚠️ נמוך!";
    if (sgv > 250) return " ⚠️ גבוה מאוד!";
    if (sgv > 180) return " ↑ גבוה";
    return " ✅ בטווח";
}

function timeAgo(dateStr) {
    const h = (Date.now() - new Date(dateStr).getTime()) / (1000*60*60);
    return h < 24 ? h.toFixed(1) + " שעות" : (h/24).toFixed(1) + " ימים";
}

// מציא ערך פרופיל (בזאלי/ISF/CR) לפי שעה נתונה
function profileValueAt(arr, hour) {
    if (!arr || !arr.length) return null;
    // מיון לפי time (HH:MM)
    var sorted = arr.slice().sort(function(a,b){ return a.time > b.time ? 1 : -1; });
    var val = sorted[0].value;
    for (var i = 0; i < sorted.length; i++) {
        var t = sorted[i].time || "00:00";
        var h = parseInt(t.split(':')[0]);
        if (h <= hour) val = sorted[i].value;
    }
    return val;
}

// בניית טבלת לוח שעות מלא מהפרופיל
function buildScheduleTable(arr, unit) {
    if (!arr || !arr.length) return "אין נתונים.";
    var sorted = arr.slice().sort(function(a,b){ return a.time > b.time ? 1 : -1; });
    return sorted.map(function(e) {
        return "• " + (e.time || "00:00") + " — <b>" + e.value + "</b> " + unit;
    }).join("<br>");
}

async function connect() {
    const btn = document.getElementById('loginBtn');
    if (!nsUrl() || !nsSecret()) return;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> מתחבר...';
    try {
        const res = await nsGet('/api/v1/status.json');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.remove('hidden');
        fetchData();
        refreshTimer = setInterval(fetchData, 60000);
    } catch (e) {
        btn.disabled = false;
        btn.innerText = "שגיאת חיבור (" + e.message + ")";
    }
}

async function fetchData() {
    try {
        const [entRes, devRes, profRes] = await Promise.all([
            nsGet('/api/v1/entries.json?count=2'),
            nsGet('/api/v1/devicestatus.json?count=1'),
            nsGet('/api/v1/profile.json')
        ]);

        // סוכר נוכחי + דלתא
        if (entRes.ok) {
            const entData = await entRes.json();
            const entries = Array.isArray(entData) ? entData : [entData];
            const entry   = entries[0];
            const prev    = entries[1];
            if (entry && entry.sgv) {
                const sgv = entry.sgv;
                nsData.currentSgv = sgv;
                nsData.delta = prev ? (sgv - prev.sgv) : 0;
                const bgEl = document.getElementById('current-bg');
                bgEl.innerText = sgv;
                bgEl.className = 'bg-value' + (sgv < 70 ? ' low' : sgv > 180 ? ' high' : '');
                const trendMap = { 1:'↑↑', 2:'↑', 3:'↗', 4:'→', 5:'↘', 6:'↓', 7:'↓↓' };
                document.getElementById('trend-label').innerText = entry.direction || trendMap[entry.trend] || '→';
            }
        }

        // DeviceStatus — IOB + בזאלי בפועל
        if (devRes.ok) {
            const devData = await devRes.json();
            const dev = Array.isArray(devData) ? devData[0] : devData;
            if (dev) {
                console.log("DeviceStatus keys:", JSON.stringify(Object.keys(dev)));

                // IOB — מחפש במספר מיקומים
                var iobRaw = safeGet(dev, 'openaps.iob.iob',
                             safeGet(dev, 'loop.iob.iob',
                             safeGet(dev, 'openaps.suggested.IOB',
                             safeGet(dev, 'pump.iob.bolusiob', 0))));
                var iobDisplay = parseFloat(iobRaw) ? parseFloat(iobRaw).toFixed(2) : "0.00";
                document.getElementById('stat-iob').innerText = iobDisplay;
                nsData.iob = iobDisplay;

                // בזאלי בפועל — TBR שרץ עכשיו
                var basalRaw = safeGet(dev, 'openaps.enacted.rate',
                               safeGet(dev, 'openaps.suggested.rate',
                               safeGet(dev, 'pump.extended.TBRRate',
                               safeGet(dev, 'pump.basal.rate', null))));
                var basalDisplay = basalRaw !== null && basalRaw !== "--" ? basalRaw : "0.0";
                document.getElementById('stat-basal').innerText = basalDisplay;
                nsData.basal = basalDisplay;
                fullHistory.devStatus = dev;
            }
        }

        // פרופיל — בזאלי/ISF/CR לפי שעות
        if (profRes.ok) {
            const profData = await profRes.json();
            var prof = Array.isArray(profData) ? profData[0] : profData;
            // מנסה למצוא את ה-store הפעיל
            if (prof && prof.store) {
                var storeName = prof.defaultProfile || Object.keys(prof.store)[0];
                var store = prof.store[storeName];
                fullHistory.profile = store;
                console.log("Profile store:", storeName, "keys:", JSON.stringify(Object.keys(store)));

                // בזאלי נוכחי לפי פרופיל
                var nowHour = new Date().getHours();
                var basalNow = profileValueAt(store.basal, nowHour);
                if (basalNow && (nsData.basal === "0.0" || nsData.basal === "--")) {
                    document.getElementById('stat-basal').innerText = basalNow;
                    nsData.basal = basalNow;
                }
            } else if (prof) {
                // פרופיל ישיר ללא store
                fullHistory.profile = prof;
            }
        }

        loadHistory();
    } catch (e) { console.error("fetchData error:", e); }
}

async function loadHistory() {
    try {
        const dayAgo         = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
        const threeMonthsAgo = new Date(Date.now() - 90 * 24 * 60 * 60 * 1000).toISOString();

        const [ent, treat, equipTreat] = await Promise.all([
            nsGet('/api/v1/entries.json?find[dateString][$gte]=' + dayAgo + '&count=500').then(function(r){ return r.json(); }).catch(function(){ return []; }),
            nsGet('/api/v1/treatments.json?find[created_at][$gte]=' + dayAgo + '&count=200').then(function(r){ return r.json(); }).catch(function(){ return []; }),
            nsGet('/api/v1/treatments.json?find[created_at][$gte]=' + threeMonthsAgo + '&count=500').then(function(r){ return r.json(); }).catch(function(){ return []; })
        ]);

        const allTreat = treat.concat(equipTreat.filter(function(e) {
            return !treat.find(function(t) { return t._id === e._id; });
        }));
        fullHistory.entries    = ent;
        fullHistory.treatments = allTreat;

        const types = {};
        allTreat.forEach(function(t) { if (t.eventType) types[t.eventType] = (types[t.eventType]||0)+1; });
        console.log("Treatment eventTypes:", JSON.stringify(types));
    } catch (e) { console.error("loadHistory error:", e); }
}

async function askOmnibox() {
    const input = document.getElementById('omnibox');
    const resp  = document.getElementById('omni-res');
    const q     = input.value.trim();
    const ql    = q.toLowerCase();
    if (!q) return;

    resp.style.display = 'block';
    resp.innerHTML = "מנתח... 🧠";

    var answer = "";
    var tr  = fullHistory.treatments || [];
    var ent = fullHistory.entries    || [];
    var prof = fullHistory.profile;

    // תחזית סוכר
    if (ql.includes("עוד") || ql.includes("תחזית") || ql.includes("יהיה")) {
        var numMatch = ql.match(/(\d+(?:\.\d+)?)/);
        var hours = numMatch ? parseFloat(numMatch[1]) : 1;
        var pred  = predictBG(hours);
        if (pred) {
            var label = hours === 1 ? "עוד שעה" : "עוד " + hours + " שעות";
            answer = "📈 תחזית " + label + ":<br>" +
                "<b style='font-size:1.4em'>" + pred + " mg/dL</b>" + bgStatus(pred) + "<br>" +
                "<small style='color:#888'>מגמה: " + (nsData.delta >= 0 ? "+" : "") + nsData.delta +
                " ב-5 דק' | IOB: " + nsData.iob + "U</small>";
        } else { answer = "אין מספיק נתונים לתחזית. נסה לרענן."; }
    }

    // בזאלי — כעת + לוח שעות
    else if (ql.includes("בזאלי") || ql.includes("basal")) {
        var nowH = new Date().getHours();
        answer = "💧 <b>בזאלי בפועל כעת: " + nsData.basal + " U/hr</b><br><br>";
        if (prof && prof.basal) {
            var basalNow = profileValueAt(prof.basal, nowH);
            answer += "📋 בזאלי פרופיל כעת (" + nowH + ":00): <b>" + basalNow + " U/hr</b><br><br>";
            answer += "<b>לוח בזאלי יומי:</b><br>" + buildScheduleTable(prof.basal, "U/hr");
        } else {
            answer += "לא נמצא פרופיל בזאלי. בדוק שפלאגין ה-Profile מופעל ב-NS.";
        }
    }

    // ISF — יחס תיקון
    else if (ql.includes("isf") || ql.includes("תיקון") || ql.includes("רגישות")) {
        if (prof && (prof.sens || prof.sensitivity || prof.isfProfile)) {
            var isfArr = prof.sens || prof.sensitivity || prof.isfProfile;
            var nowH2  = new Date().getHours();
            var isfNow = profileValueAt(Array.isArray(isfArr) ? isfArr : null, nowH2);
            answer = "🎯 <b>ISF (יחס תיקון)</b><br>";
            answer += "כעת (" + nowH2 + ":00): <b>" + (isfNow || isfArr) + " mg/dL לכל יחידה</b><br><br>";
            if (Array.isArray(isfArr) && isfArr.length > 1) {
                answer += "<b>לוח ISF יומי:</b><br>" + buildScheduleTable(isfArr, "mg/dL/U");
            }
        } else {
            answer = "לא נמצא ISF בפרופיל. בדוק שפלאגין ה-Profile מופעל ב-NS.";
        }
    }

    // CR — יחס פחמימה/אינסולין
    else if (ql.includes("cr") || ql.includes("פחמימה") || ql.includes("יחס") || ql.includes("carb")) {
        if (prof && (prof.carbratio || prof.carbRatio || prof.ic)) {
            var crArr  = prof.carbratio || prof.carbRatio || prof.ic;
            var nowH3  = new Date().getHours();
            var crNow  = profileValueAt(Array.isArray(crArr) ? crArr : null, nowH3);
            answer = "🍞 <b>CR (יחס פחמימה/אינסולין)</b><br>";
            answer += "כעת (" + nowH3 + ":00): <b>" + (crNow || crArr) + " g לכל יחידה</b><br><br>";
            if (Array.isArray(crArr) && crArr.length > 1) {
                answer += "<b>לוח CR יומי:</b><br>" + buildScheduleTable(crArr, "g/U");
            }
        } else {
            answer = "לא נמצא CR בפרופיל. בדוק שפלאגין ה-Profile מופעל ב-NS.";
        }
    }

    // פרופיל מלא
    else if (ql.includes("פרופיל") || ql.includes("profile") || ql.includes("הגדרות")) {
        if (prof) {
            var nowH4  = new Date().getHours();
            var basalV = profileValueAt(prof.basal, nowH4) || nsData.basal;
            var crArr2 = prof.carbratio || prof.carbRatio || prof.ic;
            var isfArr2= prof.sens || prof.sensitivity;
            var crV    = profileValueAt(Array.isArray(crArr2) ? crArr2 : null, nowH4) || crArr2;
            var isfV   = profileValueAt(Array.isArray(isfArr2) ? isfArr2 : null, nowH4) || isfArr2;
            answer = "📋 <b>פרופיל נוכחי (" + nowH4 + ":00):</b><br>" +
                "• בזאלי: <b>" + basalV + " U/hr</b><br>" +
                "• CR (פחמימה/אינסולין): <b>" + (crV || '--') + " g/U</b><br>" +
                "• ISF (תיקון): <b>" + (isfV || '--') + " mg/dL/U</b><br>" +
                "• יחידת סוכר: " + (prof.units || 'mg/dL') + "<br><br>" +
                "שאל 'בזאלי', 'ISF', 'CR' לקבלת לוח שעות מלא.";
        } else {
            answer = "לא נמצא פרופיל. בדוק שפלאגין ה-Profile מופעל ב-NS.";
        }
    }

    // IOB
    else if (ql.includes("iob") || ql.includes("פעיל") || ql.includes("אינסולין")) {
        answer = "💉 האינסולין הפעיל (IOB): <b>" + nsData.iob + " יחידות</b>.";
    }

    // ציוד — חיפוש ב-3 חודשים עם keywords רחבות
    else if (ql.includes("חיישן") || ql.includes("סנסור") || ql.includes("פוד") || ql.includes("משאבה") ||
             ql.includes("גיל") || ql.includes("ציוד") || ql.includes("החלפ")) {

        var sensorKeywords = ['sensor', 'cgm', 'dexcom', 'libre', 'חיישן', 'סנסור', 'sensor change'];
        var podKeywords    = ['pod', 'site', 'cannula', 'pump change', 'infusion', 'reservoir', 'omnipod', 'פוד', 'משאבה'];
        var sensor = tr.find(function(t) { return isEventType(t, sensorKeywords); });
        var pod    = tr.find(function(t) { return isEventType(t, podKeywords); });

        answer = "<b>📟 מצב ציוד:</b><br><br>";
        if (sensor) {
            var sAgeH   = (Date.now() - new Date(sensor.created_at)) / (1000*60*60);
            var sLeftH  = Math.max(0, 240 - sAgeH);
            var sChanged = new Date(sensor.created_at).toLocaleString('he-IL', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
            var sReplace = new Date(new Date(sensor.created_at).getTime() + 240*3600000).toLocaleString('he-IL', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
            answer += "📡 <b>חיישן</b> (" + (sensor.eventType||'') + "):<br>" +
                "• הוחלף: " + sChanged + " (לפני " + timeAgo(sensor.created_at) + ")<br>" +
                "• נותרו: ~" + sLeftH.toFixed(0) + " שעות<br>" +
                "• החלפה הבאה: " + sReplace + "<br><br>";
        } else {
            answer += "📡 חיישן: לא נמצאה החלפה ב-3 חודשים האחרונים.<br><br>";
        }

        if (pod) {
            var pAgeH   = (Date.now() - new Date(pod.created_at)) / (1000*60*60);
            var pLeftH  = Math.max(0, 72 - pAgeH);
            var pChanged = new Date(pod.created_at).toLocaleString('he-IL', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
            var pReplace = new Date(new Date(pod.created_at).getTime() + 72*3600000).toLocaleString('he-IL', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
            answer += "💊 <b>פוד/משאבה</b> (" + (pod.eventType||'') + "):<br>" +
                "• הוחלף: " + pChanged + " (לפני " + timeAgo(pod.created_at) + ")<br>" +
                "• נותרו: ~" + pLeftH.toFixed(0) + " שעות<br>" +
                "• החלפה הבאה: " + pReplace;
        } else {
            answer += "💊 פוד/משאבה: לא נמצאה החלפה ב-3 חודשים האחרונים.";
        }

        // אם לא נמצא כלום — הצג eventTypes קיימים לדיאגנוז
        if (!sensor && !pod && tr.length > 0) {
            var types2 = {};
            tr.forEach(function(t) { if (t.eventType) types2[t.eventType] = true; });
            answer += "<br><br><small style='color:#888'>סוגי אירועים קיימים ב-NS: " + Object.keys(types2).slice(0,15).join(", ") + "</small>";
        }
    }

    // ארוחות
    else if (ql.includes("אכלתי") || ql.includes("אוכל") || ql.includes("cob") || ql.includes("ארוחה") || ql.includes("הזרק")) {
        var meals = tr.filter(function(t) { return t.carbs > 0 || t.insulin > 0; }).slice(0, 8);
        if (meals.length) {
            answer = "<b>רישומי טיפולים היום:</b><br>";
            answer += meals.map(function(m) {
                var time     = new Date(m.created_at).toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});
                var name     = m.notes || m.eventType || 'ארוחה';
                var carbStr  = m.carbs  ? m.carbs  + "g 🍞" : "";
                var insStr   = m.insulin ? m.insulin + "U 💉" : "";
                var parts    = [carbStr, insStr].filter(Boolean).join(" + ");
                return "• <b>" + time + "</b> — " + name + (parts ? " (" + parts + ")" : "");
            }).join("<br>");
        } else { answer = "לא מצאתי רישומי טיפולים ב-24 השעות האחרונות."; }
    }

    // TIR
    else if (ql.includes("איך") || ql.includes("מצב") || ql.includes("מאוזן") || ql.includes("tir") || ql.includes("טווח")) {
        if (ent.length > 10) {
            var inRange = ent.filter(function(e) { return e.sgv >= 70 && e.sgv <= 180; }).length;
            var tir     = (inRange / ent.length * 100).toFixed(0);
            var avg     = (ent.reduce(function(a,b){ return a + b.sgv; }, 0) / ent.length).toFixed(0);
            var low     = ent.filter(function(e){ return e.sgv < 70; }).length;
            var high    = ent.filter(function(e){ return e.sgv > 180; }).length;
            answer = "📊 ניתוח 24 שעות אחרונות:<br>" +
                "• TIR: <b>" + tir + "%</b><br>" +
                "• ממוצע: " + avg + " mg/dL<br>" +
                "• נמוך מ-70: " + low + " קריאות<br>" +
                "• גבוה מ-180: " + high + " קריאות<br>" +
                (tir > 75 ? "🌟 יום מצוין!" : "📈 יש מקום לשיפור.");
        } else { answer = "אין מספיק נתוני היסטוריה. לחץ 'רענן הכל' ונסה שוב."; }
    }

    else {
        answer = "נסה: 'כמה אהיה עוד שעה?', 'בזאלי', 'ISF', 'CR', 'פרופיל', 'מה אכלתי?', 'גיל חיישן ופוד', 'איך הייתי היום?'.";
    }

    resp.innerHTML = answer;
    input.value = '';
}
</script>

</html>
