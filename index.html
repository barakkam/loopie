<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loopie v31.1 - Ultra Connect</title>
    <style>
        :root {
            --bg: #0e0e12; --card: #16161e; --border: #2a2a38; --blue: #3b82f6;
            --blue-dim: #1d3a6e; --green: #10b981; --red: #f43f5e; --amber: #f59e0b;
            --text: #e8e8f0; --muted: #6b6b80; --mono: 'Courier New', monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 32px; width: 100%; max-width: 440px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .logo-icon { width: 36px; height: 36px; background: var(--blue); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        input { width: 100%; padding: 12px; background: #0a0a10; border: 1px solid var(--border); color: var(--text); border-radius: 10px; font-size: 14px; outline: none; margin-bottom: 16px; transition: 0.2s; }
        input:focus { border-color: var(--blue); }
        .omnibox { border: 1px solid var(--blue); color: var(--green); font-family: var(--mono); }
        .btn { width: 100%; padding: 12px; background: var(--blue); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; margin-top: 4px; }
        .status { font-size: 13px; padding: 10px; border-radius: 8px; margin-bottom: 16px; display: none; }
        .status.show { display: block; }
        .status.error { background: rgba(244,63,94,0.1); color: var(--red); border: 1px solid var(--red); }
        .bg-display { text-align: center; padding: 20px 0; border: 1px solid var(--border); border-radius: 14px; background: #0a0a10; margin-bottom: 16px; }
        .bg-value { font-size: 64px; font-weight: 800; color: var(--green); }
        .bg-value.low { color: var(--red); }
        .bg-value.high { color: var(--amber); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
        .stat-box { background: #0a0a10; border: 1px solid var(--border); border-radius: 12px; padding: 12px; text-align: center; }
        .stat-val { font-weight: 700; font-size: 16px; display: block; }
        .stat-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; }
        .response-box { background: rgba(59,130,246,0.08); border-right: 3px solid var(--blue); border-radius: 8px; padding: 12px; font-size: 13px; margin-bottom: 12px; display: none; line-height: 1.6; }
        .hidden { display: none !important; }
        .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid transparent; border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="login-screen" class="card">
    <div class="logo"><div class="logo-icon">💉</div><h1>Loopie Ultra</h1></div>
    <div id="login-status" class="status"></div>
    <label>כתובת Nightscout</label>
    <input type="text" id="nsUrl" placeholder="https://herokuapp.com">
    <label>API Secret</label>
    <input type="password" id="apiSecret" placeholder="••••••••">
    <button class="btn" id="loginBtn" onclick="connect()">התחבר למערכת</button>
</div>

<div id="main-screen" class="card hidden">
    <div class="logo" style="margin-bottom:15px">
        <div class="logo-icon" style="width:28px;height:28px;font-size:14px">♾️</div>
        <span id="badge-name" style="font-weight:700">Loopie Active</span>
    </div>
    
    <div class="bg-display">
        <div class="bg-value" id="current-bg">--</div>
        <div id="trend-label" style="font-size:14px; color:var(--muted)">טוען...</div>
    </div>

    <div class="stats-grid">
        <div class="stat-box"><span class="stat-lbl">IOB</span><span id="stat-iob" class="stat-val">0.0</span></div>
        <div class="stat-box"><span class="stat-lbl">בזאלי</span><span id="stat-basal" class="stat-val">0.0</span></div>
    </div>

    <div id="omni-res" class="response-box"></div>
    <input type="text" id="omnibox" class="omnibox" placeholder="שאל: מה המצב? / מה אכלתי? / גיל ציוד" onkeydown="if(event.key==='Enter') askOmnibox()">
    
    <button class="btn" onclick="fetchData()">רענן הכל</button>
    <button class="btn" style="background:transparent; border:1px solid var(--border); color:var(--muted); margin-top:8px" onclick="location.reload()">התנתקות</button>
</div>

<script>
let nsData = { iob: 0, basal: 0, insulin: "--", sensorAge: null, podAge: null, hist: "--", meal: "אין" };
let fullHistory = { entries: [], treatments: [], profile: null };
let refreshTimer = null;

function nsUrl() { return document.getElementById('nsUrl').value.trim().replace(/\/$/, ""); }
function nsSecret() { return document.getElementById('apiSecret').value.trim(); }
function nsGet(path) { 
    const sep = path.includes('?') ? '&' : '?';
    return fetch(nsUrl() + path + sep + 'api_secret=' + nsSecret(), { mode: 'cors' }); 
}

async function connect() {
    const btn = document.getElementById('loginBtn');
    if (!nsUrl() || !nsSecret()) return;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> מתחבר...';
    try {
        const res = await nsGet('/api/v1/status.json');
        if (!res.ok) throw new Error();
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.remove('hidden');
        fetchData();
        refreshTimer = setInterval(fetchData, 60000);
    } catch (e) {
        btn.disabled = false; btn.innerText = "שגיאת חיבור";
    }
}

async function fetchData() {
    try {
        // נתונים חיים למסך
        const pRes = await nsGet('/pebble');
        const p = await pRes.json();
        const latest = p.bgs[0];
        document.getElementById('current-bg').innerText = latest.sgv;
        document.getElementById('current-bg').className = 'bg-value' + (latest.sgv < 70 ? ' low' : latest.sgv > 180 ? ' high' : '');
        document.getElementById('trend-label').innerText = latest.direction;
        document.getElementById('stat-iob').innerText = latest.iob || "0.0";
        nsData.iob = latest.iob || 0;

        const dRes = await nsGet('/api/v1/devicestatus.json?count=1');
        const d = await dRes.json();
        if (d[0] && d[0].pump) {
            nsData.basal = d[0].pump.basal.rate;
            document.getElementById('stat-basal').innerText = nsData.basal;
        }

        // גיל ציוד
        const tRes = await nsGet('/api/v1/treatments.json?find[eventType][$in]=Sensor Change,Pod Change,Site Change&count=2');
        const treats = await tRes.json();
        treats.forEach(t => {
            const diffHours = (Date.now() - new Date(t.created_at).getTime()) / 3600000;
            if (t.eventType.includes("Sensor")) nsData.sensorAge = diffHours;
            if (t.eventType.includes("Pod") || t.eventType.includes("Site")) nsData.podAge = diffHours;
        });

        // טעינת מאגר נתונים מלא ל-24 שעות לניתוח עומק
        const dayAgo = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
        const [ent, treat, prof] = await Promise.all([
            nsGet('/api/v1/entries.json?find[dateString][$gte]=' + dayAgo + '&count=1000').then(r => r.json()),
            nsGet('/api/v1/treatments.json?find[created_at][$gte]=' + dayAgo + '&count=1000').then(r => r.json()),
            nsGet('/api/v1/profile.json').then(r => r.json())
        ]);
        fullHistory = { entries: ent, treatments: treat, profile: prof[0] };

    } catch (e) { console.error("Update error", e); }
}

async function askOmnibox() {
    const input = document.getElementById('omnibox');
    const resp = document.getElementById('omni-res');
    const q = input.value.trim();
    const ql = q.toLowerCase();
    if (!q) return;

    resp.style.display = 'block';
    resp.innerHTML = "מנתח נתוני עומק... 🧠";

    const ent = fullHistory.entries;
    const tr  = fullHistory.treatments;
    let answer = "";

    try {
        const hoursMatch = ql.match(/(\d+)/);
        const hoursRequested = hoursMatch ? parseInt(hoursMatch[0]) : null;

        // 1. שאלות על זמן ספציפי (לפני X שעות)
        if (hoursRequested && (ql.includes("הוזרק") || ql.includes("אכלתי") || ql.includes("אוכל"))) {
            const targetTime = Date.now() - (hoursRequested * 3600000);
            const from = new Date(targetTime - 1800000).toISOString();
            const to   = new Date(targetTime + 1800000).toISOString();
            const res  = await nsGet('/api/v1/treatments.json?find[created_at][$gte]=' + from + '&find[created_at][$lte]=' + to);
            const data = await res.json();
            if (data.length > 0) {
                answer = data.map(t => '🕒 ב-' + new Date(t.created_at).toLocaleTimeString('he-IL') + ': הוזרק ' + (t.insulin || 0) + 'U על ' + (t.carbs || 0) + 'g פחמימות (' + (t.notes || 'ללא תיאור') + ')').join('<br>');
            } else { answer = 'לא מצאתי רישום בדיוק לפני ' + hoursRequested + ' שעות.'; }
        }

        // 2. הקשר "מתי / לפני" - חיפוש בנתוני עומק
        else if (ql.includes("מתי") || ql.includes("לפני")) {
            const hrs = hoursRequested || (ql.includes("שעה") ? 1 : 0);
            const target = Date.now() - (hrs * 3600000);
            const relevantTreat = tr.find(t => Math.abs(new Date(t.created_at).getTime() - target) < 1800000);
            const relevantBG    = ent.find(e => Math.abs(new Date(e.dateString).getTime() - target) < 600000);
            if (relevantTreat || relevantBG) {
                answer = 'בזמן שציינת:<br>';
                if (relevantBG)    answer += '• הסוכר עמד על ' + relevantBG.sgv + '.<br>';
                if (relevantTreat) answer += '• פעולה: ' + (relevantTreat.notes || relevantTreat.eventType) + ' (' + (relevantTreat.insulin || 0) + 'U / ' + (relevantTreat.carbs || 0) + 'g).<br>';
            } else { answer = 'לא מצאתי נתונים לזמן שציינת.'; }
        }

        // 3. ארוחות אחרונות
        else if (ql.includes("אכלתי") || ql.includes("אוכל") || ql.includes("פחמימות")) {
            const meals = tr.filter(t => t.carbs > 0).slice(0, 3);
            if (meals.length) {
                answer = 'אלו הארוחות האחרונות שרשומות:<br>' +
                    meals.map(m => '• ' + new Date(m.created_at).toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'}) + ': ' + (m.notes || 'ארוחה') + ' (' + m.carbs + 'g)').join('<br>');
            } else { answer = 'לא נמצאו ארוחות ב-24 השעות האחרונות.'; }
        }

        // 4. ניתוח מצב / TIR
        else if (ql.includes("איך") || ql.includes("מצב") || ql.includes("מאוזן")) {
            if (ent.length > 0) {
                const tir = (ent.filter(e => e.sgv >= 70 && e.sgv <= 180).length / ent.length * 100).toFixed(0);
                const avg = (ent.reduce((a, b) => a + b.sgv, 0) / ent.length).toFixed(0);
                answer = 'ניתוח 24 שעות: היית בטווח ' + tir + '% מהזמן, עם ממוצע של ' + avg + '. ';
                answer += tir > 80 ? 'יום מצוין! 🌟' : 'יש מקום לשיפור בטווח. 📈';
            } else { answer = 'אין מספיק נתוני היסטוריה לניתוח.'; }
        }

        // 5. ציוד - גיל ושעות שנותרו
        else if (ql.includes("חיישן") || ql.includes("פוד") || ql.includes("החלפה") || ql.includes("זמן נותר")) {
            const lastSensor = tr.find(t => t.eventType === "Sensor Change");
            const lastPod    = tr.find(t => t.eventType === "Pod Change" || t.eventType === "Site Change");
            const sensorLeft = nsData.sensorAge ? Math.max(0, 240 - nsData.sensorAge).toFixed(1) : "לא ידוע";
            const podLeft    = nsData.podAge    ? Math.max(0, 72  - nsData.podAge).toFixed(1)    : "לא ידוע";
            answer = 'מצב ציוד:<br>';
            if (lastSensor) answer += '• חיישן הוחלף לפני ' + ((Date.now() - new Date(lastSensor.created_at)) / (1000*60*60*24)).toFixed(1) + ' ימים. נותרו ~' + sensorLeft + ' שעות.<br>';
            if (lastPod)    answer += '• פוד הוחלף לפני ' + ((Date.now() - new Date(lastPod.created_at)) / (1000*60*60)).toFixed(1) + ' שעות. נותרו ~' + podLeft + ' שעות.';
            if (!lastSensor && !lastPod) answer += 'לא נמצאו החלפות ב-24 השעות האחרונות.';
        }

        // 6. בזאלי לפני X שעות
        else if (hoursRequested && ql.includes("בזאלי")) {
            const targetTime = Date.now() - (hoursRequested * 3600000);
            const from = new Date(targetTime - 600000).toISOString();
            const res  = await nsGet('/api/v1/devicestatus.json?find[created_at][$gte]=' + from + '&count=1');
            const dd   = await res.json();
            answer = dd[0] ? '💧 לפני ' + hoursRequested + ' שעות הבזאלי היה: ' + dd[0].pump.basal.rate + ' U/hr.' : 'לא מצאתי נתון בזאלי לזמן זה.';
        }

        // 7. סיכום יומי
        else if (ql.includes("סיכום") || ql.includes("כמה הזרקתי היום")) {
            const totalInsulin = tr.reduce((sum, t) => sum + (t.insulin || 0), 0).toFixed(2);
            const totalCarbs   = tr.reduce((sum, t) => sum + (t.carbs   || 0), 0);
            answer = '📅 סיכום 24 שעות אחרונות:<br>💉 סך אינסולין: ' + totalInsulin + 'U<br>🍞 סך פחמימות: ' + totalCarbs + 'g';
        }

        else {
            answer = "לא מצאתי התאמה. נסה: 'מה אכלתי לפני 4 שעות?', 'כמה זמן נותר לחיישן?', 'איך הייתי היום?' או 'סיכום היום'.";
        }

    } catch (e) { answer = "שגיאה בשליפת נתונים. וודא שההיסטוריה מלאה ב-NS."; }

    resp.innerHTML = answer;
    input.value = '';
}
</script>
</body>
</html>
