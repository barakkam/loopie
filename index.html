<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loopie v31.1 - Nightscout</title>
    <style>
        :root {
            --bg: #0e0e12; --card: #16161e; --border: #2a2a38; --blue: #3b82f6;
            --blue-dim: #1d3a6e; --green: #10b981; --red: #f43f5e; --amber: #f59e0b;
            --text: #e8e8f0; --muted: #6b6b80; --mono: 'Courier New', monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 32px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .logo-icon { width: 36px; height: 36px; background: var(--blue); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .logo h1 { font-size: 22px; font-weight: 700; }
        .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 28px; }
        label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 500; text-transform: uppercase; }
        input { width: 100%; padding: 11px 14px; background: #0a0a10; border: 1px solid var(--border); color: var(--text); border-radius: 10px; font-size: 14px; outline: none; transition: 0.2s; margin-bottom: 16px; }
        input:focus { border-color: var(--blue); }
        .omnibox { border: 1px solid var(--blue); color: var(--green); font-family: var(--mono); }
        .btn { width: 100%; padding: 12px; background: var(--blue); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; margin-top: 4px; }
        .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--muted); margin-top: 10px; font-size: 13px; }
        .status { font-size: 13px; padding: 10px; border-radius: 8px; margin-bottom: 16px; display: none; }
        .status.show { display: block; }
        .status.error { background: rgba(244,63,94,0.1); color: var(--red); border: 1px solid var(--red); }
        .status.info { background: rgba(59,130,246,0.1); color: var(--blue); border: 1px solid var(--blue); }
        .bg-display { text-align: center; padding: 24px 0; border: 1px solid var(--border); border-radius: 14px; background: #0a0a10; margin-bottom: 16px; }
        .bg-value { font-size: 64px; font-weight: 800; color: var(--green); transition: 0.4s; }
        .bg-value.low { color: var(--red); }
        .bg-value.high { color: var(--amber); }
        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
        .stat-card { background: #0a0a10; border: 1px solid var(--border); border-radius: 12px; padding: 12px; text-align: center; }
        .omnibox-response { background: rgba(59,130,246,0.07); border: 1px solid var(--blue-dim); border-radius: 10px; padding: 12px; font-size: 13px; margin-bottom: 12px; display: none; line-height: 1.5; min-height: 40px; }
        .hidden { display: none !important; }
        .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid transparent; border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<!-- מסך כניסה -->
<div id="login-screen" class="card">
    <div class="logo"><div class="logo-icon">💉</div><h1>Loopie</h1></div>
    <p class="subtitle">התחברות ל-Nightscout</p>
    <div id="login-status" class="status"></div>
    <label>כתובת שרת</label>
    <input type="text" id="nsUrl" placeholder="https://herokuapp.com">
    <label>API Secret</label>
    <input type="password" id="apiSecret" placeholder="••••••••">
    <button class="btn" id="loginBtn" onclick="testConnection()">כניסה למערכת</button>
</div>

<!-- מסך ראשי -->
<div id="main-screen" class="card hidden">
    <div class="logo" style="margin-bottom:20px">
        <div class="logo-icon" style="width:28px;height:28px;font-size:14px">💉</div>
        <span id="ns-badge" style="font-weight:700">Loopie</span>
    </div>
    <div class="bg-display">
        <div class="bg-value" id="current-bg">--</div>
        <div style="font-size:14px; color:var(--muted)" id="trend-label">טוען...</div>
        <div id="last-update" style="font-size:11px; color:var(--muted); margin-top:8px"></div>
    </div>
    <div class="stats-row">
        <div class="stat-card">
            <div style="font-size:11px; color:var(--muted)">שינוי</div>
            <div id="stat-delta" style="font-weight:700">--</div>
        </div>
        <div class="stat-card">
            <div style="font-size:11px; color:var(--muted)">סטטוס</div>
            <div id="stat-range" style="font-weight:700; font-size:13px">--</div>
        </div>
    </div>
    <div id="omnibox-response" class="omnibox-response"></div>
    <input type="text" id="omnibox" class="omnibox" placeholder="שאל: מה המצב?" onkeydown="if(event.key==='Enter') askOmnibox()">
    <button class="btn" onclick="fetchData()">רענן נתונים</button>
    <button class="btn btn-secondary" onclick="location.reload()">התנתקות</button>
</div>

<script>
const TREND_MAP = { 1:"↑↑", 2:"↑", 3:"↗", 4:"→", 5:"↘", 6:"↓", 7:"↓↓" };
let refreshTimer = null;

async function testConnection() {
    const url = document.getElementById('nsUrl').value.trim().replace(/\/$/, "");
    const secret = document.getElementById('apiSecret').value.trim();
    const btn = document.getElementById('loginBtn');
    const status = document.getElementById('login-status');

    if (!url || !secret) { showStatus("מלא את כל השדות", "error"); return; }
    
    btn.disabled = true;
    btn.innerHTML = 'מתחבר... <span class="spinner"></span>';
    
    try {
        const res = await fetch(`${url}/api/v1/status.json?api_secret=${secret}`);
        if (!res.ok) throw new Error();
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.remove('hidden');
        fetchData();
        refreshTimer = setInterval(fetchData, 60000);
    } catch (e) {
        showStatus("חיבור נכשל. בדוק כתובת וסיסמה", "error");
        btn.disabled = false; btn.innerText = "כניסה למערכת";
    }
}

async function fetchData() {
    const url = document.getElementById('nsUrl').value.trim().replace(/\/$/, "");
    const secret = document.getElementById('apiSecret').value.trim();
    try {
        const res = await fetch(`${url}/api/v1/entries.json?count=2&api_secret=${secret}`);
        const data = await res.json();
        if(!data.length) return;

        const latest = data[0];
        const bg = latest.sgv;
        const bgEl = document.getElementById('current-bg');
        
        bgEl.textContent = bg;
        bgEl.className = 'bg-value' + (bg < 70 ? ' low' : bg > 180 ? ' high' : '');
        
        document.getElementById('trend-label').textContent = (TREND_MAP[latest.trend] || "→") + " " + (latest.direction || "");
        document.getElementById('last-update').textContent = "עדכון: " + new Date(latest.dateString).toLocaleTimeString('he-IL');
        
        if(data[1]) {
            const delta = bg - data[1].sgv;
            document.getElementById('stat-delta').textContent = (delta >= 0 ? "+" : "") + delta + " mg/dL";
        }
        
        const rangeEl = document.getElementById('stat-range');
        if(bg < 70) { rangeEl.textContent = "נמוך ↓"; rangeEl.style.color = "var(--red)"; }
        else if(bg > 180) { rangeEl.textContent = "גבוה ↑"; rangeEl.style.color = "var(--amber)"; }
        else { rangeEl.textContent = "תקין ✓"; rangeEl.style.color = "var(--green)"; }

    } catch (e) { console.error("Refresh failed"); }
}

function askOmnibox() {
    const input = document.getElementById('omnibox');
    const resp = document.getElementById('omnibox-response');
    const q = input.value.trim();
    if (!q) return;

    resp.style.display = 'none';
    const bg = document.getElementById('current-bg').textContent;
    const trend = document.getElementById('trend-label').textContent;
    const delta = document.getElementById('stat-delta').textContent;
    const range = document.getElementById('stat-range').textContent;

    let answer = "";
    if (/מצב|מה קורה|איך|status/i.test(q)) {
        answer = `הסוכר כרגע ${bg}. מגמה: ${trend} (${delta}). סטטוס: ${range}.`;
    } else if (/נמוך|גבוה|טווח/i.test(q)) {
        answer = `מצב הטווח: ${range} (ערך: ${bg})`;
    } else if (/רענן|עדכן/i.test(q)) {
        fetchData(); answer = "מרענן נתונים...";
    } else {
        answer = "נסה לשאול: 'מה המצב?' או 'מה המגמה?'.";
    }

    setTimeout(() => {
        resp.textContent = answer;
        resp.style.display = 'block';
        input.value = '';
    }, 100);
}

function showStatus(msg, type) {
    const el = document.getElementById('login-status');
    el.textContent = msg; el.className = `status show ${type}`;
}
</script>
</body>
</html>
