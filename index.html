<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loopie v31.1 - Ultra Connect</title>
    <style>
        :root {
            --bg: #0e0e12; --card: #16161e; --border: #2a2a38; --blue: #3b82f6;
            --blue-dim: #1d3a6e; --green: #10b981; --red: #f43f5e; --amber: #f59e0b;
            --text: #e8e8f0; --muted: #6b6b80; --mono: 'Courier New', monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 32px; width: 100%; max-width: 440px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .logo-icon { width: 36px; height: 36px; background: var(--blue); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        input { width: 100%; padding: 12px; background: #0a0a10; border: 1px solid var(--border); color: var(--text); border-radius: 10px; font-size: 14px; outline: none; margin-bottom: 16px; transition: 0.2s; }
        input:focus { border-color: var(--blue); }
        .omnibox { border: 1px solid var(--blue); color: var(--green); font-family: var(--mono); }
        .btn { width: 100%; padding: 12px; background: var(--blue); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; margin-top: 4px; }
        .status { font-size: 13px; padding: 10px; border-radius: 8px; margin-bottom: 16px; display: none; }
        .status.show { display: block; }
        .status.error { background: rgba(244,63,94,0.1); color: var(--red); border: 1px solid var(--red); }
        .bg-display { text-align: center; padding: 20px 0; border: 1px solid var(--border); border-radius: 14px; background: #0a0a10; margin-bottom: 16px; }
        .bg-value { font-size: 64px; font-weight: 800; color: var(--green); }
        .bg-value.low { color: var(--red); }
        .bg-value.high { color: var(--amber); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
        .stat-box { background: #0a0a10; border: 1px solid var(--border); border-radius: 12px; padding: 12px; text-align: center; }
        .stat-val { font-weight: 700; font-size: 16px; display: block; }
        .stat-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; }
        .response-box { background: rgba(59,130,246,0.08); border-right: 3px solid var(--blue); border-radius: 8px; padding: 12px; font-size: 13px; margin-bottom: 12px; display: none; line-height: 1.6; }
        .hidden { display: none !important; }
        .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid transparent; border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="login-screen" class="card">
    <div class="logo"><div class="logo-icon">💉</div><h1>Loopie Ultra</h1></div>
    <div id="login-status" class="status"></div>
    <label>כתובת Nightscout</label>
    <input type="text" id="nsUrl" placeholder="https://herokuapp.com">
    <label>API Secret</label>
    <input type="password" id="apiSecret" placeholder="••••••••">
    <button class="btn" id="loginBtn" onclick="connect()">התחבר למערכת</button>
</div>

<div id="main-screen" class="card hidden">
    <div class="logo" style="margin-bottom:15px">
        <div class="logo-icon" style="width:28px;height:28px;font-size:14px">♾️</div>
        <span id="badge-name" style="font-weight:700">Loopie Active</span>
    </div>
    
    <div class="bg-display">
        <div class="bg-value" id="current-bg">--</div>
        <div id="trend-label" style="font-size:14px; color:var(--muted)">טוען...</div>
    </div>

    <div class="stats-grid">
        <div class="stat-box"><span class="stat-lbl">IOB</span><span id="stat-iob" class="stat-val">0.0</span></div>
        <div class="stat-box"><span class="stat-lbl">בזאלי</span><span id="stat-basal" class="stat-val">0.0</span></div>
    </div>

    <div id="omni-res" class="response-box"></div>
    <input type="text" id="omnibox" class="omnibox" placeholder="שאל: מה המצב? / מה אכלתי? / גיל ציוד" onkeydown="if(event.key==='Enter') askOmnibox()">
    
    <button class="btn" onclick="fetchData()">רענן הכל</button>
    <button class="btn" style="background:transparent; border:1px solid var(--border); color:var(--muted); margin-top:8px" onclick="location.reload()">התנתקות</button>
</div>

<script>
let nsData = { iob: 0, basal: 0 };
let fullHistory = { entries: [], treatments: [], devStatus: {} };
let refreshTimer = null;

function nsUrl() { return document.getElementById('nsUrl').value.trim().replace(/\/$/, ""); }
function nsSecret() { return document.getElementById('apiSecret').value.trim(); }
function nsGet(path) {
    const sep = path.includes('?') ? '&' : '?';
    return fetch(nsUrl() + path + sep + 'api_secret=' + nsSecret(), { mode: 'cors' });
}

const safeGet = (obj, path, fallback) => {
    if (fallback === undefined) fallback = "--";
    return path.split('.').reduce(function(acc, part) { return acc && acc[part]; }, obj) || fallback;
};

async function connect() {
    const btn = document.getElementById('loginBtn');
    if (!nsUrl() || !nsSecret()) return;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> מתחבר...';
    try {
        const res = await nsGet('/api/v1/status.json');
        if (!res.ok) throw new Error();
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.remove('hidden');
        fetchData();
        refreshTimer = setInterval(fetchData, 60000);
    } catch (e) {
        btn.disabled = false; btn.innerText = "שגיאת חיבור";
    }
}

async function fetchData() {
    try {
        // 1. נתונים חיים (Pebble) — p.bgs הוא מערך, לוקחים [0]
        const pRes = await nsGet('/pebble');
        const p = await pRes.json();
        const bgs = (p.bgs && p.bgs[0]) ? p.bgs[0] : {};

        const sgv = bgs.sgv || 0;
        document.getElementById('current-bg').innerText = sgv || "--";
        document.getElementById('current-bg').className = 'bg-value' + (sgv < 70 ? ' low' : sgv > 180 ? ' high' : '');
        document.getElementById('trend-label').innerText = bgs.direction || "Flat";
        const iobVal = bgs.iob || "0.00";
        document.getElementById('stat-iob').innerText = iobVal;
        nsData.iob = iobVal;

        // 2. טעינה מקבילה: entries (24ש'), treatments (24ש'), ציוד (30 יום), devicestatus
        const dayAgo   = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
        const monthAgo = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000).toISOString();

        const [ent, treat, equipTreat, dev] = await Promise.all([
            nsGet('/api/v1/entries.json?find[dateString][$gte]=' + dayAgo + '&count=500').then(function(r){ return r.json(); }).catch(function(){ return []; }),
            nsGet('/api/v1/treatments.json?find[created_at][$gte]=' + dayAgo + '&count=200').then(function(r){ return r.json(); }).catch(function(){ return []; }),
            nsGet('/api/v1/treatments.json?find[created_at][$gte]=' + monthAgo + '&find[eventType][$in]=Sensor%20Change,Pod%20Change,Site%20Change&count=10').then(function(r){ return r.json(); }).catch(function(){ return []; }),
            nsGet('/api/v1/devicestatus.json?count=1').then(function(r){ return r.json(); }).catch(function(){ return []; })
        ]);

        // מיזוג — ציוד מ-30 יום עם שאר treatments מ-24 שעות (ללא כפילויות)
        const allTreat = treat.concat(equipTreat.filter(function(e) {
            return !treat.find(function(t) { return t._id === e._id; });
        }));
        fullHistory = { entries: ent, treatments: allTreat, devStatus: dev[0] || {} };

        // בזאלי — safeGet מונע קריסה אם pump.basal לא קיים
        const basalRate = safeGet(fullHistory.devStatus, 'pump.basal.rate', "0.0");
        document.getElementById('stat-basal').innerText = basalRate;
        nsData.basal = basalRate;

    } catch (e) { console.error("Update error:", e); }
}

async function askOmnibox() {
    const input = document.getElementById('omnibox');
    const resp = document.getElementById('omni-res');
    const q = input.value.trim().toLowerCase();
    if (!q) return;

    resp.style.display = 'block';
    resp.innerHTML = "מנתח... 🧠";

    let answer = "";
    const tr  = fullHistory.treatments || [];
    const ent = fullHistory.entries    || [];

    // IOB
    if (q.includes("iob") || q.includes("פעיל") || q.includes("אינסולין")) {
        answer = "האינסולין הפעיל (IOB) שלך הוא " + nsData.iob + " יחידות.";
    }
    // ארוחות / COB / פחמימות
    else if (q.includes("אכלתי") || q.includes("אוכל") || q.includes("פחמימות") || q.includes("cob") || q.includes("ארוחה")) {
        const meals = tr.filter(function(t) { return t.carbs > 0; }).slice(0, 5);
        if (meals.length) {
            answer = "<b>ארוחות אחרונות:</b><br>" +
                meals.map(function(m) {
                    return "• " + new Date(m.created_at).toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'}) +
                        ": " + (m.notes || 'ארוחה') + " (" + m.carbs + "g" + (m.insulin ? ", " + m.insulin + "U" : "") + ")";
                }).join("<br>");
        } else { answer = "לא מצאתי רישומי פחמימות ב-24 השעות האחרונות."; }
    }
    // ציוד — מחפש ב-30 יום האחרונים
    else if (q.includes("חיישן") || q.includes("פוד") || q.includes("גיל") || q.includes("ציוד") || q.includes("החלפ")) {
        const sensor = tr.find(function(t) { return t.eventType === "Sensor Change"; });
        const pod    = tr.find(function(t) { return t.eventType === "Pod Change" || t.eventType === "Site Change"; });
        answer = "<b>מצב ציוד:</b><br>";
        if (sensor) {
            const ageH = (Date.now() - new Date(sensor.created_at)) / (1000*60*60);
            const sDays = (ageH / 24).toFixed(1);
            const sLeft = Math.max(0, 240 - ageH).toFixed(0);
            answer += "• חיישן: הוחלף לפני " + sDays + " ימים. נותרו ~" + sLeft + " שעות.<br>";
        } else { answer += "• חיישן: לא נמצאה החלפה ב-30 הימים האחרונים.<br>"; }
        if (pod) {
            const ageH = (Date.now() - new Date(pod.created_at)) / (1000*60*60);
            const pLeft = Math.max(0, 72 - ageH).toFixed(0);
            answer += "• פוד: הוחלף לפני " + ageH.toFixed(1) + " שעות. נותרו ~" + pLeft + " שעות.";
        } else { answer += "• פוד: לא נמצאה החלפה ב-30 הימים האחרונים."; }
    }
    // TIR / מאזן יומי
    else if (q.includes("איך") || q.includes("מצב") || q.includes("מאוזן") || q.includes("tir") || q.includes("טווח")) {
        if (ent.length > 10) {
            const inRange = ent.filter(function(e) { return e.sgv >= 70 && e.sgv <= 180; }).length;
            const tir = (inRange / ent.length * 100).toFixed(0);
            const avg = (ent.reduce(function(a, b) { return a + b.sgv; }, 0) / ent.length).toFixed(0);
            const low = ent.filter(function(e) { return e.sgv < 70; }).length;
            const high = ent.filter(function(e) { return e.sgv > 180; }).length;
            answer = "ניתוח 24 שעות אחרונות:<br>" +
                "• TIR בטווח: " + tir + "%<br>" +
                "• ממוצע סוכר: " + avg + " mg/dL<br>" +
                "• נמוך מ-70: " + low + " קריאות<br>" +
                "• גבוה מ-180: " + high + " קריאות<br>" +
                (tir > 75 ? "🌟 יום מצוין!" : "📈 יש מקום לשיפור.");
        } else { answer = "אין מספיק נתוני היסטוריה לניתוח."; }
    }
    // בזאלי
    else if (q.includes("בזאלי") || q.includes("basal")) {
        answer = "קצב בזאלי נוכחי: " + nsData.basal + " U/hr.";
    }
    else {
        answer = "נסה לשאול: 'כמה IOB יש לי?', 'מה אכלתי?', 'גיל חיישן ופוד', 'איך הייתי היום?' או 'מה הבזאלי?'.";
    }

    resp.innerHTML = answer;
    input.value = '';
}
</script>
</body>
</html>
