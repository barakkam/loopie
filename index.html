<script>
let nsData = { iob: "0.00", cob: 0, basal: "0.0", currentSgv: 0, delta: 0 };
let PENDING_DOSE = null; // הזרקה ממתינה לחלקה השני

// ========= מערכת זיכרון אימוגים =========
var EMOJI_MAP = {}; // { "🍎": "תפוח", "🍌": "בננה" }
var LAST_FOOD_QUERY = null;

async function loadEmojiMap() {
    try {
        var mem = await loadMemory();
        if (mem['emoji_map'] && mem['emoji_map'].value) EMOJI_MAP = mem['emoji_map'].value;
    } catch(e) {}
}

async function learnEmoji(emoji, foodName) {
    if (!emoji || !foodName) return;
    EMOJI_MAP[emoji] = foodName.trim();
    await saveMemory('emoji_map', EMOJI_MAP);
    console.log("Learned emoji:", emoji, "=", foodName);
}

function extractEmojis(text) {
    var result = [];
    for (var i = 0; i < text.length; i++) {
        var code = text.codePointAt(i);
        if (code > 0x1F300 && code <= 0x1FFFF) {
            result.push(String.fromCodePoint(code));
            if (code > 0xFFFF) i++; // surrogate pair
        }
    }
    return result;
}

function detectFoodName(text) {
    var t = text.trim();
    var lower = t.toLowerCase();

    // בדוק אימוג'ים מוכרים
    var emojis = extractEmojis(t);
    for (var i = 0; i < emojis.length; i++) {
        if (EMOJI_MAP[emojis[i]]) return EMOJI_MAP[emojis[i]];
    }

    // הסר מילות פעולה ושאלה
    var cleaned = t
        .replace(/כמה\s+להזריק\s+(על\s+)?/gi,'')
        .replace(/כמה\s+אינסולין\s+(על\s+)?/gi,'')
        .replace(/כמה\s+פחמימות\s+(ב|ב-)?/gi,'')
        .replace(/מינון\s+(על\s+)?/gi,'')
        .replace(/^על\s+/,'')
        .replace(/\?/g,'').trim();

    if (!cleaned || cleaned.length < 2) return null;

    // דלג על מילות שאלה
    var questionWords = ['כמה','מה','האם','איפה','מתי','למה','איך','לפני','אחרי',
                         'iob','cob','smb','תיקון','בזאלי','פרופיל','isf','cr'];
    var cl = cleaned.toLowerCase();
    if (questionWords.some(function(w){ return cl === w || cl.startsWith(w + ' '); })) return null;

    // דלג על מילים קצרות מאוד שאינן שמות אוכל
    if (cleaned.length < 2) return null;

    return cleaned;
}

// Firebase Firestore REST API (ללא SDK — עובד ב-HTML פשוט)
async function fsGet(collection, docId) {
    if (!FIREBASE_CONFIG.useFirebase || !FIREBASE_CONFIG.projectId) return null;
    var url = "https://firestore.googleapis.com/v1/projects/" + FIREBASE_CONFIG.projectId +
              "/databases/(default)/documents/" + collection + "/" + docId +
              "?key=" + FIREBASE_CONFIG.apiKey;
    try {
        var res = await fetch(url);
        if (!res.ok) return null;
        var data = await res.json();
        return firestoreToObj(data.fields || {});
    } catch(e) { console.error("fsGet error:", e); return null; }
}

async function fsSet(collection, docId, obj) {
    if (!FIREBASE_CONFIG.useFirebase || !FIREBASE_CONFIG.projectId) {
        // fallback ל-localStorage
        try { localStorage.setItem('loopie_' + collection + '_' + docId, JSON.stringify(obj)); } catch(e) {}
        return;
    }
    var url = "https://firestore.googleapis.com/v1/projects/" + FIREBASE_CONFIG.projectId +
              "/databases/(default)/documents/" + collection + "/" + docId +
              "?key=" + FIREBASE_CONFIG.apiKey;
    try {
        await fetch(url, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ fields: objToFirestore(obj) })
        });
    } catch(e) { console.error("fsSet error:", e); }
}

async function fsGetLocal(collection, docId) {
    try {
        var raw = localStorage.getItem('loopie_' + collection + '_' + docId);
        return raw ? JSON.parse(raw) : null;
    } catch(e) { return null; }
}

// המרת אובייקט JS ל-Firestore format
function objToFirestore(obj) {
    var fields = {};
    Object.keys(obj).forEach(function(k) {
        var v = obj[k];
        if (typeof v === 'string')  fields[k] = { stringValue: v };
        else if (typeof v === 'number') fields[k] = { doubleValue: v };
        else if (typeof v === 'boolean') fields[k] = { booleanValue: v };
        else fields[k] = { stringValue: JSON.stringify(v) };
    });
    return fields;
}

function firestoreToObj(fields) {
    var obj = {};
    Object.keys(fields).forEach(function(k) {
        var f = fields[k];
        if (f.stringValue !== undefined) {
            try { obj[k] = JSON.parse(f.stringValue); } catch(e) { obj[k] = f.stringValue; }
        }
        else if (f.doubleValue !== undefined) obj[k] = f.doubleValue;
        else if (f.booleanValue !== undefined) obj[k] = f.booleanValue;
    });
    return obj;
}

// פונקציות זיכרון מעודכנות — Firebase ראשון, localStorage כ-fallback
async function loadMemory() {
    if (memCache) return memCache;
    var mem = {};
    try {
        if (FIREBASE_CONFIG.useFirebase) {
            // טעינה מ-Firebase
            var res = await fetch(
                "https://firestore.googleapis.com/v1/projects/" + FIREBASE_CONFIG.projectId +
                "/databases/(default)/documents/loopie_memory?key=" + FIREBASE_CONFIG.apiKey +
                "&pageSize=200"
            );
            if (res.ok) {
                var data = await res.json();
                (data.documents || []).forEach(function(doc) {
                    var key = doc.name.split('/').pop();
                    try {
                        var val = firestoreToObj(doc.fields || {});
                        mem[key] = { value: val.data !== undefined ? val.data : val, updated: val.updated };
                    } catch(e) {}
                });
            }
        } else {
            // localStorage fallback
            for (var i = 0; i < localStorage.length; i++) {
                var k = localStorage.key(i);
                if (k && k.startsWith('loopie_memory_')) {
                    var key2 = k.replace('loopie_memory_', '');
                    try { mem[key2] = { value: JSON.parse(localStorage.getItem(k)) }; } catch(e) {}
                }
            }
        }
    } catch(e) { console.error("loadMemory:", e); }
    memCache = mem;
    return mem;
}

async function saveMemory(key, value) {
    try {
        if (FIREBASE_CONFIG.useFirebase) {
            var url = "https://firestore.googleapis.com/v1/projects/" + FIREBASE_CONFIG.projectId +
                      "/databases/(default)/documents/loopie_memory/" + encodeURIComponent(key) +
                      "?key=" + FIREBASE_CONFIG.apiKey;
            await fetch(url, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fields: {
                    data:    { stringValue: JSON.stringify(value) },
                    updated: { stringValue: new Date().toISOString() }
                }})
            });
        } else {
            // localStorage fallback
            localStorage.setItem('loopie_memory_' + key, JSON.stringify(value));
        }
        if (memCache) memCache[key] = { value: value, updated: new Date().toISOString() };
    } catch(e) { console.error("saveMemory:", e); }
}

                { name: (juiceC>=15 ? "4 שלוקים מיץ (15g)" : "2 שלוקים מיץ (7.5g)"), carbs: juiceC, fast: true },
                { name: (barC>=7.5 ? "פתיבר שלם (7.5g)" : "חצי פתיבר (4g)"),          carbs: barC,   fast: false }
            ],
            totalCarbs: juiceC + barC,
            color: "#f59e0b"
        });
    }

    // אפשרות ג — פתיבר בלבד (אם נמוך קל)
    if (carbsNeeded <= 10) {
        var bars = carbsNeeded >= 7.5 ? [{ name: "פתיבר שלם (7.5g)", carbs: 7.5, fast: false }]
                                      : [{ name: "חצי פתיבר (4g)",   carbs: 4,   fast: false }];
        plans.push({
            label: "פתיבר בלבד",
            items: bars,
            totalCarbs: bars[0].carbs,
            color: "#10b981"
        });
    }

    // האם לרשום ב-Loop?
    // עקרון רפואי: Loop משתמש בנתוני פחמימות לחיזוי וכיול עתידי.
    // IOB גבוה = אינסולין פעיל שעלול להמשיך להוריד סוכר — חובה לרשום.
    var loopNote = "";
    if (iob > 1.5 && sgv < 90) {
        loopNote = "⚠️ רשום ב-Loop: פחמימות " + carbsNeeded + "g | אינסולין: 0U (חילוץ)";
    } else if (iob > 0.5) {
        loopNote = "📱 רשום ב-Loop: פחמימות " + carbsNeeded + "g | אינסולין: 0U";
    } else {
        loopNote = "ℹ️ לא חייב לרשום ב-Loop — IOB נמוך";
    }

    return { plans: plans, loopNote: loopNote };
}

// חישוב כמות חילוץ נדרשת
function calcRescueCarbs(sgv, targetBG, iob, isf) {
    targetBG = targetBG || 120;
    var fromSGV  = Math.max(0, Math.ceil((targetBG - sgv) * 0.04 * 10)); // כ-4g לכל 10 נקודות
    var fromIOB  = Math.round(iob * (isf || 50) / 10);                   // IOB עלול להוריד עוד
    return Math.max(fromSGV, fromIOB, 0);
}

// === פונקציות עזר לבזאלי — קפיצות של 0.05 ===
function roundBasal(val) {
    var r = Math.round(parseFloat(val) / 0.05) * 0.05;
    return parseFloat(r.toFixed(2));
}
function basalUp(val)   { return roundBasal(parseFloat(val) + 0.05); }
function basalDown(val) { return roundBasal(Math.max(0, parseFloat(val) - 0.05)); }

// נרמול שמות — טיפול בוריאציות כתיב
function normalizeFood(name) {
    if (!name) return '';
    return name.trim().toLowerCase()
        .replace(/צ['']?יפס|ציפס|chips/g, 'ציפס')
        .replace(/המבורגר|המבורגרר|burger|המבורגם/g, 'המבורגר')
        .replace(/פיצ['']?ה|פיצה|פיצא|pizza/g, 'פיצה')
        .replace(/פית['']?ה|פיתה|פיתא/g, 'פיתה')
        .replace(/[''`]/g, '');
}

// חיפוש מאכל במאגר — עם תמיכה בחיפוש חלקי ועברית חסרה
function findFood(name) {
    if (!name || !name.trim()) return null;
    var n = normalizeFood(name);
    var keys = Object.keys(FOOD_DB);
    // התאמה מדויקת
    for (var i = 0; i < keys.length; i++) {
        if (n === normalizeFood(keys[i])) return { key: keys[i], data: FOOD_DB[keys[i]] };
    }
    // חיפוש חלקי — הקלט מוכל במפתח
    for (var i = 0; i < keys.length; i++) {
        var nk = normalizeFood(keys[i]);
        if (nk.includes(n) && n.length >= 2) return { key: keys[i], data: FOOD_DB[keys[i]] };
    }
    // חיפוש חלקי — המפתח מוכל בקלט
    for (var i = 0; i < keys.length; i++) {
        var nk2 = normalizeFood(keys[i]);
        if (n.includes(nk2) && nk2.length >= 2) return { key: keys[i], data: FOOD_DB[keys[i]] };
    }
    return null;
}

function profileValueAt(arr, hour) {
    if (!arr || !arr.length) return null;

    for (var i = 0; i < sorted.length; i++) {
        if (parseInt((sorted[i].time||"0").split(':')[0]) <= hour) val = sorted[i].value;

async function generateReport(days) {
    showPopup("📊 מייצר דוח ל-" + days + " ימים...", '<div style="text-align:center;padding:20px"><span class="spinner" style="width:24px;height:24px;border-width:3px"></span></div>');

    try {
        var [entRes, treatRes, profRes] = await Promise.all([
            nsGet('/api/v1/entries.json?find[dateString][$gte]=' + from + '&count=5000'),
            nsGet('/api/v1/treatments.json?find[created_at][$gte]=' + from + '&count=2000'),
            nsGet('/api/v1/profile.json')
        ]);

        var entries = entRes.ok    ? await entRes.json()    : [];
        var treats  = treatRes.ok  ? await treatRes.json()  : [];
        var profRaw = profRes.ok   ? await profRes.json()   : [];
        var profD   = Array.isArray(profRaw) ? profRaw[0] : profRaw;
        var store   = (profD && profD.store) ? profD.store[profD.defaultProfile || Object.keys(profD.store)[0]] : null;

        if (!entries.length) { showPopup("אין נתונים", "לא נמצאו קריאות סוכר לתקופה זו."); return; }

        // === סטטיסטיקות בסיסיות ===
        var sgvs  = entries.map(function(e){ return e.sgv; }).filter(Boolean);
        var avg   = sgvs.reduce(function(a,b){return a+b;},0) / sgvs.length;
        // GMI (Glucose Management Indicator): מחשב HbA1c משוער מממוצע סוכר
        // נוסחה קלינית: GMI = 3.31 + (0.02392 × average glucose mg/dL)
        // CV (מקדם שונות): <36% = ניהול יציב, >36% = תנודתיות גבוהה (סיכון)
        var gmi   = (3.31 + 0.02392 * avg).toFixed(1); // GMI מ-avg
        var sd    = Math.sqrt(sgvs.reduce(function(a,b){return a+Math.pow(b-avg,2);},0)/sgvs.length).toFixed(0);
        var cv    = ((parseFloat(sd)/avg)*100).toFixed(0);
        var tir   = (sgvs.filter(function(v){return v>=70&&v<=180;}).length/sgvs.length*100).toFixed(1);
        var tirT  = (sgvs.filter(function(v){return v>180&&v<=250;}).length/sgvs.length*100).toFixed(1);
        var tirH  = (sgvs.filter(function(v){return v>250;}).length/sgvs.length*100).toFixed(1);
        var tirL  = (sgvs.filter(function(v){return v>=54&&v<70;}).length/sgvs.length*100).toFixed(1);
        var tirVL = (sgvs.filter(function(v){return v<54;}).length/sgvs.length*100).toFixed(1);

        // === ניתוח לפי שעות (24 buckets) ===
        var hourBuckets = Array.from({length:24}, function(){ return []; });
        entries.forEach(function(e){
            if (e.sgv) hourBuckets[new Date(e.dateString||e.date).getHours()].push(e.sgv);
        });
        var hourStats = hourBuckets.map(function(arr, h){
            if (!arr.length) return null;
            var m = arr.reduce(function(a,b){return a+b;},0)/arr.length;
            var low = arr.filter(function(v){return v<70;}).length/arr.length*100;
            var high= arr.filter(function(v){return v>180;}).length/arr.length*100;
            return { h:h, avg:Math.round(m), low:low.toFixed(0), high:high.toFixed(0) };
        });

        // מצא שעות בעייתיות
        var highHours = hourStats.filter(function(s){ return s && parseFloat(s.high) > 30; });
        var lowHours  = hourStats.filter(function(s){ return s && parseFloat(s.low) > 10; });

        // === ניתוח ארוחות vs. סוכר אחרי ===
        var meals = treats.filter(function(t){ return t.carbs > 0; });
        var postMealSpikes = [];
        meals.forEach(function(m){
            var mealTime = new Date(m.created_at).getTime();
            var post2h = entries.filter(function(e){
                var dt = new Date(e.dateString||e.date).getTime() - mealTime;
                return dt > 60*60000 && dt < 2.5*3600000;
            }).map(function(e){ return e.sgv; });
            if (post2h.length) {
                var peakPost = Math.max.apply(null, post2h);
                postMealSpikes.push({ carbs: m.carbs, peak: peakPost, ins: m.insulin||0 });
            }
        });
        var avgSpike = postMealSpikes.length
            ? (postMealSpikes.reduce(function(a,b){return a+b.peak;},0)/postMealSpikes.length).toFixed(0)
            : null;

        // === ניתוח בזאלי לפי שעות ===
        var basalRecs = [];
        if (store && store.basal) {
            store.basal.forEach(function(b, i){
                var nextB = store.basal[i+1];
                var startH = parseInt((b.time||'0:0').split(':')[0]);
                var endH   = nextB ? parseInt(nextB.time.split(':')[0]) : 24;
                var bucket = [];
                for (var h = startH; h < endH; h++) {
                    if (hourStats[h]) bucket.push(hourStats[h]);
                }
                if (!bucket.length) return;
                var avgBucketBG = bucket.reduce(function(a,s){return a+s.avg;},0)/bucket.length;
                var rec = null;
                // הצג המלצה רק אם יש סטייה משמעותית (>180 גבוה, <80 נמוך)
                // ולא על כל בלוק — רק המשמעותיים ביותר
                if (avgBucketBG > 180) {
                    rec = "⬆️ בזאלי " + b.time + ": " + b.value + " → <b>" + basalUp(b.value) + " U/hr</b> (ממוצע " + Math.round(avgBucketBG) + ")";
                } else if (avgBucketBG < 80) {
                    rec = "⬇️ בזאלי " + b.time + ": " + b.value + " → <b>" + basalDown(b.value) + " U/hr</b> (ממוצע " + Math.round(avgBucketBG) + ")";
                }
                if (rec && basalRecs.length < 3) basalRecs.push(rec);
            });
        }

        // === המלצות CR ===
        var crRecs = [];
        if (avgSpike && parseFloat(avgSpike) > 200) {
            // CR הנוכחי מהפרופיל
            var profCR1 = store ? profileValueAt(store.carbratio||store.carbRatio||store.ic, 12) : null;
            var newCR1  = profCR1 ? (parseFloat(profCR1)-1).toFixed(0) : null;
            crRecs.push("📈 ממוצע שיא אחרי ארוחה: " + avgSpike + " mg/dL — CR חזק יותר" + (profCR1 && newCR1 ? ": <b>⬇️ " + profCR1 + " → " + newCR1 + " g/U</b> (פחות גרם ליחידה = יותר אינסולין)" : " (הורד CR)"));
        }
        if (avgSpike && parseFloat(avgSpike) < 120) {
            var profCR2 = store ? profileValueAt(store.carbratio||store.carbRatio||store.ic, 12) : null;
            var newCR2  = profCR2 ? (parseFloat(profCR2)+1).toFixed(0) : null;
            crRecs.push("📉 שיאים אחרי ארוחות נמוכים (" + avgSpike + ") — CR עדין יותר" + (profCR2 && newCR2 ? ": <b>⬆️ " + profCR2 + " → " + newCR2 + " g/U</b> (יותר גרם ליחידה = פחות אינסולין)" : " (העלה CR)"));
        }

        // === המלצות ISF ===
        var isfRecs = [];
        var profISF1 = store ? profileValueAt(store.sens||store.sensitivity, 12) : null;
        var newISF1  = profISF1 ? Math.round(parseFloat(profISF1)*0.9/5)*5 : null; // הקטן ב-10%, עיגול ל-5
        if (parseFloat(tirH) > 20) isfRecs.push("🎯 " + tirH + "% מהזמן מעל 180 — ISF חזק יותר" + (profISF1 && newISF1 ? ": <b>⬇️ " + profISF1 + " → " + newISF1 + " mg/dL/U</b> (ירידת מספר = תיקון חזק יותר)" : " (הורד את ערך ISF)"));
        var profISF2 = store ? profileValueAt(store.sens||store.sensitivity, 12) : null;
        var newISF2  = profISF2 ? Math.round(parseFloat(profISF2)*1.1/5)*5 : null; // הגדל ב-10%, עיגול ל-5
        if (parseFloat(tirL) + parseFloat(tirVL) > 5) isfRecs.push("⚠️ " + (parseFloat(tirL)+parseFloat(tirVL)).toFixed(1) + "% מתחת ל-70 — ISF עדין יותר" + (profISF2 && newISF2 ? ": <b>⬆️ " + profISF2 + " → " + newISF2 + " mg/dL/U</b> (עלייה = תיקון עדין יותר)" : " (העלה את ערך ISF)"));

        // === בניית הדוח ===
        var r = "";
        r += "<div style='background:#0a0a14;border-radius:10px;padding:14px;margin-bottom:14px'>";
        r += "<b style='color:var(--blue)'>📊 סיכום " + days + " ימים</b><br><br>";
        r += "• ממוצע סוכר: <b>" + avg.toFixed(0) + " mg/dL</b><br>";
        r += "• GMI (HbA1c משוער): <b>" + gmi + "%</b><br>";
        r += "• סטיית תקן: <b>" + sd + "</b> | CV: <b>" + cv + "%</b>" + (parseFloat(cv)<36?" ✅":" ⚠️") + "<br>";
        r += "• מספר קריאות: " + sgvs.length + "</div>";

        r += "<div style='background:#0a0a14;border-radius:10px;padding:14px;margin-bottom:14px'>";
        r += "<b>🎯 TIR (Time In Range)</b><br><br>";

        // >70% בטווח 70-180, <4% מתחת ל-70, <25% מעל 180
        r += bar(tir,   "#10b981", "70–180 מטרה ADA: >70%") + tir  + "%<br>";
        r += bar(tirT,  "#f59e0b", "181–250 (גבוה)")  + tirT + "%<br>";
        r += bar(tirH,  "#ef4444", ">250 (גבוה מאוד)") + tirH + "%<br>";
        r += bar(tirL,  "#f97316", "54–69 (נמוך)")    + tirL + "%<br>";
        r += bar(tirVL, "#dc2626", "<54 (נמוך מאוד)") + tirVL + "%</div>";

        if (highHours.length || lowHours.length) {
            r += "<div style='background:#0a0a14;border-radius:10px;padding:14px;margin-bottom:14px'>";
            r += "<b>🕐 שעות בעייתיות</b><br><br>";

            if (lowHours.length)  r += "📉 נמוך: " + lowHours.map(function(s){return s.h+":00 ("+s.low+"% מתחת 70)";}).join(", ");
            r += "</div>";

        var allRecs = basalRecs.concat(crRecs).concat(isfRecs);
        if (allRecs.length) {
            r += "<div style='background:rgba(59,130,246,0.08);border:1px solid var(--blue-dim);border-radius:10px;padding:14px;margin-bottom:14px'>";
            r += "<b>💡 המלצות לשיקול דעת</b><br><br>";

        } else {
            r += "<div style='background:rgba(16,185,129,0.08);border:1px solid #10b981;border-radius:10px;padding:12px;margin-bottom:14px'>";
            r += "✅ <b>הגדרות נראות טובות</b> לתקופה זו.</div>";
        }

        r += "<small style='color:#555'>⚕️ ניתוח עזר בלבד — לא תחליף לשיקול רפואי.</small>";

        showPopup("📊 דוח " + days + " ימים", r);

    } catch(e) {
        showPopup("שגיאה", "לא ניתן להפיק דוח: " + e.message);

function bar(pct, color, label) {
    var w = Math.min(100, Math.max(2, parseFloat(pct)));
    return "<div style='font-size:11px;color:#888;margin-bottom:2px'>" + label + "</div>" +
           "<div style='background:#1a1a28;border-radius:4px;height:8px;margin-bottom:8px'>" +
           "<div style='background:" + color + ";width:" + w + "%;height:100%;border-radius:4px'></div></div>";
}

                var dt = new Date(e.dateString||e.date).getTime()-mt;

            }).map(function(e){return e.sgv;});
            var peak = post90.length ? Math.max.apply(null, post90) : null;

            // סוכר אחרי 2 שעות (±15 דק')
            var post2h = entries.filter(function(e){
                var dt = new Date(e.dateString||e.date).getTime()-mt;
                return dt > 105*60000 && dt < 135*60000;
            });
            var sgv2h = post2h.length ? Math.round(post2h.reduce(function(a,b){return a+b.sgv;},0)/post2h.length) : null;

            // סוכר אחרי 3 שעות (±15 דק')
            var post3h = entries.filter(function(e){
                var dt = new Date(e.dateString||e.date).getTime()-mt;
                return dt > 165*60000 && dt < 195*60000;
            });
            var sgv3h = post3h.length ? Math.round(post3h.reduce(function(a,b){return a+b.sgv;},0)/post3h.length) : null;

            var rise = (peak && sgvAt) ? peak - sgvAt : null;
            var outcome = "לא ידוע";
            var outcomeColor = "#888";
            if (sgv2h !== null) {
                if      (sgv2h >= 70 && sgv2h <= 140) { outcome = "✅ טוב";           outcomeColor = "#10b981"; }
                else if (sgv2h > 140 && sgv2h <= 180) { outcome = "🟡 גבוה קצת";     outcomeColor = "#f59e0b"; }
                else if (sgv2h > 180)                  { outcome = "🔴 גבוה מדי";     outcomeColor = "#ef4444"; }
                else if (sgv2h < 70)                   { outcome = "🔵 נמוך מדי";     outcomeColor = "#3b82f6"; }
            }

            return {
                date:     new Date(m.created_at).toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit'}),
                time:     new Date(m.created_at).toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit',hour12:false}),
                carbs:    m.carbs  || 0,
                insulin:  m.insulin ? parseFloat(m.insulin).toFixed(1) : 0,
                extended: m.extended ? parseFloat(m.extended).toFixed(1) : null,
                duration: m.duration || null,
                sgvAt:    sgvAt,
                peak:     peak,
                rise:     rise,
                sgv2h:    sgv2h,
                sgv3h:    sgv3h,
                outcome:  outcome,
                outcomeColor: outcomeColor
            };
        });

        // === סטטיסטיקות מצטברות ===
        var good    = results.filter(function(r){return r.outcome.includes("✅");}).length;
        var midRes  = results.filter(function(r){return r.outcome.includes("🟡");}).length;
        var highRes = results.filter(function(r){return r.outcome.includes("🔴");}).length;
        var low     = results.filter(function(r){return r.outcome.includes("🔵");}).length;
        var n       = results.length;

        var avgCarbs = (results.reduce(function(a,b){return a+(b.carbs||0);},0)/n).toFixed(0);
        var avgIns   = (results.reduce(function(a,b){return a+parseFloat(b.insulin||0);},0)/n).toFixed(2);
        var avgCR    = results.filter(function(r){return r.carbs>0&&parseFloat(r.insulin)>0;})
                              .reduce(function(a,r){return a+(r.carbs/parseFloat(r.insulin));},0);
        var crCount  = results.filter(function(r){return r.carbs>0&&parseFloat(r.insulin)>0;}).length;
        var avgCRval = crCount ? (avgCR/crCount).toFixed(1) : null;

        var withPeak  = results.filter(function(r){return r.peak;});
        var avgPeak   = withPeak.length ? Math.round(withPeak.reduce(function(a,b){return a+b.peak;},0)/withPeak.length) : null;
        var withRise  = results.filter(function(r){return r.rise;});
        var avgRise   = withRise.length ? Math.round(withRise.reduce(function(a,b){return a+b.rise;},0)/withRise.length) : null;
        var with2h    = results.filter(function(r){return r.sgv2h;});
        var avg2h     = with2h.length ? Math.round(with2h.reduce(function(a,b){return a+b.sgv2h;},0)/with2h.length) : null;

        // מידע על חלוקת הזרקה בהיסטוריה
        var extResults = results.filter(function(r){return r.extended;});
        var hasExt = extResults.length > 0;
        var avgExtPct = hasExt
            ? Math.round(extResults.reduce(function(a,r){
                var t=parseFloat(r.insulin)+parseFloat(r.extended||0);
                return t>0 ? a+(parseFloat(r.insulin)/t*100) : a;
              },0)/extResults.length)
            : INSULIN_CONFIG.splitNow;
        var avgExtDur = hasExt
            ? Math.round(extResults.reduce(function(a,r){return a+(r.duration||60);},0)/extResults.length)
            : INSULIN_CONFIG.splitDelay;

        // === ניתוח מעמיק ===
        // בדוק: האם ארוחות שהיה להן extended יצאו טוב יותר?
        var extGoodPct  = extResults.length
            ? extResults.filter(function(r){return r.outcome.includes("✅");}).length/extResults.length
            : null;
        var noExtResults = results.filter(function(r){return !r.extended;});
        var noExtGoodPct = noExtResults.length
            ? noExtResults.filter(function(r){return r.outcome.includes("✅");}).length/noExtResults.length
            : null;

        // בדוק: האם עלייה מהירה (sgv peak גבוה + rise גדול) → רמז ל-pre-bolus
        var fastRise = avgRise && avgRise > 70;
        var highPeak = avgPeak && avgPeak > 200;

        // === בניית המלצות ===
        var recs = [];
        var profRec = []; // המלצות לשינוי פרופיל

        // -- ניתוח לפי תוצאות --
        var highPct = (highRes+midRes)/n;
        var lowPct  = low/n;
        var goodPct = good/n;

        if (goodPct >= 0.65) {
            recs.push("✅ <b>ההזרקה על " + mealName + " עובדת טוב (" + Math.round(goodPct*100) + "% תוצאות טובות)</b>");
            recs.push("📌 המשך עם: " + avgIns + "U" + (hasExt ? " (" + avgExtPct + "/" + (100-avgExtPct) + " על " + avgExtDur + " דק')" : "") + " על ~" + avgCarbs + "g");
        }

        if (highPct > 0.4) {
            recs.push("📈 <b>גבוה אחרי ארוחה ב-" + Math.round(highPct*100) + "% מהפעמים</b> (2ש' ממוצע: " + (avg2h||'?') + ")");

            // המלצה ספציפית לכמות
            var suggestedIns = (parseFloat(avgIns) + (highPct > 0.6 ? 1.0 : 0.5)).toFixed(1);
            recs.push("💉 שקול הגדלת אינסולין: " + avgIns + "U → <b>" + suggestedIns + "U</b>");

            // המלצה לשינוי חלוקה
            if (hasExt && avgExtPct < 80) {
                var newNowPct = Math.min(85, avgExtPct + 10);
                recs.push("🔀 שקול שינוי חלוקה: " + avgExtPct + "/" + (100-avgExtPct) + " → <b>" + newNowPct + "/" + (100-newNowPct) + "</b>");
            } else if (!hasExt) {
                recs.push("⏱️ שקול הוספת הזרקה מורחבת: 70% עכשיו + 30% בעוד 60 דק'");
            }

            // האם לשנות CR?
            if (avgCRval) {
                var sugCR = (parseFloat(avgCRval) * 0.9).toFixed(1);
                profRec.push("📊 CR: <b>⬇️ " + avgCRval + " → " + sugCR + " g/U</b> (פחות גרם/יחידה = יותר אינסולין)");
            }
        }

        if (lowPct > 0.25) {
            recs.push("📉 <b>נמוך אחרי ארוחה ב-" + Math.round(lowPct*100) + "% מהפעמים</b>");
            var suggestedInsLow = (parseFloat(avgIns) - 0.5).toFixed(1);
            recs.push("💉 שקול הקטנת אינסולין: " + avgIns + "U → <b>" + suggestedInsLow + "U</b>");
            if (hasExt && avgExtPct > 65) {
                var newNowLow = Math.max(50, avgExtPct - 10);
                recs.push("🔀 שקול הקטנת החלק הראשון: " + avgExtPct + "% → <b>" + newNowLow + "%</b>");
            }
            if (avgCRval) {
                var sugCRup = (parseFloat(avgCRval) * 1.1).toFixed(1);
                profRec.push("📊 CR: <b>⬆️ " + avgCRval + " → " + sugCRup + " g/U</b> (יותר גרם/יחידה = פחות אינסולין)");
            }
        }

        if (fastRise && highPct > 0.3) {
            recs.push("⚡ עלייה מהירה ממוצעת +" + avgRise + " — שקול pre-bolus: הזרק <b>5–10 דק' מוקדם יותר</b>");
        }

        if (hasExt && extGoodPct !== null && noExtGoodPct !== null) {
            var extBetter = extGoodPct > noExtGoodPct + 0.15;
            var noBetter  = noExtGoodPct > extGoodPct + 0.15;
            if (extBetter) recs.push("📊 הזרקה מורחבת הצליחה ב-" + Math.round(extGoodPct*100) + "% לעומת " + Math.round(noExtGoodPct*100) + "% ללא — <b>המשך עם Extended</b>");
            if (noBetter)  recs.push("📊 ללא Extended הצלחה " + Math.round(noExtGoodPct*100) + "% לעומת " + Math.round(extGoodPct*100) + "% עם — שקול ביטול Extended");
        }

        if (!recs.length) {
            recs.push("🔍 אין מספיק נתונים להמלצה ברורה (" + n + " רישומים, נדרש 5+)");
        }

        // === בניית HTML ===
        var html = "";

        // סיכום סטטיסטי
        html += "<div style='background:#0a0a14;border-radius:10px;padding:12px;margin-bottom:10px;font-size:13px'>";
        html += "<b style='color:var(--blue)'>" + mealName + "</b> — " + n + " רישומים / 90 יום<br><br>";
        html += "• פחמימות ממוצע: <b>" + avgCarbs + "g</b><br>";
        html += "• אינסולין ממוצע: <b>" + avgIns + "U</b>";
        if (hasExt) html += " (" + avgExtPct + "/" + (100-avgExtPct) + " על " + avgExtDur + " דק')";
        html += "<br>";
        if (avgCRval) html += "• CR בפועל: <b>" + avgCRval + "g/U</b><br>";
        if (avg2h)    html += "• ממוצע 2ש': <b>" + avg2h + " mg/dL</b><br>";
        if (avgPeak)  html += "• שיא ממוצע: <b>" + avgPeak + " mg/dL</b>";
        if (avgRise)  html += " (עלייה +" + avgRise + ")";
        html += "<br>";
        // progress bar תוצאות
        var colBar = function(v,c,label){
            return "<span style='color:"+c+"'>"+label+" "+v+"</span> ";
        };
        html += "<br>תוצאות: " + colBar(good,"#10b981","✅") + colBar(midRes,"#f59e0b","🟡") + colBar(highRes,"#ef4444","🔴") + colBar(low,"#3b82f6","🔵");
        html += "</div>";

        // המלצות עיקריות
        html += "<div style='background:rgba(59,130,246,0.08);border:1px solid var(--blue-dim);border-radius:10px;padding:12px;margin-bottom:10px'>";
        html += "<b>💡 המלצות הזרקה:</b><br><br>";
        html += recs.join("<br>");
        html += "</div>";

        // המלצות פרופיל
        if (profRec.length) {
            html += "<div style='background:rgba(245,158,11,0.08);border:1px solid #f59e0b;border-radius:10px;padding:12px;margin-bottom:10px'>";
            html += "<b>⚙️ המלצות לשינוי פרופיל:</b><br><br>";
            html += profRec.join("<br>");
            html += "</div>";
        }

        // היסטוריה
        html += "<div style='font-size:12px;margin-bottom:10px'><b>היסטוריה:</b><br><br>";
        results.forEach(function(r){
            html += "<div style='background:#111120;border-radius:8px;padding:8px;margin-bottom:5px;border-right:3px solid " + r.outcomeColor + "'>";
            html += "<b>" + r.date + " " + r.time + "</b> — " + r.outcome + "<br>";
            html += "<small style='color:#aaa'>" + r.carbs + "g | " + r.insulin + "U";
            if (r.extended) html += "+" + r.extended + "U(" + (r.duration||"?") + "דק')";
            if (r.sgvAt) html += " | " + r.sgvAt + "→";
            if (r.peak)  html += r.peak + "(שיא)";
            if (r.sgv2h) html += "→2ש':" + r.sgv2h;
            if (r.sgv3h) html += "→3ש':" + r.sgv3h;
            html += "</small></div>";
        });
        html += "</div>";

        html += "<small style='color:#555'>⚕️ ניתוח עזר — ניהול T1D דורש ליווי אנדוקרינולוג.</small>";
        showPopup("🍽️ ניתוח: " + mealName, html);

    } catch(e) {
        showPopup("שגיאה", "שגיאה בניתוח: " + e.message);
        console.error(e);
    }
}

                var highC = outcomes.filter(function(v){return v>180;}).length;
                var lowC  = outcomes.filter(function(v){return v<70;}).length;
                var avgO  = outcomes.length ? Math.round(outcomes.reduce(function(a,b){return a+b;},0)/outcomes.length) : null;

                // Extended bolus stats
                var extMatched = matched.filter(function(m){ return m.extended > 0 || m.duration > 0; });
                learnedExt = extMatched.length / matched.length > 0.3;
                if (extMatched.length) {
                    var avgExtPct = extMatched.reduce(function(a,m){
                        var total = parseFloat(m.insulin||0)+parseFloat(m.extended||0);
                        return total ? a+(parseFloat(m.insulin||0)/total*100) : a;
                    },0)/extMatched.length;
                    learnedExtPct = Math.round(avgExtPct);
                    learnedExtDur = Math.round(extMatched.reduce(function(a,m){return a+(m.duration||60);},0)/extMatched.length);
                }

                // pre-bolus detection
                var peaks30 = matched.map(function(m){
                    var mt = new Date(m.created_at).getTime();
                    var at = allE.filter(function(e){ return Math.abs(new Date(e.dateString||e.date).getTime()-mt)<10*60000; });
                    var p  = allE.filter(function(e){ var dt=new Date(e.dateString||e.date).getTime()-mt; return dt>0&&dt<45*60000; });
                    var base = at.length?at[0].sgv:null, peak=p.length?Math.max.apply(null,p.map(function(e){return e.sgv;})):null;
                    return (base&&peak)?peak-base:null;
                }).filter(Boolean);
                learnedPre = peaks30.length && peaks30.reduce(function(a,b){return a+b;},0)/peaks30.length > 60;

                histData = { count:matched.length, avgOut:avgO, highCount:highC, lowCount:lowC, total:outcomes.length };
            }
        } catch(e) { console.error("hist error",e); }
    }

    // === חישוב CR אפקטיבי לפי היסטוריה ===
    var effectiveCR = cr;
    var crNote = "";
    if (learnedCR && histData && histData.total >= 3) {
        if (histData.highCount / histData.total > 0.4) {
            effectiveCR = learnedCR * 0.9;
            crNote = " (הותאם: ב-" + Math.round(histData.highCount/histData.total*100) + "% מהפעמים היה גבוה)";
        } else if (histData.lowCount / histData.total > 0.3) {
            effectiveCR = learnedCR * 1.1;
            crNote = " (הותאם: ב-" + Math.round(histData.lowCount/histData.total*100) + "% מהפעמים היה נמוך)";
        }
    }

    // === חישוב מינון ===
    var carbsToCalc  = carbsInput || 0;
    var carbInsulin  = carbsToCalc > 0 ? carbsToCalc / effectiveCR : 0;

    // תיקון סוכר: (סוכר נוכחי - מטרה) ÷ ISF
    var corrInsulinRaw = (sgv - targetBG) / isf;
    var corrInsulin    = Math.max(0, corrInsulinRaw * (typeof nightCorrFactor !== 'undefined' ? nightCorrFactor : 1.0));

    // תיקון לפי ניבוי — יחושב אחרי שloop predicted יטען
    var eventualCorrInsulin = corrInsulin; // יעודכן בהמשך

    // תוספת priming אם פוד הוחלף לאחרונה
    var primingAddon = carbsToCalc > 0 ? getPrimingAddon() : 0;

    // === הקשר ביה"ס ===
    var splitFactors = [];
    var schoolCtx = getSchoolContext();
    if (schoolCtx && carbsToCalc > 0) {
        if (schoolCtx.splitPct !== undefined && schoolCtx.splitPct !== smartNowPct) {
            smartNowPct = schoolCtx.splitPct;
            smartLaterPct = 100 - smartNowPct;
            if (schoolCtx.label) splitFactors.push(schoolCtx.label);
        }
    }

    // === פרופיל לילה ===
    var usingNightProfile = isNightProfile();
    var usingSchoolProfile = isSchoolProfile ? isSchoolProfile() : false;
    if (usingNightProfile) {
        // עדכן יעד
        targetBG = Math.max(targetBG, NIGHT_PROFILE.targetBG);
        // עדכן CR ו-ISF
        if (!usingSchoolProfile) { // לא לשלב עם פרופיל ביה"ס
            crNow = crNow / NIGHT_PROFILE.crAdjust;  // CR גדול = פחות אינסולין
            isf   = isf   * NIGHT_PROFILE.isfAdjust;
        }
        // הפחת תיקון לילה
        var nightCorrFactor = NIGHT_PROFILE.correctionFactor;
        // עדכן פיצול — ספיגה איטית
        if (smartNowPct > NIGHT_PROFILE.splitPct && carbsToCalc > 0 && nowH >= 22) {
            smartNowPct  = NIGHT_PROFILE.splitPct;
            smartLaterPct = 100 - smartNowPct;
            splitFactors.push("🌙 לילה — ספיגה איטית, פיצול " + smartNowPct + "/" + smartLaterPct);
        }
    } else {
        var nightCorrFactor = 1.0;
    }

    // בדיקת אימון קרוב — תוך 3 שעות
    var upcomingAct = null;
    var upcomingMins = null;
    var nowMin2 = new Date().getHours()*60 + new Date().getMinutes();
    ACTIVITIES.forEach(function(a){
        if (a.day !== new Date().getDay()) return;
        var actFrom = parseInt((a.from||'00:00').split(':')[0])*60 + parseInt((a.from||'00:00').split(':')[1]||0);
        var minsUntil = actFrom - nowMin2;
        if (minsUntil > 0 && minsUntil <= 180) { // תוך 3 שעות
            if (!upcomingAct || minsUntil < upcomingMins) {
                upcomingAct  = a;
                upcomingMins = minsUntil;
            }
        }
    });

    // התחשבות בפעילות גופנית
    var actAdj    = getActivityReduction();
    var actFactor = 1 - actAdj.reduction;

    // הפחתה נוספת אם יש אימון קרוב
    var upcomingFactor = 1.0;
    var upcomingNote   = "";
    if (upcomingAct && carbsToCalc > 0) {
        var sp3 = SPORT_PLANS[upcomingAct.intensity] || SPORT_PLANS.medium;
        if (upcomingMins <= 60) {
            // אימון בעוד פחות משעה — הפחת משמעותית
            upcomingFactor = 0.6;
            upcomingNote = "אימון " + upcomingAct.name + " בעוד " + upcomingMins + " דק' — אל תזריק השלמה!";
        } else if (upcomingMins <= 120) {
            // אימון בעוד 1-2 שעות
            upcomingFactor = 0.75;
            upcomingNote = "אימון " + upcomingAct.name + " בעוד " + Math.round(upcomingMins/60*10)/10 + "ש' — מינון מופחת";
        } else {
            // אימון בעוד 2-3 שעות
            upcomingFactor = 0.85;
            upcomingNote = "אימון " + upcomingAct.name + " בעוד " + Math.round(upcomingMins/60*10)/10 + "ש'";
        }
    }

    // לתיקון בלבד — השתמש ב-eventual BG prediction
    var corrToUse = (carbsToCalc === 0 && predictedFinalBG !== null) ? eventualCorrInsulin : corrInsulin;
    var totalRaw = (carbInsulin + corrToUse) * actFactor * upcomingFactor - iob + primingAddon;
    var total    = Math.max(0, totalRaw);
    var totalR   = (Math.round(total * 2) / 2).toFixed(1);

    // === Loop מציע — שולף recommendedBolus מ-DeviceStatus ===
    var loopActual = null;
    try {
        var dev2 = fullHistory.devStatus;
        if (dev2) {
            var lb = dig(dev2,'loop.recommendedBolus') ||
                     dig(dev2,'loop.recommendation.bolus') ||
                     dig(dev2,'openaps.suggested.bolus');
            if (lb !== null && lb !== undefined) loopActual = parseFloat(lb);
        }
    } catch(e) {}

    // === חישוב תיקון מבוסס ניבוי (כמו Loop) ===
    // Loop משתמש ב-eventual BG (סוכר צפוי אחרי ספיגת IOB) ולא בסוכר נוכחי
    var predictedFinalBG = null;
    try {
        var predVals = null;
        var dev3b = fullHistory.devStatus;
        if (dev3b) {
            var predObj2 = dig(dev3b, 'loop.predicted');
            if (predObj2 && predObj2.values) predVals = predObj2.values;
            else if (predObj2 && Array.isArray(predObj2)) predVals = predObj2;
        }
        if (predVals && predVals.length > 0) {
            // הסוכר הצפוי ב-30 דק' (6 נקודות × 5 דק')
            var pred30idx = Math.min(6, predVals.length - 1);
            // הסוכר הצפוי בסוף (eventual BG)
            predictedFinalBG = predVals[predVals.length - 1];
            var predicted30min = predVals[pred30idx];
            console.log("Predicted 30min:", predicted30min, "Eventual:", predictedFinalBG);
        }
    } catch(e) {}

    // חישוב תיקון לפי סוכר צפוי (eventual BG)
    var eventualCorrInsulin = corrInsulin; // ברירת מחדל
    if (predictedFinalBG !== null) {
        var eventualCorr = (predictedFinalBG - targetBG) / isf;
        eventualCorrInsulin = Math.max(0, eventualCorr);
        if (Math.abs(eventualCorrInsulin - corrInsulin) > 0.1) {
            console.log("Correction adjusted by prediction:", corrInsulin.toFixed(2), "→", eventualCorrInsulin.toFixed(2));
        }
    }

    // אם לא נמצא recommendedBolus — חשב כמו Loop
    var loopSuggestion = loopActual !== null ? loopActual :
        Math.max(0, carbInsulin + eventualCorrInsulin - iob);
    var loopR = (Math.round(loopSuggestion * 2) / 2).toFixed(1);

    // חלוקת מינון — תמיד לפי הגדרות (70/30)
    // לתיקון בלבד (ללא פחמימות) — אין split, הכל עכשיו
    var useExt     = carbsToCalc > 0 && INSULIN_CONFIG.splitNow < 100;
    var nowPct     = useExt ? (learnedExt ? learnedExtPct : INSULIN_CONFIG.splitNow) : 100;
    var laterPct   = 100 - nowPct;
    var extDur     = learnedExt ? learnedExtDur : INSULIN_CONFIG.splitDelay;
    var doseNow    = total * nowPct   / 100;
    var doseLater  = total * laterPct / 100;
    var doseNowR   = (Math.round(doseNow   * 2) / 2).toFixed(1);
    var doseLaterR = (Math.round(doseLater * 2) / 2).toFixed(1);
    var preBolusMin = carbsToCalc > 0 ? ins.preMeal : 0;

    // === תחזית סוכר אחרי הזרקה ===
    var sgvAtPeak = Math.round(Math.max(60, Math.min(400,
        sgv + (carbsToCalc > 0 ? carbsToCalc * 4 : 0) - (doseNow * isf))));
    var sgvAt2h   = Math.round(Math.max(60, Math.min(400,
        sgv + carbsToCalc*3 - total*isf*0.7 + (delta*12*1.5))));
    var sgvAt3h   = Math.round(Math.max(60, Math.min(400,
        sgv + carbsToCalc*2 - total*isf*0.9 + (delta*12*0.5))));

    // תיקון נוסף אחרי שיא אם עדיין גבוה
    var corrAfter  = 0;
    var corrAfterR = "0.0";
    if (sgvAtPeak > 180) {
        corrAfter  = Math.max(0, (sgvAtPeak - targetBG) / isf - parseFloat(doseLaterR));
        corrAfterR = (Math.round(corrAfter * 2) / 2).toFixed(1);
    }

    // === מעקב אחרי המלצה קודמת ===
    // בדיקה: האם בוצעה הזרקה בפועל ב-NS תוך 15 דק' מהמלצה אחרונה?
    var lastRecKey  = 'last_recommendation';
    var followUpMsg = null;
    try {
        var memData = await loadMemory();
        var lastRec = memData[lastRecKey] ? memData[lastRecKey].value : null;
        if (lastRec && (Date.now() - new Date(lastRec.date).getTime()) < 30*60000) {
            // בדוק טיפולים ב-NS מאז ההמלצה
            var sinceRec = new Date(lastRec.date).toISOString();
            var checkRes = await nsGet('/api/v1/treatments.json?find[created_at][$gte]=' + sinceRec + '&count=10');
            if (checkRes.ok) {
                var recentTreats = await checkRes.json();
                var bolusGiven = recentTreats.filter(function(t){ return t.insulin > 0; });
                if (bolusGiven.length > 0) {
                    var actualIns = bolusGiven.reduce(function(a,t){ return a+(t.insulin||0); }, 0).toFixed(2);
                    var recIns    = lastRec.totalR;
                    var diff      = (parseFloat(actualIns) - parseFloat(recIns)).toFixed(1);
                    if (Math.abs(parseFloat(diff)) < 0.2) {
                        followUpMsg = { type:'match', text:'✅ ההזרקה בוצעה בהתאם להמלצה (' + actualIns + 'U)' };
                    } else if (parseFloat(actualIns) < parseFloat(recIns)) {
                        followUpMsg = { type:'partial', text:'⚠️ הוזרק ' + actualIns + 'U מתוך ' + recIns + 'U מומלץ (' + diff + 'U פחות)' };
                    } else {
                        followUpMsg = { type:'more', text:'ℹ️ הוזרק ' + actualIns + 'U (יותר מהמלצה של ' + recIns + 'U)' };
                    }
                } else if ((Date.now() - new Date(lastRec.date).getTime()) > 15*60000) {
                    followUpMsg = { type:'none', text:'❓ לא נמצאה הזרקה בפועל ב-NS לאחר ההמלצה' };
                }
            }
        }
        // שמור המלצה נוכחית לאחר הצגה
        await saveMemory(lastRecKey, {
            date: new Date().toISOString(),
            totalR: totalR, insNow: insNow, insLater: insLater,
            carbsInput: carbsToCalc, carbsNow: carbsNow, carbsLater: carbsLater,
            foodName: foodName, sgv: sgv, iob: iob, isf: isf,
            smartNowPct: smartNowPct, splitReason: splitReason
        });
    } catch(e) { console.error('followup error:', e); }

    // === בניית HTML ===
    var html = "";

    // מעקב המלצה קודמת
    if (followUpMsg) {
        var fColor = followUpMsg.type==='match'?'#10b981':followUpMsg.type==='partial'?'#f59e0b':'#6b6b80';
        html += "<div style='background:rgba(0,0,0,0.2);border:1px solid "+fColor+";border-radius:8px;padding:10px;margin-bottom:10px;font-size:13px'>";
        html += followUpMsg.text + "</div>";
    }

    // הצג המלצה מניסיון קודם על אותו מאכל
    if (foodName && carbsToCalc > 0) {
        try {
            var mem6 = await loadMemory();
            var foodKey6 = 'food_' + foodName.replace(/\s+/g,'_').toLowerCase();
            var fd6 = mem6[foodKey6] ? mem6[foodKey6].value : null;
            if (fd6 && fd6.lastRecommendation && fd6.outcomes && fd6.outcomes.length >= 2) {
                var recColor6 = fd6.lastRecommendation.startsWith('✅') ? '#10b981'
                              : fd6.lastRecommendation.startsWith('📈') ? '#f59e0b' : '#3b82f6';
                html += "<div style='background:rgba(59,130,246,0.08);border:1px solid var(--blue-dim);border-radius:8px;padding:10px;margin-bottom:10px;font-size:12px'>";
                html += "<b>🧠 למידה מהעבר:</b> " + fd6.lastRecommendation;
                var avgSgv6 = Math.round(fd6.outcomes.filter(function(o){return o.sgv2h;}).reduce(function(a,o){return a+o.sgv2h;},0) / fd6.outcomes.filter(function(o){return o.sgv2h;}).length);
                if (avgSgv6) html += "<br><small style='color:#888'>ממוצע סוכר 2ש': " + avgSgv6 + " mg/dL</small>";
                var rescueCount6 = fd6.outcomes.filter(function(o){return o.outcome==='rescue_affected';}).length;
                if (rescueCount6 > 0) html += "<br><small style='color:#888'>⚠️ " + rescueCount6 + " מדידות הושפעו מחילוץ — לא נספרות</small>";
                html += "</div>";
            }
        } catch(e6) {}
    }

    // בדג פרופיל לילה
    if (usingNightProfile) {
        html += "<div style='background:rgba(59,130,246,0.1);border:1px solid #3b82f6;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:12px;display:flex;justify-content:space-between;align-items:center'>";
        html += "<span>🌙 פרופיל לילה פעיל</span>";
        html += "<span style='color:#3b82f6'>יעד: <b>" + NIGHT_PROFILE.targetBGRange + "</b></span>";
        html += "</div>";
        html += "<div style='font-size:11px;color:#888;margin-bottom:8px'>תיקון 50% · ספיגה איטית · פיצול " + NIGHT_PROFILE.splitPct + "/" + (100-NIGHT_PROFILE.splitPct) + "</div>";
    }

    // בדג פרופיל ביה"ס
    if (usingSchoolProfile) {
        html += "<div style='background:rgba(16,185,129,0.1);border:1px solid #10b981;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:12px;display:flex;justify-content:space-between;align-items:center'>";
        html += "<span>🏫 פרופיל ביהס פעיל</span>";
        html += "<span style='color:#10b981'>יעד: <b>" + SCHOOL_PROFILE.targetBGRange + "</b></span>";
        html += "</div>";
        html += "<div style='font-size:11px;color:#888;margin-bottom:8px'>CR ×1.1 + ISF ×1.1 — פחות אינסולין למניעת היפו</div>";
    }

    // הצג הקשר ביה"ס
    if (schoolCtx && carbsToCalc > 0) {
        if (schoolCtx.walkWarning) {
            html += "<div style='background:rgba(245,158,11,0.1);border:1px solid #f59e0b;border-radius:8px;padding:10px;margin-bottom:10px;font-size:13px'>";
            html += schoolCtx.walkWarning;
            html += "</div>";
        }
        if (schoolCtx.upcomingRecess) {
            html += "<div style='background:rgba(59,130,246,0.08);border:1px solid var(--blue-dim);border-radius:8px;padding:10px;margin-bottom:10px;font-size:13px'>";
            html += "🏃 הפסקה ב-" + schoolCtx.recessAt + " — ה-30% יינתן אחרי הריצה";
            html += "</div>";
        }
    }

    // הצג אזהרת אימון קרוב
    if (upcomingAct && carbsToCalc > 0) {
        var sp4 = SPORT_PLANS[upcomingAct.intensity] || SPORT_PLANS.medium;
        var curBU = parseFloat(nsData.basal) || 0;
        var redBU = curBU > 0 ? roundBasal(curBU * (1 - sp4.basalReduction/100)) : null;
        html += "<div style='background:rgba(245,158,11,0.1);border:1px solid #f59e0b;border-radius:10px;padding:12px;margin-bottom:10px;font-size:13px'>";
        html += "<b style='color:#f59e0b'>🏃 " + upcomingNote + "</b><br><br>";
        if (upcomingMins <= 60) {
            html += "• <b>אל תזריק השלמה</b> — האימון יוריד סוכר<br>";
            html += "• הפחת בזאלי ב-15:15: " + (curBU > 0 ? "⬇️ "+curBU+" → <b>"+redBU+" U/hr</b>" : sp4.basalReduction+"%") + "<br>";
            html += "• כנס לאימון עם סוכר <b>140-160</b><br>";
            html += "• קח 2 פתיבר לאימון";
        } else {
            html += "• מינון הופחת ב-" + Math.round((1-upcomingFactor)*100) + "% בגלל האימון<br>";
            html += "• ב-" + upcomingAct.from + " הפחת בזאלי: " + (curBU > 0 ? "⬇️ "+curBU+" → <b>"+redBU+" U/hr</b>" : sp4.basalReduction+"%") + "<br>";
            html += "• השלמה: <b>לא מומלצת</b> — האימון יכסה";
        }
        html += "</div>";
    }

    // הצג אזהרת priming אם פעיל
    if (primingAddon > 0) {
        html += "<div style='background:rgba(59,130,246,0.1);border:1px solid var(--blue);border-radius:8px;padding:10px;margin-bottom:10px;font-size:13px'>";
        html += "🔄 <b>פוד חדש:</b> נוספו " + primingAddon.toFixed(1) + "U לאתחול (priming השני)<br>";
        html += "<small style='color:#888'>מינון בסיס: " + (total-primingAddon).toFixed(2) + "U + " + primingAddon + "U priming = " + totalR + "U</small>";
        html += "</div>";
    }

    // מצב נוכחי
    html += "<div style='background:#0a0a14;border-radius:10px;padding:12px;margin-bottom:12px;font-size:13px'>";
    html += "• " + ins.name + " | שיא: ~" + ins.peak + " דק' | DIA: " + (ins.dia/60).toFixed(1) + "ש'<br>";
    html += "• סוכר: <b>" + sgv + "</b> Δ" + (delta>=0?"+":"") + delta + " | IOB: <b>" + iob + "U</b> | COB: <b>" + parseFloat(cob||0).toFixed(1) + "g</b><br>";
    html += "• CR: <b>" + effectiveCR.toFixed(1) + "g/U</b>" + crNote + " | ISF: <b>" + isf + "</b> | מטרה: <b>" + targetBG + "</b><br>";
    if (cob > 0) html += "• COB פעיל: <b style='color:#f59e0b'>" + cob + "g</b><br>";
    if (carbsToCalc === 0 && sgv > targetBG) {
        html += "• <span style='color:#f59e0b'>תיקון בלבד: (" + sgv + " - " + targetBG + ") ÷ " + isf + " = <b>" + corrInsulin.toFixed(2) + "U</b> − IOB " + iob + "U</span>";
    }
    html += "</div>";

    // === טען המלצה מזיכרון NS ===
    var memRec = null;
    if (foodName) {
        try { memRec = await getMemoryRecommendation(foodName.split(' (')[0]); } catch(e) {}
    }

    // מאגר מאכלים
    if (foodMatches.length > 0) {
        html += "<div style='background:rgba(245,158,11,0.08);border:1px solid #f59e0b;border-radius:8px;padding:10px;margin-bottom:10px;font-size:12px'>";
        html += "📋 <b>מאגר מאכלים:</b><br>";
        foodMatches.forEach(function(m){
            html += "• " + m.key + (m.qty>1?" ×"+m.qty:"") + ": <b>" + m.carbs + "g</b>" + (m.data.notes?" — "+m.data.notes:"") + "<br>";
        });
        if (foodMatches.length > 1) {
            html += "<b>סה\"כ: " + carbsInput + "g | משך מקסימלי: " + foodDurH + "ש'</b>";
        }
        html += "</div>";
    } else if (foodMatch) {

        else if (sgv < 160) { basePct = 70; splitFactors.push("סוכר תקין (" + sgv + ")"); }
        else if (sgv < 200) { basePct = 75; splitFactors.push("סוכר גבוה-תקין (" + sgv + ")"); }
        else                { basePct = 80; splitFactors.push("סוכר גבוה (" + sgv + ")"); }

        // תיקון לפי מהירות ספיגת המאכל — כמו Loop

        var absorbAdj = 0;

            splitFactors.push("ספיגה איטית (" + foodDurH + "ש') — Loop ישלים");
        } else if (foodDurH <= 1.5) {
            absorbAdj = +10;
            splitFactors.push("ספיגה מהירה (" + foodDurH + "ש')");
        }
        basePct += absorbAdj;

        // תיקון לפי שעה — dawn phenomenon + לילה
        var nightAdj = 0;
        if (nowH >= 6 && nowH < 10) {
            // בוקר: Dawn Phenomenon — תנגודת אינסולין גבוהה, ספיגה מהירה
            // אין פיצול בבוקר — הכל עכשיו
            nightAdj = +20; // מעלה ל-90%+
            splitFactors.push("🌅 בוקר (" + nowH + ":xx) — Dawn Phenomenon, ספיגה מהירה, ללא פיצול");
        } else if (nowH >= 10 && nowH < 14) {
            // בוקר מאוחר: תנגודת מתחילה לרדת
            nightAdj = +10;
            splitFactors.push("בוקר מאוחר — תנגודת בינונית");
        } else if (nowH >= 22 || nowH < 6) {
            // לילה: ספיגה איטית, סכנת היפו

        // תיקון לפי מגמה
        var trendAdj = 0;
        if (delta >= 3) {

        // תיקון לפי COB קיים

        smartNowPct = Math.max(40, Math.min(95, basePct + nightAdj + trendAdj + cobAdj));
        // עיגול ל-5
        smartNowPct = Math.round(smartNowPct / 5) * 5;
        // בבוקר — Dawn Phenomenon
        if (nowH >= 6 && nowH < 10) {

    if (partialFactor !== null && fullCarbs) {

function switchTab(id, el) {
    try {
        ['tab-home','tab-activity','tab-reports','tab-ns','tab-logs'].forEach(function(t){
            var el2 = document.getElementById(t);
            if (el2) el2.classList.add('hidden');
        });
        var target = document.getElementById(id);
        if (target) target.classList.remove('hidden');
        document.querySelectorAll('.nav-tab').forEach(function(t){ t.classList.remove('active'); });
        if (el) el.classList.add('active');
        if (id === 'tab-activity') { try { renderActivities(); } catch(e){} }
        if (id === 'tab-ns')       { try { loadNSFrame();       } catch(e){} }
        if (id === 'tab-logs')     { try { loadLogs('all');      } catch(e){} }
    } catch(e) { console.error('switchTab error:', e); }
}

function loadNSFrame() {
    var url = nsUrl();
    if (!url) return;
    var iframe = document.getElementById('ns-iframe');
    var urlEl  = document.getElementById('ns-frame-url');
    var msgEl  = document.getElementById('ns-frame-msg');
    if (urlEl) urlEl.innerText = url;
    if (iframe && iframe.src !== url) {
        iframe.src = url;
        // בדיקה אם iframe נחסם (X-Frame-Options)
        iframe.onload = function() {
            try {
                // אם נגיש — iframe עובד
                var doc = iframe.contentDocument || iframe.contentWindow.document;
                if (doc && doc.body) {
                    if (msgEl) msgEl.style.display = 'none';
                }
            } catch(e) {
                // Cross-origin = NS עובד אבל לא נוכל לגשת ל-DOM — זה בסדר
                if (msgEl) msgEl.style.display = 'none';
            }
        };
        iframe.onerror = function() {
            if (msgEl) msgEl.style.display = 'flex';
        };
        // timeout — אם לא נטען תוך 5 שניות, הצג כפתור פתיחה חיצונית
        setTimeout(function() {
            try {
                var iDoc = iframe.contentDocument;
                if (!iDoc || iDoc.URL === 'about:blank') {
                    if (msgEl) msgEl.style.display = 'flex';
                }
            } catch(e) {
                // cross-origin — זה אומר שנטען בהצלחה
                if (msgEl) msgEl.style.display = 'none';
            }
        }, 5000);
    }
}

function reloadNSFrame() {
    var iframe = document.getElementById('ns-iframe');
    if (iframe) { iframe.src = iframe.src; }
}

function openNSExternal() {

function addActivity() {
    var name  = (document.getElementById('act-name')||{}).value ? document.getElementById('act-name').value.trim() : '';
    var day   = parseInt((document.getElementById('act-day')||{}).value||0);
    var from  = (document.getElementById('act-from')||{}).value ? document.getElementById('act-from').value.trim() : '';
    var to    = (document.getElementById('act-to')||{}).value ? document.getElementById('act-to').value.trim() : '';
    var intens= (document.getElementById('act-intensity')||{}).value || 'medium';
    console.log("addActivity:", name, day, from, to, intens);

    // וידוא
    if (!name) { showPopup("⚠️ שגיאה", "נא למלא שם פעילות"); return; }
    // תיקון פורמט שעה אוטומטי
    if (from && !from.includes(':')) from = from + ':00';
    if (to && !to.includes(':')) to = to + ':00';
    if (!from) from = '16:00';
    if (!to) to = '17:00';

    var act = { id: Date.now(), name: name, day: day, from: from, to: to, intensity: intens };
    ACTIVITIES.push(act);

    renderActivities();

    // נקה שדות
    document.getElementById('act-name').value = '';
    document.getElementById('act-from').value = '';
    document.getElementById('act-to').value   = '';

    showPopup("✅ נשמר!", "פעילות <b>" + name + "</b> נוספה:<br>יום " + DAYS_HE[day] + " " + from + "–" + to + "<br><b>" + INTENSITY_LABELS[intens] + "</b>");
}

function deleteActivity(id) {

// בדיקה האם יש פעילות פעילה עכשיו או בקרוב
function checkActiveActivity() {
    var now    = new Date();
    var dayN   = now.getDay();
    var nowMin = now.getHours()*60 + now.getMinutes();
    var banner = document.getElementById('activity-banner');
    if (!banner) return null;

    var active = null, upcoming = null;

    ACTIVITIES.forEach(function(a){
        if (a.day !== dayN) return;
        var sp = SPORT_PLANS[a.intensity] || SPORT_PLANS.medium;
        var fromMin = parseInt(a.from.split(':')[0])*60 + parseInt(a.from.split(':')[1]);
        var toMin   = parseInt(a.to.split(':')[0])*60   + parseInt(a.to.split(':')[1]);
        var preWin  = sp.basalPre;    // דק' לפני שמתחילים להתריע
        var postWin = sp.postDurationH * 60;

        if (nowMin >= fromMin && nowMin <= toMin) {
            active   = { act: a, sp: sp, type: 'during', fromMin: fromMin, toMin: toMin };
        } else if (nowMin < fromMin && (fromMin - nowMin) <= Math.max(preWin, 60)) {
            upcoming = { act: a, sp: sp, type: 'before', minsLeft: fromMin - nowMin };
        } else if (nowMin > toMin && (nowMin - toMin) <= postWin) {
            active   = { act: a, sp: sp, type: 'after', minsAgo: nowMin - toMin };
        }
    });

    var result = active || upcoming;
    if (result) {
        var a  = result.act;
        var sp = result.sp;
        var msg = "", color = "#f59e0b";

        if (result.type === 'before') {
            var minsLeft = result.minsLeft;
            msg = "<b>⏰ " + a.name + "</b> בעוד " + minsLeft + " דק'<br>";
            if (sp.basalReduction > 0 && minsLeft <= sp.basalPre) {
                var curBB = parseFloat(nsData.basal)||0;
                var redBB = curBB>0 ? roundBasal(curBB*(1-sp.basalReduction/100)) : null;
                msg += "• הפחת בזאלי: " + (curBB>0 ? "⬇️ "+curBB+" → <b>"+redBB+" U/hr</b>" : "⬇️ <b>"+sp.basalReduction+"%</b>") + "<br>";
            }
            msg += "• יעד סוכר לאימון: <b>" + sp.targetBGRange + "</b><br>";
            if (sp.preCarbsG > 0 && nsData.currentSgv && nsData.currentSgv < 140) {
                msg += "• 🍬 אכול <b>" + sp.preCarbsG + "g</b> פחמימות מהירות לפני<br>";
            }
            msg += "• <span style='color:#f59e0b;cursor:pointer' onclick='showSportPlan(\"' + a.id + '\")'>📋 הצג תוכנית ספורט מלאה</span>";
        }
        else if (result.type === 'during') {
            color = "#10b981";
            var minsLeft2 = result.toMin - nowMin;
            msg = "<b>🏃 " + a.name + " פעיל עכשיו</b> (נגמר בעוד " + minsLeft2 + " דק')<br>";
            msg += "• יעד: <b>" + sp.targetBGRange + "</b>";
            if (sp.noBolusRule) msg += " | <b style='color:#ef4444'>אל תזריק אינסולין!</b>";
            msg += "<br>• <span style='color:#10b981;cursor:pointer' onclick='showSportPlan(\"' + a.id + '\")'>📋 תוכנית ספורט</span>";
        }
        else if (result.type === 'after') {
            color = "#3b82f6";
            var minsAgo = result.minsAgo;
            var hoursLeft = ((sp.postDurationH * 60 - minsAgo) / 60).toFixed(1);
            msg = "<b>✅ " + a.name + "</b> הסתיים לפני " + minsAgo + " דק'<br>";
            var curBPost = parseFloat(nsData.basal)||0;
            var redBPost = curBPost>0 ? roundBasal(curBPost*(1-sp.postReduction/100)) : null;
            msg += "• ⚠️ <b>סכנת היפו!</b> הפחת בזאלי: " + (curBPost>0 ? "⬇️ "+curBPost+" → <b>"+redBPost+" U/hr</b> (-"+sp.postReduction+"%) ": "⬇️ <b>-"+sp.postReduction+"%</b> ") + "עוד " + hoursLeft + " שעות<br>";
            msg += "• אל תזריק בולוס מלא — בדוק סוכר תחילה";
        }

        banner.innerHTML = "<div class='act-active-banner' style='border-color:" + color + ";background:rgba(0,0,0,0.2)'>" + msg + "</div>";
    } else {
        banner.innerHTML = '';
    }
    return result;
}

// תוכנית ספורט מלאה
function showSportPlan(actId) {
    var act = ACTIVITIES.find(function(a){ return String(a.id) === String(actId); });
    if (!act) return;
    var sp  = SPORT_PLANS[act.intensity] || SPORT_PLANS.medium;
    var dur = act.to && act.from
        ? (parseInt(act.to.split(':')[0])*60+parseInt(act.to.split(':')[1])) -
          (parseInt(act.from.split(':')[0])*60+parseInt(act.from.split(':')[1]))
        : 60;
    var sgv = nsData.currentSgv || 0;
    var iob = parseFloat(nsData.iob) || 0;

    var html = "";

    // כותרת
    html += "<div style='background:#0a0a14;border-radius:10px;padding:12px;margin-bottom:12px;font-size:13px'>";
    html += "🏃 <b>" + act.name + "</b> | " + act.from + "–" + act.to + " (" + dur + " דק')<br>";
    html += sp.label + " — " + sp.description;
    html += "</div>";

    // ===== לפני האימון =====
    // מדעי: הפחתת בזאלי לפני אימון אינטנסיבי מונעת IOB גבוה בזמן פעילות.
    // ב-T1D, אינסולין בזאלי פעיל בזמן ספורט = סיכון מוגבר להיפוגליקמיה.
    html += "<div style='background:rgba(245,158,11,0.08);border:1px solid #f59e0b;border-radius:10px;padding:12px;margin-bottom:10px'>";
    html += "<b style='color:#f59e0b'>⏰ " + sp.basalPre + " דקות לפני האימון:</b><br><br>";

    if (sp.basalReduction > 0) {
        html += "1. 📉 <b>הפחת בזאלי ב-" + sp.basalReduction + "%</b><br>";
        html += "   הגדר תוכנית ספורט ב-Loop למשך <b>" + sp.sportModeMins + " דק'</b><br><br>";
    }

    html += "2. 🎯 <b>שנה יעד סוכר ל-" + sp.targetBGRange + "</b><br>";
    html += "   הגדר ב-Loop: Target BG = <b>" + sp.targetBGDuring + " mg/dL</b><br><br>";

    if (sp.preCarbsG > 0) {
        html += "3. 🍬 <b>אכול " + sp.preCarbsG + "g פחמימות מהירות</b> (ג'ל, סוכריות)<br>";
        if (sgv > 0) {
            if (sgv < 120) html += "   <span style='color:#ef4444'>⚠️ סוכר נמוך (" + sgv + ") — חובה לאכול לפני!</span><br>";
            else if (sgv > 180) html += "   <span style='color:#f59e0b'>סוכר גבוה (" + sgv + ") — דלג על הפחמימות המניעתיות</span><br>";
            else html += "   <span style='color:#10b981'>סוכר " + sgv + " — טוב, אכול כמנהג</span><br>";
        }
        html += "<br>";
    }

    if (iob > 0.5) {
        html += "4. ⚠️ <b>IOB = " + iob + "U</b> — שים לב! אינסולין פעיל עלול להוריד סוכר באימון<br>";
        html += "   המתן לפחות 90 דק' מהזרקה האחרונה לפני עצימות גבוהה<br>";
    }
    html += "</div>";

    // ===== במהלך האימון =====
    html += "<div style='background:rgba(16,185,129,0.08);border:1px solid #10b981;border-radius:10px;padding:12px;margin-bottom:10px'>";
    html += "<b style='color:#10b981'>🏃 במהלך האימון:</b><br><br>";
    html += "• יעד סוכר: <b>" + sp.targetBGRange + " mg/dL</b><br>";
    if (sp.noBolusRule) {
        html += "• ⛔ <b>אל תזריק בולוס!</b> רק Loop יכול לתת SMB קטנים<br>";
    }
    html += "• בדוק סוכר כל 30–45 דק'<br>";
    html += "• אם סוכר < 100: 🍬 אכול 15g פחמימות מהירות<br>";
    html += "• אם סוכר > 220: הפסק לרגע, בדוק קטונים<br>";
    html += "</div>";

    // ===== אחרי האימון =====
    html += "<div style='background:rgba(59,130,246,0.08);border:1px solid var(--blue);border-radius:10px;padding:12px;margin-bottom:10px'>";
    // ירידה מאוחרת (Delayed Hypoglycemia): אחרי פעילות עצימה,
    // השרירים ממשיכים לספוג גלוקוז לחידוש גליקוגן — גורם להיפו מאוחר.
    // בנוסף, רגישות לאינסולין מוגברת ל-12-24 שעות אחרי אימון.
    html += "<b style='color:var(--blue)'>✅ אחרי האימון (" + sp.postDurationH + " שעות):</b><br><br>";
    html += "• הפחת אינסולין <b>" + sp.postReduction + "%</b> לכל הזרקה<br>";
    html += "• השאר יעד <b>" + sp.targetBGRange + "</b> עוד שעה לפחות<br>";
    html += "• בדוק סוכר כל 30 דק' בשעה הראשונה<br>";
    html += "• ⚠️ <b>ירידת סוכר מאוחרת</b> — שכיח " + (act.intensity==='high'?'3–8':'1–4') + " שעות אחרי אימון " + sp.label + "<br>";
    html += "• אם ישן אחרי: שקול 15–20g פחמימות לפני שינה<br>";
    html += "</div>";

    // Loop הגדרות מומלצות
    html += "<div style='background:#111120;border-radius:10px;padding:12px;margin-bottom:10px;font-size:12px'>";
    html += "<b>⚙️ הגדרות Loop מומלצות:</b><br><br>";
    html += "• Exercise Mode / Activity: <b>הפעל</b><br>";
    html += "• Override Target: <b>" + sp.targetBGDuring + " mg/dL</b><br>";
    var curBSport = parseFloat(nsData.basal) || 0;
    var redBSport = curBSport > 0 ? roundBasal(curBSport * (1 - sp.basalReduction/100)) : null;
    html += "• Basal: " + (curBSport > 0 ? curBSport + " → <b>" + redBSport + " U/hr</b>" : "<b>-" + sp.basalReduction + "%</b>") + " למשך <b>" + sp.sportModeMins + " דק'</b><br>";
    html += "• SMB: <b>כבה</b> בזמן אימון";
    if (sp.intensity === 'high') html += " (אם Loop תומך)";
    html += "</div>";

    html += "<small style='color:#555'>⚕️ המלצה לשיקול דעת. כל ספורטאי שונה — עקוב ותכייל.</small>";
    showPopup("📋 תוכנית ספורט — " + act.name, html);
}

// ========= Google Calendar =========
async function connectGoogleCalendar() {
    // Google Calendar API — OAuth2 implicit flow
    var CLIENT_ID = ''; // יש להזין Client ID מגוגל קלנדר API
    if (!CLIENT_ID) {
        showPopup("גוגל קלנדר", "כדי לחבר גוגל קלנדר:<br><br>" +
            "1. גש ל-<b>console.cloud.google.com</b><br>" +
            "2. צור פרויקט חדש<br>" +
            "3. הפעל Google Calendar API<br>" +
            "4. צור OAuth 2.0 Client ID (Web App)<br>" +
            "5. הכנס את ה-Client ID בקוד (שורת CLIENT_ID)<br><br>" +
            "<small style='color:#888'>לחלופין, הוסף פעילויות ידנית בלשונית פעילות</small>");
        return;
    }
    var authUrl = "https://accounts.google.com/o/oauth2/auth" +
        "?client_id=" + CLIENT_ID +
        "&redirect_uri=" + encodeURIComponent(location.href) +
        "&response_type=token" +
        "&scope=" + encodeURIComponent("https://www.googleapis.com/auth/calendar.readonly");
    window.open(authUrl, '_blank', 'width=500,height=600');
}

async function fetchGoogleCalendarEvents(token) {
    var now   = new Date().toISOString();
    var week  = new Date(Date.now() + 7*86400000).toISOString();
    var url   = "https://www.googleapis.com/calendar/v3/calendars/primary/events" +
                "?timeMin=" + encodeURIComponent(now) +
                "&timeMax=" + encodeURIComponent(week) +
                "&singleEvents=true&orderBy=startTime&maxResults=20";
    var res = await fetch(url, { headers: { Authorization: "Bearer " + token }});
    var data = await res.json();
    if (!data.items) return;

    // ייבוא אירועים כפעילויות
    var activityKeywords = ['gym','mma','ריצה','שחייה','אופניים','יוגה','פילאטיס','ספורט','כושר','אימון','חוג'];
    data.items.forEach(function(ev){
        var title = (ev.summary||'').toLowerCase();
        var isActivity = activityKeywords.some(function(k){ return title.includes(k); });
        if (!isActivity) return;

        var start = new Date(ev.start.dateTime || ev.start.date);
        var end   = new Date(ev.end.dateTime   || ev.end.date);
        var day   = start.getDay();
        var from  = start.getHours().toString().padStart(2,'0') + ':' + start.getMinutes().toString().padStart(2,'0');
        var to    = end.getHours().toString().padStart(2,'0')   + ':' + end.getMinutes().toString().padStart(2,'0');

        // הוסף רק אם לא קיים כבר
        var exists = ACTIVITIES.find(function(a){ return a.name===ev.summary && a.day===day && a.from===from; });
        if (!exists) {
            ACTIVITIES.push({ id: Date.now()+Math.random(), name: ev.summary, day: day, from: from, to: to, intensity: 'medium', source: 'gcal' });
        }
    });
    saveActivities();
    renderActivities();
    document.getElementById('gcal-banner').style.display = 'block';
    document.getElementById('gcal-next').innerText = data.items.length + " אירועים נמצאו השבוע";
}

// התחשבות בפעילות בחישוב מינון
function getActivityReduction() {
    var result = checkActiveActivity();
    if (!result) return { reduction: 0, note: null };
    var a = result.act;
    if (result.type === 'during' || result.type === 'before') {
        return {
            reduction: INTENSITY_REDUCTION[a.intensity] / 100,
            note: "🏃 " + a.name + " — הפחתה " + INTENSITY_REDUCTION[a.intensity] + "% לפעילות"
        };
    } else if (result.type === 'after') {
        return {
            reduction: POST_ACTIVITY_REDUCTION[a.intensity] / 100,
            note: "✅ אחרי " + a.name + " — הפחתה " + POST_ACTIVITY_REDUCTION[a.intensity] + "% (2ש' אחרי)"
        };
    }
    return { reduction: 0, note: null };
}

// ========= מערכת זיכרון — Nightscout כבסיס נתונים =========
// שומר: תוצאות הזרקות, שינויי פרמטרים (CR/ISF/בזאלי), היסטוריית ספורט, הערות
var MEMORY_TAG = 'loopie_memory';
var memCache = null; // cache מקומי

// loadMemory ו-saveMemory מוגדרים למעלה עם Firebase/localStorage

// רשום תוצאת הזרקה
async function recordInjectionOutcome(foodName, carbs, insulin, extended, duration, sgvBefore, sgvPeak, sgv2h, outcome) {
    var mem  = await loadMemory();
    var key  = 'food_' + foodName.replace(/\s+/g, '_').toLowerCase();
    var prev = (mem[key] && mem[key].value) ? mem[key].value : { outcomes: [], paramHistory: [] };
    prev.outcomes    = prev.outcomes    || [];
    prev.paramHistory= prev.paramHistory|| [];

    var prof   = fullHistory.profile;
    var nowH   = new Date().getHours();
    var crNow  = prof ? profileValueAt(prof.carbratio || prof.carbRatio || prof.ic, nowH) : null;
    var isfNow = prof ? profileValueAt(prof.sens || prof.sensitivity, nowH) : null;
    var basalNow = nsData.basal;

    prev.outcomes.unshift({
        date:      new Date().toISOString(),
        carbs:     carbs,
        insulin:   parseFloat(insulin),
        extended:  extended  || 0,
        duration:  duration  || 0,
        splitPct:  INSULIN_CONFIG.splitNow,
        insulinType: INSULIN_CONFIG.type,
        sgvBefore: sgvBefore || nsData.currentSgv,
        sgvPeak:   sgvPeak,
        sgv2h:     sgv2h,
        iob:       parseFloat(nsData.iob) || 0,
        cob:       parseFloat(nsData.cob) || 0,
        delta:     nsData.delta || 0,
        cr:        crNow,
        isf:       isfNow,
        basal:     basalNow,
        hour:      nowH,
        outcome:   outcome,
        activityNear: (function(){
            var r = checkActiveActivity();
            return r ? { name: r.act.name, type: r.type, intensity: r.act.intensity } : null;
        })()
    });
    if (prev.outcomes.length > 30) prev.outcomes = prev.outcomes.slice(0, 30);

    // שמור גם שינויי פרמטרים לאורך זמן
    var lastParam = prev.paramHistory[0];
    if (!lastParam || lastParam.cr !== crNow || lastParam.isf !== isfNow) {
        prev.paramHistory.unshift({ date: new Date().toISOString(), cr: crNow, isf: isfNow, basal: basalNow });
        if (prev.paramHistory.length > 10) prev.paramHistory = prev.paramHistory.slice(0, 10);
    }

    await saveMemory(key, prev);
    if (memCache) memCache[key] = { value: prev };
}

// שמור שינוי פרמטר גלובלי (CR/ISF/בזאלי)
async function recordParamChange(paramName, oldVal, newVal, reason) {
    var mem  = await loadMemory();
    var prev = (mem['param_history'] && mem['param_history'].value) ? mem['param_history'].value : [];
    prev.unshift({ date: new Date().toISOString(), param: paramName, oldVal: oldVal, newVal: newVal, reason: reason || '' });
    if (prev.length > 50) prev = prev.slice(0, 50);
    await saveMemory('param_history', prev);
}

// שמור תוצאת אימון ספורט
async function recordSportOutcome(actName, intensity, basalReduction, targetBG, sgvDuring, sgvAfter, outcome) {
    var mem  = await loadMemory();
    var key  = 'sport_' + actName.replace(/\s+/g, '_').toLowerCase();
    var prev = (mem[key] && mem[key].value) ? mem[key].value : { sessions: [] };
    prev.sessions = prev.sessions || [];
    prev.sessions.unshift({
        date:           new Date().toISOString(),
        intensity:      intensity,
        basalReduction: basalReduction,
        targetBG:       targetBG,
        sgvDuring:      sgvDuring,
        sgvAfter:       sgvAfter,
        iob:            parseFloat(nsData.iob) || 0,
        outcome:        outcome  // 'good'/'hypo'/'high'
    });
    if (prev.sessions.length > 20) prev.sessions = prev.sessions.slice(0, 20);
    await saveMemory(key, prev);
}

// קבל המלצה מהזיכרון לאוכל ספציפי
async function getMemoryRecommendation(foodName) {
    var mem = await loadMemory();
    var key = 'food_' + foodName.replace(/\s+/g, '_').toLowerCase();
    if (!mem[key] || !mem[key].value) return null;
    var data     = mem[key].value;
    var outcomes = data.outcomes || [];
    if (outcomes.length < 2) return null;

    var n     = outcomes.length;
    var good  = outcomes.filter(function(o){ return o.outcome === 'good'; }).length;
    var high  = outcomes.filter(function(o){ return o.outcome === 'high'; }).length;
    var low   = outcomes.filter(function(o){ return o.outcome === 'low';  }).length;

    var avgIns   = outcomes.reduce(function(a,o){ return a+(parseFloat(o.insulin)||0); },0)/n;
    var avgCarbs = outcomes.reduce(function(a,o){ return a+(o.carbs||0); },0)/n;
    var with2h   = outcomes.filter(function(o){ return o.sgv2h; });
    var avg2h    = with2h.length ? Math.round(with2h.reduce(function(a,o){return a+o.sgv2h;},0)/with2h.length) : null;

    var learnedCR = avgCarbs>0 && avgIns>0 ? avgCarbs/avgIns : null;

    // ניתוח לפי שעה — האם שעה מסוימת גרועה יותר?
    var byHour = {};
    outcomes.forEach(function(o){
        var h = o.hour;
        if (h === undefined || h === null) return;
        byHour[h] = byHour[h] || { good:0, high:0, low:0, n:0 };
        byHour[h][o.outcome]++;
        byHour[h].n++;
    });
    var worstHour = null, worstRate = 0;
    Object.keys(byHour).forEach(function(h){
        var bh = byHour[h];
        var badRate = (bh.high+bh.low)/bh.n;
        if (bh.n >= 2 && badRate > worstRate) { worstRate = badRate; worstHour = h; }
    });

    // ניתוח לפי ספורט — האם בספורט יוצא שונה?
    var withSport    = outcomes.filter(function(o){ return o.activityNear; });
    var withoutSport = outcomes.filter(function(o){ return !o.activityNear; });
    var sportNote = null;
    if (withSport.length >= 2 && withoutSport.length >= 2) {
        var sportHighPct   = withSport.filter(function(o){return o.outcome!=='good';}).length/withSport.length;
        var noSportHighPct = withoutSport.filter(function(o){return o.outcome!=='good';}).length/withoutSport.length;
        if (sportHighPct < noSportHighPct - 0.2)
            sportNote = "בספורט התוצאות טובות יותר (" + Math.round((1-sportHighPct)*100) + "% טוב)";
        else if (sportHighPct > noSportHighPct + 0.2)
            sportNote = "ליד פעילות הסוכר יותר נמוך — הפחת אינסולין בספורט";
    }

    // ניתוח split — האם 70/30 עובד?
    var splitOutcomes = outcomes.filter(function(o){ return o.splitPct; });
    var splitNote = null;
    if (splitOutcomes.length >= 3) {
        var split70 = splitOutcomes.filter(function(o){return o.splitPct>=65&&o.splitPct<=75;});
        var split80 = splitOutcomes.filter(function(o){return o.splitPct>=75;});
        if (split70.length>=2 && split80.length>=2) {
            var g70 = split70.filter(function(o){return o.outcome==='good';}).length/split70.length;
            var g80 = split80.filter(function(o){return o.outcome==='good';}).length/split80.length;
            if (g80 > g70 + 0.2) splitNote = "80/20 עבד טוב יותר מ-70/30";
            else if (g70 > g80 + 0.2) splitNote = "70/30 עובד טוב — המשך";
        }
    }

    var rec = null;
    var highPct = high/n, lowPct = low/n, goodPct = good/n;
    if (highPct > 0.4) {
        var suggestedIns = (avgIns + (highPct>0.6 ? 1.0 : 0.5)).toFixed(1);
        rec = { type:'increase', reason:'גבוה ב-'+Math.round(highPct*100)+'% — שקול '+avgIns.toFixed(1)+'U→'+suggestedIns+'U', learnedCR:learnedCR };
    } else if (lowPct > 0.3) {
        var suggestedLow = (avgIns - 0.5).toFixed(1);
        rec = { type:'decrease', reason:'נמוך ב-'+Math.round(lowPct*100)+'% — שקול '+avgIns.toFixed(1)+'U→'+suggestedLow+'U', learnedCR:learnedCR };
    } else if (goodPct > 0.65) {
        rec = { type:'keep', reason:'✅ עובד טוב ('+Math.round(goodPct*100)+'%)! המשך כך', learnedCR:learnedCR };
    }

    return {
        count:n, good:good, high:high, low:low,
        avgIns:avgIns.toFixed(2), avg2h:avg2h,
        learnedCR:learnedCR,
        worstHour:worstHour, worstRate:Math.round(worstRate*100),
        sportNote:sportNote, splitNote:splitNote,
        rec:rec, paramHistory: data.paramHistory || []
    };
}
