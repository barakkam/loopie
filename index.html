<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Loopie v31.1 - NS Connector</title>
    <style>
        :root {
            --bg: #121212; --card: #1a1a1a; --blue: #2563ff; 
            --green: #0fba74; --text: #f0f0f8; --mono: 'JetBrains Mono', monospace;
        }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; width: 400px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .omnibox { width: 100%; padding: 12px; background: #000; border: 1px solid var(--blue); color: var(--green); border-radius: 8px; font-family: var(--mono); outline: none; margin-bottom: 15px; }
        .status-box { text-align: center; margin: 20px 0; padding: 15px; background: #222; border-radius: 10px; }
        .bg-val { font-size: 3rem; font-weight: bold; color: var(--blue); }
        .info { font-size: 0.9rem; color: #888; margin-top: 5px; }
        button { width: 100%; padding: 12px; background: var(--blue); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>Loopie Omnibox</h2>
    
    <input type="text" id="nsUrl" class="omnibox" placeholder="כתובת NS (למשל: https://herokuapp.com)">
    <input type="text" id="command" class="omnibox" placeholder="פקודה או שאלה (למשל: סוכר?)">
    
    <div class="status-box" id="display">
        <div class="bg-val">--</div>
        <div class="info">הזן כתובת ולחץ על התחבר</div>
    </div>
    
    <button onclick="updateNS()">התחבר ומשוך נתונים</button>
</div>

<script>
    async function updateNS() {
        let url = document.getElementById('nsUrl').value.replace(/\/$/, "");
        const display = document.getElementById('display');
        
        if (!url) { alert("נא להזין כתובת שרת"); return; }

        try {
            // שליפת נתונים מ-API של Nightscout
            const response = await fetch(`${url}/api/v1/entries.json?count=1`);
            const data = await response.json();
            
            if (data.length > 0) {
                const entry = data[0];
                const bg = entry.sgv;
                const date = new Date(entry.dateString).toLocaleTimeString('he-IL');
                const trend = getTrendIcon(entry.trend);
                
                display.innerHTML = `
                    <div class="bg-val">${bg}</div>
                    <div style="font-size: 1.5rem">${trend}</div>
                    <div class="info">עודכן ב: ${date}</div>
                `;
            }
        } catch (err) {
            display.innerHTML = '<div class="info" style="color:red">שגיאה בחיבור לשרת</div>';
        }
    }

    function getTrendIcon(trend) {
        const icons = { 1: "↑↑", 2: "↑", 3: "↗", 4: "→", 5: "↘", 6: "↓", 7: "↓↓" };
        return icons[trend] || "↔";
    }
</script>

</body>
</html>
