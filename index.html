    await saveMemory(key, prev);
}

// קבל המלצה מהזיכרון לאוכל ספציפי
async function getMemoryRecommendation(foodName) {
    var mem = await loadMemory();
    var key = 'food_' + foodName.replace(/\s+/g, '_').toLowerCase();
    if (!mem[key] || !mem[key].value) return null;
    var data     = mem[key].value;
    var outcomes = data.outcomes || [];
    if (outcomes.length < 2) return null;

    var n     = outcomes.length;
    var good  = outcomes.filter(function(o){ return o.outcome === 'good'; }).length;
    var high  = outcomes.filter(function(o){ return o.outcome === 'high'; }).length;
    var low   = outcomes.filter(function(o){ return o.outcome === 'low';  }).length;

    var avgIns   = outcomes.reduce(function(a,o){ return a+(parseFloat(o.insulin)||0); },0)/n;
    var avgCarbs = outcomes.reduce(function(a,o){ return a+(o.carbs||0); },0)/n;
    var with2h   = outcomes.filter(function(o){ return o.sgv2h; });
    var avg2h    = with2h.length ? Math.round(with2h.reduce(function(a,o){return a+o.sgv2h;},0)/with2h.length) : null;

    var learnedCR = avgCarbs>0 && avgIns>0 ? avgCarbs/avgIns : null;

    // ניתוח לפי שעה — האם שעה מסוימת גרועה יותר?
    var byHour = {};
    outcomes.forEach(function(o){
        var h = o.hour;
        if (h === undefined || h === null) return;
        byHour[h] = byHour[h] || { good:0, high:0, low:0, n:0 };
        byHour[h][o.outcome]++;
        byHour[h].n++;
    });
    var worstHour = null, worstRate = 0;
    Object.keys(byHour).forEach(function(h){
        var bh = byHour[h];
        var badRate = (bh.high+bh.low)/bh.n;
        if (bh.n >= 2 && badRate > worstRate) { worstRate = badRate; worstHour = h; }
    });

    // ניתוח לפי ספורט — האם בספורט יוצא שונה?
    var withSport    = outcomes.filter(function(o){ return o.activityNear; });
    var withoutSport = outcomes.filter(function(o){ return !o.activityNear; });
    var sportNote = null;
    if (withSport.length >= 2 && withoutSport.length >= 2) {
        var sportHighPct   = withSport.filter(function(o){return o.outcome!=='good';}).length/withSport.length;
        var noSportHighPct = withoutSport.filter(function(o){return o.outcome!=='good';}).length/withoutSport.length;
        if (sportHighPct < noSportHighPct - 0.2)
            sportNote = "בספורט התוצאות טובות יותר (" + Math.round((1-sportHighPct)*100) + "% טוב)";
        else if (sportHighPct > noSportHighPct + 0.2)
            sportNote = "ליד פעילות הסוכר יותר נמוך — הפחת אינסולין בספורט";
    }

    // ניתוח split — האם 70/30 עובד?
    var splitOutcomes = outcomes.filter(function(o){ return o.splitPct; });
    var splitNote = null;
    if (splitOutcomes.length >= 3) {
        var split70 = splitOutcomes.filter(function(o){return o.splitPct>=65&&o.splitPct<=75;});
        var split80 = splitOutcomes.filter(function(o){return o.splitPct>=75;});
        if (split70.length>=2 && split80.length>=2) {
            var g70 = split70.filter(function(o){return o.outcome==='good';}).length/split70.length;
            var g80 = split80.filter(function(o){return o.outcome==='good';}).length/split80.length;
            if (g80 > g70 + 0.2) splitNote = "80/20 עבד טוב יותר מ-70/30";
            else if (g70 > g80 + 0.2) splitNote = "70/30 עובד טוב — המשך";
        }
    }

    var rec = null;
    var highPct = high/n, lowPct = low/n, goodPct = good/n;
    if (highPct > 0.4) {
        var suggestedIns = (avgIns + (highPct>0.6 ? 1.0 : 0.5)).toFixed(1);
        rec = { type:'increase', reason:'גבוה ב-'+Math.round(highPct*100)+'% — שקול '+avgIns.toFixed(1)+'U→'+suggestedIns+'U', learnedCR:learnedCR };
    } else if (lowPct > 0.3) {
        var suggestedLow = (avgIns - 0.5).toFixed(1);
        rec = { type:'decrease', reason:'נמוך ב-'+Math.round(lowPct*100)+'% — שקול '+avgIns.toFixed(1)+'U→'+suggestedLow+'U', learnedCR:learnedCR };
    } else if (goodPct > 0.65) {
        rec = { type:'keep', reason:'✅ עובד טוב ('+Math.round(goodPct*100)+'%)! המשך כך', learnedCR:learnedCR };
    }

    return {
        count:n, good:good, high:high, low:low,
        avgIns:avgIns.toFixed(2), avg2h:avg2h,
        learnedCR:learnedCR,
        worstHour:worstHour, worstRate:Math.round(worstRate*100),
        sportNote:sportNote, splitNote:splitNote,
        rec:rec, paramHistory: data.paramHistory || []
    };
}

// ========= ניטור מגמת עלייה לפיצול הזרקה =========
function checkPendingDose() {
    if (!PENDING_DOSE || PENDING_DOSE.triggered) return;
    var sgv   = nsData.currentSgv;
    var delta = nsData.delta;
    var iob   = parseFloat(nsData.iob) || 0;
    var minsElapsed = (Date.now() - PENDING_DOSE.setAt) / 60000;

    // תנאי להתראה:
    // 1. עלייה בדלתא (סוכר עולה) OR
    // 2. עברו יותר מ-45 דק' ועדיין לא הוזרק
    var risingTrend = delta >= 2 && sgv > 130;
    var timeout     = minsElapsed > 45;

    if (!risingTrend && !timeout) return;

    PENDING_DOSE.triggered = true;
    clearInterval(window._pendingTimer);

    // חשב כמה להשלים — בהתחשב ב-IOB שנצבר
    var remainDose = parseFloat(PENDING_DOSE.doseLaterR);
    var iobAdjust  = Math.max(0, remainDose - iob * 0.3).toFixed(1); // הפחת חלק מ-IOB

    // חשב מה Loop היה מציע עכשיו
    var loopNowSug = PENDING_DOSE.loopR;

    var reason = risingTrend
        ? "📈 מגמת עלייה! סוכר " + sgv + " ועולה +" + delta + "/5דק'"
        : "⏰ עברו " + Math.round(minsElapsed) + " דק' מהזרקה הראשונה";

    var html2 = "<div style='background:rgba(245,158,11,0.12);border:1px solid #f59e0b;border-radius:8px;padding:10px;margin-bottom:10px'>" + reason + "</div>";

    html2 += "<div style='background:#0a0a14;border-radius:10px;padding:14px;margin-bottom:10px'>";
    html2 += "<div style='font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px'>💉 השלמת הזרקה על " + PENDING_DOSE.foodName + "</div>";

    html2 += "<div style='display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1a1a28'>";
    html2 += "<span style='color:#aaa'>🍞 פחמימות מקוריות</span><b style='color:#f59e0b'>" + PENDING_DOSE.carbsTotal + "g</b></div>";

    html2 += "<div style='display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1a1a28'>";
    html2 += "<span style='color:#aaa'>💉 השלמה מומלצת (Loopie)</span><b style='color:#10b981;font-size:24px'>" + iobAdjust + "U</b></div>";

    html2 += "<div style='display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1a1a28'>";
    html2 += "<span style='color:#aaa'>🔄 Loop מציע כעת</span><b style='color:#6b6b80'>" + loopNowSug + "U</b></div>";

    html2 += "<div style='display:flex;justify-content:space-between;align-items:center;padding:8px 0'>";
    html2 += "<span style='color:#aaa'>⏱️ משך הזרקה</span><b style='color:#3b82f6'>" + PENDING_DOSE.foodDurH + " שעות (יתרה)</b></div>";

    html2 += "<div style='font-size:11px;color:#888;margin-top:8px'>";
    html2 += "מקורית: " + PENDING_DOSE.doseLaterR + "U | מותאם לפי IOB נוכחי (" + iob + "U): " + iobAdjust + "U";
    html2 += "</div></div>";

    if (Math.abs(parseFloat(iobAdjust) - parseFloat(loopNowSug)) < 0.3) {
        html2 += "<div style='font-size:12px;color:#10b981;margin-bottom:8px'>✅ הסכמה עם Loop</div>";
    } else if (parseFloat(iobAdjust) > parseFloat(loopNowSug)) {
        html2 += "<div style='font-size:12px;color:#f59e0b;margin-bottom:8px'>Loopie מציע יותר מ-Loop — סוכר עולה מהר</div>";
    } else {
        html2 += "<div style='font-size:12px;color:#888;margin-bottom:8px'>Loop מציע יותר — בדוק IOB ב-Loop</div>";
    }

    html2 += "<small style='color:#555'>⚕️ המלצה לשיקול דעת — ניהול T1D.</small>";
    html2 += "<br><button onclick='PENDING_DOSE=null;closePopup()' style='margin-top:10px;width:100%;padding:8px;background:rgba(16,185,129,0.15);border:1px solid #10b981;border-radius:8px;cursor:pointer;color:#10b981;font-weight:600'>✅ הוזרקה — סגור</button>";

    showPopup("⚠️ הזרק השלמה! — " + PENDING_DOSE.foodName, html2);
}

async function connect() {

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> מתחבר...';
    try {
        var res = await nsGet('/api/v1/status.json');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.remove('hidden');
        fetchData();
        refreshTimer = setInterval(fetchData, 60000);
    } catch(e) {

        btn.innerText = "שגיאת חיבור (" + e.message + ")";

async function fetchData() {
    try {
        var [entRes, devRes, profRes] = await Promise.all([
            nsGet('/api/v1/entries.json?count=2'),
            nsGet('/api/v1/devicestatus.json?count=1'),
            nsGet('/api/v1/profile.json')
        ]);

        // --- סוכר + דלתא ---
        if (entRes.ok) {
            var ed = await entRes.json();
            var entries = Array.isArray(ed) ? ed : [ed];
            var e0 = entries[0], e1 = entries[1];
            if (e0 && e0.sgv) {
                nsData.currentSgv = e0.sgv;
                nsData.delta = e1 ? (e0.sgv - e1.sgv) : 0;
                var bgEl = document.getElementById('current-bg');
                bgEl.innerText = e0.sgv;
                bgEl.className = 'bg-value' + (e0.sgv < 70 ? ' low' : e0.sgv > 180 ? ' high' : '');
                var tm = {1:'↑↑',2:'↑',3:'↗',4:'→',5:'↘',6:'↓',7:'↓↓'};
                document.getElementById('trend-label').innerText = e0.direction || tm[e0.trend] || '→';
                // התרעת מגמת עלייה
                var isRising = (e0.sgv > INSULIN_CONFIG.alertThreshold && nsData.delta >= INSULIN_CONFIG.alertDelta);
                var isLow    = (e0.sgv < 80 || (e0.sgv < 100 && nsData.delta <= -3));
                var existing = document.getElementById('rising-alert');

                if (isLow && !existing) {
                    // התרעת נמוך — הצג חילוץ
                    var alertDiv = document.createElement('div');
                    alertDiv.id = 'rising-alert';
                    alertDiv.style.cssText = 'background:rgba(59,130,246,0.15);border:1px solid #3b82f6;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:13px;cursor:pointer';
                    alertDiv.innerHTML = '🔵 סוכר <b>' + e0.sgv + '</b>' + (nsData.delta < 0 ? ' ויורד ' + nsData.delta + '/5דק' : '') + ' — <b style="color:#3b82f6">לחץ לתוכנית חילוץ</b>';
                    alertDiv.onclick = function(){ document.getElementById('omnibox').value='חילוץ'; askOmnibox(); };
                    var grid = document.querySelector('.stats-grid');
                    if (grid) grid.parentNode.insertBefore(alertDiv, grid.nextSibling);
                } else if (isRising && !existing) {
                    var alertDiv = document.createElement('div');
                    alertDiv.id = 'rising-alert';
                    alertDiv.style.cssText = 'background:rgba(245,158,11,0.15);border:1px solid #f59e0b;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:13px;cursor:pointer';
                    alertDiv.innerHTML = '📈 סוכר <b>' + e0.sgv + '</b> ועולה +' + nsData.delta + '/5דק — <b style="color:#f59e0b">לחץ לבדיקת תיקון</b>';
                    alertDiv.onclick = function(){ recommendDose("תיקון"); };
                    var grid = document.querySelector('.stats-grid');
                    if (grid) grid.parentNode.insertBefore(alertDiv, grid.nextSibling);
                } else if (!isRising && !isLow && existing) {
                    existing.remove();
                }
            }
        }

        // --- DeviceStatus: IOB + COB + בזאלי ---
        if (devRes.ok) {
            var dd = await devRes.json();
            var dev = Array.isArray(dd) ? dd[0] : dd;
            if (dev) {
                fullHistory.devStatus = dev;
                console.log("=== DeviceStatus top keys:", Object.keys(dev));
                if (dev.openaps) console.log("openaps keys:", Object.keys(dev.openaps));
                if (dev.loop)    console.log("loop keys:", Object.keys(dev.loop));

                // IOB — רשימת מיקומים אפשריים
                var iobPaths = [
                    'openaps.iob.iob', 'openaps.suggested.IOB', 'openaps.enacted.IOB',
                    'loop.iob.iob', 'loop.iob.value',
                    'pump.iob.bolusiob', 'pump.iob'
                ];
                var iobRaw = null;
                for (var i = 0; i < iobPaths.length; i++) {
                    iobRaw = dig(dev, iobPaths[i]);
                    if (iobRaw !== null) { console.log("IOB found at:", iobPaths[i], "=", iobRaw); break; }
                }
                nsData.iob = iobRaw !== null ? parseFloat(iobRaw).toFixed(2) : "0.00";
                document.getElementById('stat-iob').innerText = nsData.iob;

                // COB — רשימת מיקומים אפשריים
                var cobPaths = [
                    'openaps.iob.activity', 'openaps.meal.carbs',
                    'openaps.suggested.COB', 'openaps.enacted.COB',
                    'loop.cob.cob', 'loop.cob',
                    'cob', 'COB'
                ];
                var cobRaw = null;
                for (var j = 0; j < cobPaths.length; j++) {
                    cobRaw = dig(dev, cobPaths[j]);
                    if (cobRaw !== null && cobRaw !== 0) { console.log("COB found at:", cobPaths[j], "=", cobRaw); break; }
                }
                nsData.cob = cobRaw !== null ? cobRaw : 0;

                // בזאלי בפועל
                var basalPaths = [
                    'openaps.enacted.rate', 'openaps.suggested.rate',
                    'loop.recommendedTempBasal.rate', 'loop.enacted.rate',
                    'pump.extended.TBRRate', 'pump.basal.rate'
                ];
                var basalRaw = null;
                for (var k = 0; k < basalPaths.length; k++) {
                    basalRaw = dig(dev, basalPaths[k]);
                    if (basalRaw !== null) { console.log("Basal found at:", basalPaths[k], "=", basalRaw); break; }
                }
                nsData.basal = basalRaw !== null ? basalRaw : "0.0";
                document.getElementById('stat-basal').innerText = nsData.basal;
            }
        }

        // --- פרופיל ---
        if (profRes.ok) {
            var pd = await profRes.json();
            var prof = Array.isArray(pd) ? pd[0] : pd;
            if (prof && prof.store) {
                var sName = prof.defaultProfile || Object.keys(prof.store)[0];
                fullHistory.profile = prof.store[sName];
                console.log("Profile store:", sName);
                // אם בזאלי עדיין 0 — קח מהפרופיל
                if (!parseFloat(nsData.basal)) {
                    var bNow = profileValueAt(fullHistory.profile.basal, new Date().getHours());
                    if (bNow) { nsData.basal = bNow; document.getElementById('stat-basal').innerText = bNow; }
                }
            } else if (prof) {
                fullHistory.profile = prof;
            }
        }

        loadHistory();
        checkActiveActivity();
        checkPendingDose();
    } catch(e) { console.error("fetchData error:", e); }
}

async function loadHistory() {
    try {
        var dayAgo   = new Date(Date.now() - 86400000).toISOString();
        var mo3Ago   = new Date(Date.now() - 90*86400000).toISOString();

        var [ent, treat, equip] = await Promise.all([
            nsGet('/api/v1/entries.json?find[dateString][$gte]=' + dayAgo + '&count=500').then(function(r){return r.json();}).catch(function(){return [];}),
            nsGet('/api/v1/treatments.json?find[created_at][$gte]=' + dayAgo + '&count=200').then(function(r){return r.json();}).catch(function(){return [];}),
            nsGet('/api/v1/treatments.json?find[created_at][$gte]=' + mo3Ago + '&count=500').then(function(r){return r.json();}).catch(function(){return [];})
        ]);

        var merged = treat.concat(equip.filter(function(e){ return !treat.find(function(t){return t._id===e._id;}); }));
        fullHistory.entries    = ent;
        fullHistory.treatments = merged;

        // הדפס eventTypes לדיאגנוז
        var types = {};
        merged.forEach(function(t){ if(t.eventType) types[t.eventType]=(types[t.eventType]||0)+1; });
        console.log("=== Treatment eventTypes:", JSON.stringify(types));
    } catch(e) { console.error("loadHistory error:", e); }
}

async function askOmnibox() {
    var input = document.getElementById('omnibox');
    var q     = input.value.trim();
    var ql    = q.toLowerCase();
    if (!q) return;
    // מציג "מנתח..." בפופאפ בינוני
    showPopup("Loopie 🧠", "<div style='text-align:center;padding:20px;color:#888'>מנתח... 🧠</div>");

    var tr   = fullHistory.treatments || [];
    var ent  = fullHistory.entries    || [];
    var prof = fullHistory.profile;
    var dev  = fullHistory.devStatus;
    var ans  = "";
    var nowH = new Date().getHours();

    // --- המלצת מינון (כולל תיקון עצמאי) ---
    if (ql.includes("להזריק") || ql.includes("כמה אינסולין") || ql.includes("מינון") ||
        ql.includes("לתקן") || ql.includes("correction") ||
        (ql.includes("כמה") && (ql.includes("יחידות") || ql.includes("יח'"))) ||
        (ql.includes("תיקון") && !ql.includes("isf") && !ql.includes("רגישות") && !ql.includes("פרופיל"))) {
        closePopup();
        var corrOnly = (ql.includes("תיקון") || ql.includes("לתקן")) && !ql.includes("על ");
        recommendDose(corrOnly ? "__correction__" : q);
        input.value = '';
        return;
    }

    // --- תחזית ---
    else if (ql.includes("עוד") || ql.includes("תחזית") || ql.includes("יהיה")) {
        var nm = ql.match(/(\d+(?:\.\d+)?)/);
        var hrs = nm ? parseFloat(nm[1]) : 1;
        var pred = predictBG(hrs);
        ans = pred
            ? "📈 תחזית " + (hrs===1?"עוד שעה":"עוד "+hrs+" שעות") + ":<br><b style='font-size:1.4em'>" + pred + " mg/dL</b>" + bgStatus(pred) + "<br><small style='color:#888'>מגמה: " + (nsData.delta>=0?"+":"") + nsData.delta + "/5דק' | IOB: " + nsData.iob + "U</small>"
            : "אין מספיק נתונים לתחזית.";
    }

    // --- מצב נוכחי ---
    else if (ql.includes("מצב") || ql.includes("כעת") || ql.includes("עכשיו") || ql.includes("מה קורה")) {
        ans = "📊 <b>מצב נוכחי:</b><br>" +
            "• סוכר: <b>" + nsData.currentSgv + " mg/dL</b> " + bgStatus(nsData.currentSgv) + "<br>" +
            "• מגמה: " + (nsData.delta>=0?"+":"") + nsData.delta + " ב-5 דק'<br>" +
            "• IOB: <b>" + nsData.iob + " U</b><br>" +
            "• COB: <b>" + nsData.cob + " g</b><br>" +
            "• בזאלי: <b>" + nsData.basal + " U/hr</b>";
    }

    // --- COB ---
    else if (ql.includes("cob") || ql.includes("פחמימות פעילות") || ql.includes("פחמימה פעיל")) {
        ans = "🍞 <b>COB (פחמימות פעילות): " + nsData.cob + "g</b><br>";
        // מחפש גם ב-DeviceStatus לנתונים נוספים
        var cobDetailed = dig(dev, 'openaps.meal') || dig(dev, 'loop.cob');
        if (cobDetailed) ans += "<small style='color:#888'>" + JSON.stringify(cobDetailed) + "</small>";
    }

    // --- חילוץ / סוכר נמוך ---
    else if (ql.includes("חילוץ") || ql.includes("היפו") || ql.includes("פתיבר") ||
             ql.includes("גלוקוז") || (ql.includes("מיץ") && !ql.includes("להזריק")) ||
             ql.includes("כמה לאכול") || ql.includes("מה לאכול") || ql.includes("לא טוב") ||
             (ql.includes("נמוך") && !ql.includes("בזאלי") && !ql.includes("cr") && !ql.includes("isf"))) {

        var sgvNow3  = nsData.currentSgv;
        var iobNow3  = parseFloat(nsData.iob) || 0;
        var prof3    = fullHistory.profile;
        var isfNow3  = prof3 ? parseFloat(profileValueAt(prof3.sens||prof3.sensitivity, nowH)||50) : 50;
        var carbsNeeded3 = calcRescueCarbs(sgvNow3, 120, iobNow3, isfNow3);

        if (carbsNeeded3 === 0 && sgvNow3 > 100) {
            ans = "✅ סוכר " + sgvNow3 + " — אין צורך בחילוץ כרגע.";
        } else {
            carbsNeeded3 = carbsNeeded3 || 15;
            var rescue = buildRescuePlan(carbsNeeded3, sgvNow3, iobNow3);

            ans  = "<div style='background:rgba(59,130,246,0.12);border:1px solid #3b82f6;border-radius:8px;padding:10px;margin-bottom:10px'>";
            // היפוגליקמיה ב-T1D: טיפול לפי כלל 15-15
            // 15g פחמימות מהירות → בדיקה אחרי 15 דק' → חזרה במידת הצורך.
            // חשוב: IOB גבוה = היפו ממושכת יותר — לכן גם פחמימות מייצבות.
            ans += "🔵 <b>חילוץ — סוכר " + (sgvNow3||'?');
            if (iobNow3 > 0) ans += " | IOB: " + iobNow3 + "U";
            ans += "</b> | נדרש: ~" + carbsNeeded3 + "g</div>";

            rescue.plans.forEach(function(p, i){
                ans += "<div style='background:#0a0a14;border-radius:8px;padding:10px;margin-bottom:8px;border-right:3px solid " + p.color + "'>";
                ans += "<b style='color:" + p.color + "'>" + (i===0 ? "⭐ מומלץ" : "אפשרות " + (i+1)) + ":</b> " + p.label + "<br>";
                p.items.forEach(function(item){
                    ans += "• " + item.name + (item.fast ? " <span style='color:#f59e0b'>⚡ מהיר</span>" : " <span style='color:#10b981'>🐢 מייצב</span>") + "<br>";
                });
                ans += "<small style='color:#888'>סה\"כ: " + p.totalCarbs + "g</small></div>";
            });

            ans += "<div style='background:rgba(59,130,246,0.06);border:1px solid var(--blue-dim);border-radius:8px;padding:10px;font-size:13px'>";
            ans += rescue.loopNote + "</div>";
            ans += "<br><small style='color:#888'>בדוק סוכר אחרי 15 דק'. אם לא עלה — חזור על הטיפול.</small>";
        }
    }

    // --- IOB ---
    else if (ql.includes("iob") || ql.includes("אינסולין פעיל") || q === "IOB") {
        ans = "💉 IOB: <b>" + nsData.iob + " יחידות</b>.";
    }

    // --- בזאלי + לוח ---
    else if (ql.includes("בזאלי") || ql.includes("basal")) {
        ans = "💧 <b>בזאלי בפועל: " + nsData.basal + " U/hr</b><br><br>";
        if (prof && prof.basal) {
            ans += "פרופיל כעת (" + nowH + ":00): <b>" + profileValueAt(prof.basal, nowH) + " U/hr</b><br><br>";
            ans += "<b>לוח בזאלי יומי:</b><br>" + buildSchedule(prof.basal, "U/hr");
        }
    }

    // --- ISF ---
    else if (ql.includes("isf") || ql.includes("תיקון") || ql.includes("רגישות")) {
        if (prof) {
            var isfArr = prof.sens || prof.sensitivity || prof.isfProfile;
            var isfNumM = ql.match(/(\d+)/);
            var isfNum  = isfNumM ? parseInt(isfNumM[1]) : null;
            var isfH = nowH, isfLabel = "כעת (" + nowH + ":00)";
            if (isfNum !== null) {
                if (ql.includes("עוד"))       { isfH = (nowH + isfNum) % 24; isfLabel = "עוד " + isfNum + " שעות (" + isfH + ":00)"; }
                else if (ql.includes("לפני")) { isfH = (nowH - isfNum + 24) % 24; isfLabel = "לפני " + isfNum + " שעות (" + isfH + ":00)"; }
                else                           { isfH = isfNum % 24; isfLabel = "בשעה " + isfH + ":00"; }
            }
            var isfVal = Array.isArray(isfArr) ? profileValueAt(isfArr, isfH) : isfArr;
            ans = "🎯 ISF " + isfLabel + ": <b>" + isfVal + " mg/dL/U</b>";
            if (isfNum === null && Array.isArray(isfArr) && isfArr.length > 1)
                ans += "<br><br><b>לוח ISF יומי:</b><br>" + buildSchedule(isfArr, "mg/dL/U");
        } else { ans = "לא נמצא ISF בפרופיל."; }
    }

    // --- CR ---
    else if (ql.includes("cr") || ql.includes("יחס פחמימה") || ql.includes("carb ratio")) {
        if (prof) {
            var crArr  = prof.carbratio || prof.carbRatio || prof.ic;
            var crNumM = ql.match(/(\d+)/);
            var crNum  = crNumM ? parseInt(crNumM[1]) : null;
            var crH = nowH, crLabel = "כעת (" + nowH + ":00)";
            if (crNum !== null) {
                if (ql.includes("עוד"))       { crH = (nowH + crNum) % 24; crLabel = "עוד " + crNum + " שעות (" + crH + ":00)"; }
                else if (ql.includes("לפני")) { crH = (nowH - crNum + 24) % 24; crLabel = "לפני " + crNum + " שעות (" + crH + ":00)"; }
                else                           { crH = crNum % 24; crLabel = "בשעה " + crH + ":00"; }
            }
            var crVal = Array.isArray(crArr) ? profileValueAt(crArr, crH) : crArr;
            ans = "🍞 CR " + crLabel + ": <b>" + crVal + " g/U</b>";
            if (crNum === null && Array.isArray(crArr) && crArr.length > 1)
                ans += "<br><br><b>לוח CR יומי:</b><br>" + buildSchedule(crArr, "g/U");
        } else { ans = "לא נמצא CR בפרופיל."; }
    }

    // --- פרופיל מלא ---
    else if (ql.includes("פרופיל") || ql.includes("הגדרות")) {
        if (prof) {
            var crA2 = prof.carbratio || prof.carbRatio || prof.ic;
            var sfA2 = prof.sens || prof.sensitivity;
            ans = "📋 <b>פרופיל (" + nowH + ":00):</b><br>" +
                "• בזאלי: <b>" + (profileValueAt(prof.basal, nowH)||nsData.basal) + " U/hr</b><br>" +
                "• CR: <b>" + (Array.isArray(crA2) ? profileValueAt(crA2,nowH) : crA2) + " g/U</b><br>" +
                "• ISF: <b>" + (Array.isArray(sfA2) ? profileValueAt(sfA2,nowH) : sfA2) + " mg/dL/U</b><br>" +
                "• יחידות: " + (prof.units||'mg/dL');
        } else { ans = "לא נמצא פרופיל. בדוק שפלאגין Profile מופעל ב-NS."; }
    }

    // --- ציוד — חיפוש רחב מ-NS treatments + DeviceStatus ---
    else if (ql.includes("חיישן") || ql.includes("סנסור") || ql.includes("פוד") || ql.includes("משאבה") ||
             ql.includes("גיל") || ql.includes("ציוד") || ql.includes("החלפ") || ql.includes("site")) {

        // כל eventTypes שיש בNS — לדיאגנוז ולמידה
        var allTypes = {};
        tr.forEach(function(t){ if(t.eventType) allTypes[t.eventType]=true; });
        var allTypesList = Object.keys(allTypes);

        // === חיפוש חיישן ===
        // 1. חיפוש לפי keywords ב-eventType
        var sKeys = ['sensor start','sensor change','sensor','cgm','dexcom','libre','g6','g7','חיישן','סנסור'];
        var sensor = tr.find(function(t){
            var ev = (t.eventType||'').toLowerCase();
            return sKeys.some(function(k){ return ev.includes(k); });
        });

        // 2. שלוף sage/cage ישירות מ-NS devicestatus (ערכים בשעות)
        var sageFromDev = null;
        var cageFromDev = null;
        try {
            var dsRes = await nsGet('/api/v1/devicestatus.json?count=1');
            if (dsRes.ok) {
                var dsArr = await dsRes.json();
                var ds = Array.isArray(dsArr) ? dsArr[0] : dsArr;
                if (ds) {
                    // NS מחזיר sage/cage בשעות ישירות
                    var sageVal = ds.sage !== undefined ? ds.sage
                                : dig(ds,'pump.sage') !== null ? dig(ds,'pump.sage')
                                : dig(ds,'loop.sage');
                    var cageVal = ds.cage !== undefined ? ds.cage
                                : dig(ds,'pump.cage') !== null ? dig(ds,'pump.cage')
                                : dig(ds,'loop.cage');
                    if (sageVal !== null && sageVal !== undefined) sageFromDev = parseFloat(sageVal);
                    if (cageVal !== null && cageVal !== undefined) cageFromDev = parseFloat(cageVal);
                    console.log("SAGE from DeviceStatus:", sageFromDev, "CAGE:", cageFromDev);
                }
            }
        } catch(e) { console.error("sage/cage fetch:", e); }

        // === חיפוש פוד/משאבה ===
        var pKeys = ['pod','site change','cannula','infusion','reservoir','omnipod','פוד','משאבה','site'];
        var pod = tr.find(function(t){
            var ev = (t.eventType||'').toLowerCase();
            return pKeys.some(function(k){ return ev.includes(k); });
        });

        // === בניית תשובה ===
        ans = "<b>📟 מצב ציוד:</b><br><br>";

        // --- חיישן ---
        ans += "<div style='background:#0a0a14;border-radius:10px;padding:12px;margin-bottom:10px'>";
        ans += "<div style='font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px'>📡 חיישן CGM</div>";

        if (sensor) {
            var sh = (Date.now() - new Date(sensor.created_at)) / 3600000;
            var sLeft = Math.max(0, 240 - sh);
            var sChanged  = new Date(sensor.created_at).toLocaleString('he-IL',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});
            var sNextDate = new Date(new Date(sensor.created_at).getTime() + 240*3600000);
            var sNext     = sNextDate.toLocaleString('he-IL',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});
            ans += "• הוחלף: <b>" + sChanged + "</b> (לפני " + timeAgo(sensor.created_at) + ")<br>";
            ans += "• סוג רישום: " + sensor.eventType + "<br>";
            ans += "• נותרו: <b style='color:" + (sLeft<24?"#ef4444":sLeft<48?"#f59e0b":"#10b981") + "'>" + sLeft.toFixed(0) + " שעות (~" + (sLeft/24).toFixed(1) + " ימים)</b><br>";
            ans += "• החלפה הבאה: <b>" + sNext + "</b>";
        } else if (sageFromDev !== null) {
            // sage מ-NS הוא בשעות
            var sAgeH  = sageFromDev;
            var sLeft2 = Math.max(0, 240 - sAgeH);
            var sAgeDays = Math.floor(sAgeH/24);
            var sAgeHrs  = Math.round(sAgeH % 24);
            ans += "• גיל חיישן: <b>" + sAgeDays + "d " + sAgeHrs + "h</b> (SAGE מ-NS)<br>";
            ans += "• נותרו: <b style='color:" + (sLeft2<24?"#ef4444":sLeft2<48?"#f59e0b":"#10b981") + "'>" + Math.floor(sLeft2/24) + "d " + Math.round(sLeft2%24) + "h (~" + (sLeft2/24).toFixed(1) + " ימים)</b><br>";
            var sNextMs = Date.now() + sLeft2*3600000;
            ans += "• החלפה הבאה: <b>" + new Date(sNextMs).toLocaleString('he-IL',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) + "</b><br>";
            ans += "<small style='color:#888'>מקור: SAGE מ-DeviceStatus</small>";
        } else {
            ans += "<span style='color:#f59e0b'>לא נמצא רישום החלפת חיישן.</span><br>";
            ans += "<small style='color:#888'>סוגי אירועים קיימים: " + (allTypesList.join(", ") || "אין") + "</small><br>";
            ans += "<small style='color:#888'>💡 רשום ב-NS: Sensor Change / Sensor Start</small>";
        }
        ans += "</div>";

        // --- פוד/משאבה ---
        ans += "<div style='background:#0a0a14;border-radius:10px;padding:12px'>";
        ans += "<div style='font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px'>💊 פוד / אתר עירוי</div>";

        if (pod) {
            var ph = (Date.now() - new Date(pod.created_at)) / 3600000;
            var pLeft = Math.max(0, 72 - ph);
            var pChanged  = new Date(pod.created_at).toLocaleString('he-IL',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});
            var pNextDate = new Date(new Date(pod.created_at).getTime() + 72*3600000);
            var pNext     = pNextDate.toLocaleString('he-IL',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});
            ans += "• הוחלף: <b>" + pChanged + "</b> (לפני " + timeAgo(pod.created_at) + ")<br>";
            ans += "• סוג רישום: " + pod.eventType + "<br>";
            ans += "• נותרו: <b style='color:" + (pLeft<12?"#ef4444":pLeft<24?"#f59e0b":"#10b981") + "'>" + pLeft.toFixed(0) + " שעות (~" + (pLeft/24).toFixed(1) + " ימים)</b><br>";
            ans += "• החלפה הבאה: <b>" + pNext + "</b>";
        } else if (cageFromDev !== null) {
            // cage מ-NS הוא בשעות
            var cAgeH = cageFromDev;
            var cLeft = Math.max(0, 72 - cAgeH);
            var cAgeDays = Math.floor(cAgeH/24);
            var cAgeHrs  = Math.round(cAgeH % 24);
            ans += "• גיל פוד: <b>" + cAgeDays + "d " + cAgeHrs + "h</b> (CAGE מ-NS)<br>";
            ans += "• נותרו: <b style='color:" + (cLeft<12?"#ef4444":cLeft<24?"#f59e0b":"#10b981") + "'>" + Math.floor(cLeft/24) + "d " + Math.round(cLeft%24) + "h</b><br>";
            var cNextMs = Date.now() + cLeft*3600000;
            ans += "• החלפה הבאה: <b>" + new Date(cNextMs).toLocaleString('he-IL',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) + "</b>";
        } else {
            ans += "<span style='color:#f59e0b'>לא נמצא רישום החלפת פוד/אתר.</span><br>";
            ans += "<small style='color:#888'>💡 רשום ב-NS: Site Change / Pod Change</small>";
        }
        ans += "</div>";

        // טעינה נוספת מ-NS אם treatments לא מספיקים
        if (!sensor && !sageFromDev) {
            try {
                var mo6Ago = new Date(Date.now() - 180*86400000).toISOString();
                var sRes = await nsGet('/api/v1/treatments.json?find[created_at][$gte]=' + mo6Ago + '&count=500');
                if (sRes.ok) {
                    var sTreats = await sRes.json();
                    var sFound = sTreats.find(function(t){
                        var ev = (t.eventType||'').toLowerCase();
                        return sKeys.some(function(k){ return ev.includes(k); });
                    });
                    if (sFound) {
                        var sh2 = (Date.now()-new Date(sFound.created_at))/3600000;
                        ans += "<br><div style='background:rgba(59,130,246,0.08);border-radius:8px;padding:8px;font-size:12px'>";
                        ans += "📡 נמצא ב-6 חודשים: " + sFound.eventType + " מ-" + new Date(sFound.created_at).toLocaleDateString('he-IL') + " (לפני " + (sh2/24).toFixed(1) + " ימים)";
                        ans += "</div>";
                    }
                }
            } catch(e) {}
        }
    }

    // --- ניתוח ארוחה ספציפית ---
    else if (ql.includes("נתח") || ql.includes("בדוק") || ql.includes("פיצ") || ql.includes("פית") || ql.includes("המבורג") || ql.includes("תוצאות") ||
             (ql.includes("איך") && (ql.includes("הזרקה") || ql.includes("ארוחה") || ql.includes("היה")))) {
        // חלץ שם הארוחה מהשאלה
        var mealKeywords = ['נתח', 'בדוק', 'תוצאות', 'איך', 'הייתה', 'ההזרקה', 'על', 'ה', 'את'];
        var mealQuery = q;
        mealKeywords.forEach(function(k){ mealQuery = mealQuery.replace(new RegExp(k, 'gi'), '').trim(); });
        var mealName2 = mealQuery.trim() || "ארוחה";
        closePopup();
        analyzeMeal(mealName2);
        input.value = '';
        return;
    }

    // --- ארוחות ---
    else if (ql.includes("אכלתי") || ql.includes("אוכל") || ql.includes("ארוחה") || ql.includes("הזרק") || ql.includes("carbs")) {
        // מסנן רק ארוחות עם פחמימות, או בולוס עם הערה — לא SMB/microbolus
        var smbKeys = ['smb','microbolus','super micro','correction','תיקון'];
        var allMeals = tr.filter(function(t){
            var ev = (t.eventType||'').toLowerCase();
            var isSMB = smbKeys.some(function(k){ return ev.includes(k); });
            // רישום עם פחמימות — תמיד כלול
            if (t.carbs > 0) return true;
            // בולוס ללא פחמימות — כלול רק אם יש הערה ואינו SMB
            if (t.insulin > 0 && !isSMB && (t.notes||t.foodType)) return true;
            return false;
        });
        var mealNumM = ql.match(/(\d+)/);
        var mealNum  = mealNumM ? parseInt(mealNumM[1]) : null;
        var filtered = allMeals;
        var mealTitle = "טיפולים ב-24 שעות אחרונות";

        // סינון לפי "לפני X שעות" — חלון ±45 דקות
        if (mealNum !== null && ql.includes("לפני")) {
            var targetMs = Date.now() - (mealNum * 3600000);
            var window45 = 45 * 60000;
            filtered = allMeals.filter(function(t){
                return Math.abs(new Date(t.created_at).getTime() - targetMs) <= window45;
            });
            mealTitle = "טיפולים לפני ~" + mealNum + " שעות";
            // אם לא נמצא בחלון ±45 דק' — הרחב ל-±90 דק'
            if (!filtered.length) {
                filtered = allMeals.filter(function(t){
                    return Math.abs(new Date(t.created_at).getTime() - targetMs) <= 90*60000;
                });
                if (filtered.length) mealTitle += " (±90 דק')";
            }
        }
        // "בשעה X" — חלון ±30 דק' סביב השעה הנתונה
        else if (mealNum !== null && (ql.includes("שעה") || ql.includes(":"))) {
            var todayBase = new Date(); todayBase.setHours(mealNum, 0, 0, 0);
            filtered = allMeals.filter(function(t){
                return Math.abs(new Date(t.created_at).getTime() - todayBase.getTime()) <= 30*60000;
            });
            mealTitle = "טיפולים בשעה " + mealNum + ":00";
        }
        // ללא שעה — הצג רק 3 אחרונות
        else {
            filtered = allMeals.slice(0, 3);
            mealTitle = "3 טיפולים אחרונים";
        }

        if (filtered.length) {
            console.log("=== First treatment fields:", JSON.stringify(filtered[0]));
            ans = "<b>" + mealTitle + ":</b><br><br>";
            ans += filtered.map(function(m){
                var time = new Date(m.created_at).toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
                var name = m.notes || m.foodType || m.reason || m.eventType || (m.carbs ? 'ארוחה' : 'בולוס');
                var insNormal   = m.insulin  ? parseFloat(m.insulin).toFixed(2)  : null;
                var insExtended = m.extended ? parseFloat(m.extended).toFixed(2) : null;
                var insDuration = m.duration ? m.duration + " דק'"               : null;
                var insLine = "";
                if (insNormal && insExtended) {
                    insLine = insNormal + "U עכשיו + " + insExtended + "U מורחב" + (insDuration ? " (" + insDuration + ")" : "");
                } else if (insNormal) {
                    insLine = insNormal + "U 💉" + (insDuration ? " (" + insDuration + ")" : "");
                } else if (insExtended) {
                    insLine = insExtended + "U מורחב" + (insDuration ? " (" + insDuration + ")" : "");
                }
                var carbLine = m.carbs ? m.carbs + "g 🍞" : "";
                var details  = [carbLine, insLine].filter(Boolean).join(" | ");
                return "<div style='margin-bottom:8px'>• <b>" + time + "</b>  " + name +
                       (details ? "<br>&nbsp;&nbsp;<small style='color:#aaa'>" + details + "</small>" : "") + "</div>";
            }).join("");
            if (!filtered.length) ans += "<i style='color:#888'>לא נמצאו רישומים בטווח הזמן.</i>";
        } else {
            ans = "לא נמצאו רישומים " + (mealNum ? "לפני " + mealNum + " שעות" : "ב-24 שעות האחרונות") + ".";
        }
    }

    // --- TIR ---
    else if (ql.includes("tir") || ql.includes("טווח") || ql.includes("מאוזן") || ql.includes("איך")) {
        if (ent.length > 10) {
            var tir  = (ent.filter(function(e){return e.sgv>=70&&e.sgv<=180;}).length/ent.length*100).toFixed(0);
            var avg  = (ent.reduce(function(a,b){return a+b.sgv;},0)/ent.length).toFixed(0);
            var low  = ent.filter(function(e){return e.sgv<70;}).length;
            var high = ent.filter(function(e){return e.sgv>180;}).length;
            ans = "📊 24 שעות:<br>• TIR: <b>"+tir+"%</b><br>• ממוצע: "+avg+"<br>• נמוך: "+low+" | גבוה: "+high+"<br>"+(tir>75?"🌟 מצוין!":"📈 יש מקום לשיפור.");
        } else { ans = "אין מספיק נתונים. לחץ 'רענן הכל'."; }
    }

    // --- תוכנית ספורט ---
    else if (ql.includes("ספורט") || ql.includes("פעילות") || ql.includes("activity") || ql.includes("יעד") || ql.includes("אימון") || ql.includes("לפני ספורט") || ql.includes("טמפ")) {
        var now2  = new Date();
        var dayN2 = now2.getDay();
        var nowM2 = now2.getHours()*60 + now2.getMinutes();
        var nextAct = null;
        ACTIVITIES.forEach(function(a){
            if (a.day !== dayN2) return;
            var fm2 = parseInt(a.from.split(':')[0])*60+parseInt(a.from.split(':')[1]);
            if (nowM2 <= fm2 + 60 && (!nextAct || fm2 < (parseInt(nextAct.from.split(':')[0])*60+parseInt(nextAct.from.split(':')[1]))))
                nextAct = a;
        });
        if (nextAct) {
            showSportPlan(String(nextAct.id));
            input.value = '';
            return;
        }
        ans = "לא נמצאה פעילות מתוכננת היום.<br>עבור ללשונית 🏃 <b>פעילות</b> להוספת חוג.";
    }

    // --- ניתוח והמלצות ---
    else if (ql.includes("המלצ") || ql.includes("ניתוח") || ql.includes("מסקנ") || ql.includes("מה לעשות") || ql.includes("טיפול")) {
        var sgv  = nsData.currentSgv;
        var iob  = parseFloat(nsData.iob)  || 0;
        var cob  = parseFloat(nsData.cob)  || 0;
        var dlt  = nsData.delta || 0;
        var prof2 = fullHistory.profile;
        var nowH2 = new Date().getHours();
        var isf  = prof2 ? (profileValueAt(prof2.sens || prof2.sensitivity, nowH2) || 50) : 50;
        var cr   = prof2 ? (profileValueAt(prof2.carbratio || prof2.carbRatio || prof2.ic, nowH2) || 10) : 10;
        var pred1h = predictBG(1);
        var pred2h = predictBG(2);

        var warnings = [];
        var notes    = [];
        var actions  = [];

        // --- ניתוח מצב נוכחי ---

        // 1. סוכר נמוך / מתקרב לנמוך
        if (sgv < 70) {
            warnings.push("⚠️ <b>היפוגליקמיה!</b> סוכר " + sgv + " mg/dL — נדרש טיפול מיידי");
            var carbsNeeded = Math.round((90 - sgv) / 0.05 / parseFloat(cr));
            actions.push("🍬 שקול " + Math.max(15, carbsNeeded) + "g פחמימות מהירות");
        } else if (sgv < 85 && dlt < 0) {
            warnings.push("⚠️ סוכר " + sgv + " ויורד (" + dlt + "/5דק') — מגמה לנמוך");
            actions.push("🍬 שקול 10–15g פחמימות מניעתיות");
        } else if (sgv < 85) {
            notes.push("📉 סוכר קצת נמוך (" + sgv + ") — עקוב");
        }

        // 2. סוכר גבוה
        if (sgv > 250) {
            warnings.push("⚠️ <b>סוכר גבוה מאוד:</b> " + sgv + " mg/dL");
            if (iob < 1) {
                var corrUnits = ((sgv - 120) / parseFloat(isf)).toFixed(1);
                actions.push("💉 שקול " + corrUnits + "U תיקון (לפי ISF=" + isf + ")");
            } else {
                notes.push("💉 יש " + iob + "U IOB — המתן לפירוק לפני תיקון נוסף");
            }
        } else if (sgv > 180 && dlt > 2) {
            notes.push("📈 סוכר " + sgv + " ועולה — מגמת עלייה");
            if (iob < 0.5) {
                var corrU2 = ((sgv - 120) / parseFloat(isf)).toFixed(1);
                actions.push("💉 שקול " + corrU2 + "U תיקון קל");
            }
        }

        // 3. IOB גבוה ביחס לסוכר
        if (iob > 2 && sgv < 120 && cob < 15) {
            warnings.push("⚠️ IOB גבוה (" + iob + "U) עם סוכר " + sgv + " ו-COB נמוך (" + cob + "g)");
            actions.push("🍬 שקול " + Math.round(iob * parseFloat(cr) * 0.3) + "–" + Math.round(iob * parseFloat(cr) * 0.5) + "g פחמימות מניעתיות");
        }

        // 4. COB גבוה
        if (cob > 30 && dlt < 1) {
            notes.push("🍞 COB=" + cob + "g — פחמימות פעילות שעדיין לא העלו סוכר");
            notes.push("ממתין לעלייה — אל תוסיף אינסולין עדיין");
        }

        // 5. מגמה חדה
        if (dlt <= -4) {
            warnings.push("📉 ירידה חדה: " + dlt + " mg/dL ב-5 דק' — " + (dlt*12).toFixed(0) + "/שעה");
        } else if (dlt >= 4) {
            notes.push("📈 עלייה מהירה: +" + dlt + " mg/dL ב-5 דק'");
        }

        // 6. תחזית
        if (pred1h !== null) {
            var pred1str = "עוד שעה: <b>" + pred1h + "</b>" + bgStatus(pred1h);
            var pred2str = "עוד 2ש': <b>" + pred2h + "</b>" + bgStatus(pred2h);
            notes.push("📈 " + pred1str + " | " + pred2str);
            if (pred1h < 70) actions.push("🍬 תחזית נמוך בעוד שעה — שקול מניעה");
            if (pred1h > 240) actions.push("💉 תחזית גבוה מאוד בעוד שעה — בדוק Loop");
        }

        // 7. כל תקין
        if (!warnings.length && !actions.length) {
            notes.push("✅ מצב נראה יציב ובטווח");
        }

        // --- בניית תשובה ---
        ans = "🧠 <b>ניתוח מצב נוכחי:</b><br>";
        ans += "<small style='color:#888'>סוכר " + sgv + " | IOB " + iob + "U | COB " + cob + "g | Δ" + (dlt>=0?"+":"") + dlt + "/5דק'</small><br><br>";

        if (warnings.length) ans += warnings.map(function(w){ return w; }).join("<br>") + "<br><br>";
        if (notes.length)    ans += notes.map(function(n){ return n; }).join("<br>") + "<br><br>";
        if (actions.length) {
            ans += "<b>המלצות לשיקול דעת:</b><br>" + actions.map(function(a){ return a; }).join("<br>");
        }
        ans += "<br><br><small style='color:#555'>⚕️ זהו ניתוח עזר בלבד — לא תחליף לשיקול רפואי.</small>";
    }

    // --- מאגר מאכלים ---
    else if (ql.includes("מאכלים") || ql.includes("מאכל") || ql.includes("רשימה") || ql.includes("מה אפשר לשאול")) {
        var dbList = Object.keys(FOOD_DB).map(function(k){
            var d = FOOD_DB[k];
            return "• <b>" + k + "</b>" + (d.perUnit?" ("+d.perUnit+")":"") + ": " + d.carbs + "g / " + d.durationH + "ש'" + (d.notes?" — "+d.notes:"");
        }).join("<br>");
        ans = "<b>📋 מאגר מאכלים:</b><br><br>" + dbList +
              "<br><br><small style='color:#888'>שאל: 'כמה להזריק על פיתה?', 'כמה להזריק על 2 חתיכות פיצה ביתית?'</small>";
    }

    // זיכרון
    else if (ql.includes("זיכרון") || ql.includes("מה למדת") || ql.includes("היסטוריה")) {
        showMemoryHistory();
        input.value = '';
        return;
    }

    else {
        ans = "נסה: 'מה המצב עכשיו?', 'COB', 'IOB', 'תחזית עוד שעה', 'בזאלי', 'ISF', 'CR', 'פרופיל', 'מה אכלתי?', 'גיל ציוד', 'TIR', 'ספורט', 'ניתוח והמלצות', 'מאכלים'.";
    }

    showPopup("Loopie 🧠", ans);
    input.value = '';
}
</script>
</body>
</html>
